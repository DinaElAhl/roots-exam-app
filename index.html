<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Roots Exam">
<title>The Roots - Quranic Arabic Proficiency Exam</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:15px}
.app{width:100%;max-width:900px;background:white;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:si .5s ease-out;max-height:95vh;overflow-y:auto}
@keyframes si{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hdr{color:white;padding:35px 30px;text-align:center}
.hdr.elementary{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)}
.hdr.middle{background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)}
.hdr.highschool{background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)}
.hdr.adult{background:linear-gradient(135deg,#fa709a 0%,#fee140 100%)}
.hdr.home{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
.hdr h1{font-size:1.8em;margin:10px 0;font-weight:700}
.hdr .sub{font-size:1.1em;font-style:italic;margin:6px 0;opacity:.9}
.hdr .ar{font-size:1.6em;margin:12px 0;direction:rtl;font-weight:600}
.cnt{padding:35px 30px;min-height:350px;animation:fu .5s ease-out}
.ls{text-align:center}
.ls h2{color:#333;margin-bottom:10px;font-size:1.8em;font-weight:700}
.ls p{color:#666;margin-bottom:25px;font-size:1em}
.lg{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:18px;margin-top:25px}
.lc{border:3px solid #e0e0e0;border-radius:16px;padding:25px 18px;cursor:pointer;transition:all .35s;background:#fafafa;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.07)}
.lc:hover{transform:translateY(-6px);box-shadow:0 14px 35px rgba(0,0,0,.15)}
.lc.elementary:hover{border-color:#f5576c;background:rgba(245,87,108,.07)}
.lc.middle:hover{border-color:#4facfe;background:rgba(79,172,254,.07)}
.lc.highschool:hover{border-color:#43e97b;background:rgba(67,233,123,.07)}
.lc.adult:hover{border-color:#fa709a;background:rgba(250,112,154,.07)}
.lc .li{font-size:2.8em;margin-bottom:10px;display:block}
.lc h3{font-size:1.2em;margin:6px 0;font-weight:700;color:#333}
.ab{font-size:.8em;color:#999;margin:4px 0}
.ld{color:#666;font-size:.85em;margin:8px 0}
.ls2{text-align:left;background:#f8f9fa;padding:14px;border-radius:10px;margin:14px 0;font-size:.88em;color:#555;list-style:none;border:1px solid #eee}
.ls2 li{margin:5px 0;padding-left:18px;position:relative}
.ls2 li::before{content:'✓';position:absolute;left:0;color:#43e97b;font-weight:bold}
.lc.elementary .ab{background:linear-gradient(135deg,#f093fb,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lc.middle .ab{background:linear-gradient(135deg,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lc.highschool .ab{background:linear-gradient(135deg,#43e97b,#38f9d7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lc.adult .ab{background:linear-gradient(135deg,#fa709a,#fee140);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.if{max-width:560px;margin:0 auto}
.if h2{color:#333;margin-bottom:20px;font-size:1.6em;font-weight:700;text-align:center}
.fg{margin-bottom:18px}
.fg label{display:block;font-weight:600;margin-bottom:6px;color:#444;font-size:.95em}
.fg input,.fg select{width:100%;padding:12px 15px;border:2px solid #e0e0e0;border-radius:10px;font-size:1em;transition:border-color .3s;outline:none}
.fg input:focus,.fg select:focus{border-color:#667eea}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:14px 35px;border-radius:12px;font-size:1.05em;font-weight:600;cursor:pointer;transition:all .3s;width:100%;margin-top:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(102,126,234,.4)}
.btn.sec{background:#f0f0f0;color:#333;border:2px solid #ddd;margin-top:10px}
.btn.sec:hover{background:#e0e0e0;transform:translateY(-1px)}
.pb{background:#f0f0f0;border-radius:20px;height:8px;margin-bottom:20px;overflow:hidden}
.pf{height:100%;border-radius:20px;background:linear-gradient(90deg,#667eea,#764ba2);transition:width .4s ease}
.qn{color:#888;font-size:.9em;margin-bottom:8px;font-weight:500}
.qt{font-size:1.25em;font-weight:700;color:#222;margin-bottom:18px;line-height:1.5}
.qt.ar{direction:rtl;text-align:right;font-size:1.4em;line-height:1.8;font-family:'Traditional Arabic','Amiri',serif}
.passage{background:#f8f9fa;border-left:4px solid #667eea;padding:18px;border-radius:0 10px 10px 0;margin-bottom:22px;direction:rtl;text-align:right;font-size:1.1em;line-height:2;font-family:'Traditional Arabic','Amiri',serif;color:#333}
.passage.en{direction:ltr;text-align:left;font-size:.95em;line-height:1.7;font-family:'Segoe UI',sans-serif}
.pl{font-size:.8em;color:#667eea;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;direction:ltr;text-align:left}
.oa{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.ob{background:#f8f9fa;border:2px solid #e0e0e0;border-radius:10px;padding:13px 18px;cursor:pointer;transition:all .3s;text-align:left;font-size:.98em;display:flex;align-items:center;gap:10px}
.ob.ar-opt{direction:rtl;text-align:right;font-family:'Traditional Arabic','Amiri',serif;font-size:1.1em}
.ob:hover{background:#f0f0ff;border-color:#667eea}
.ob.sel{background:#eef0ff;border-color:#667eea;color:#333}
.ob.cor{background:#e8f8e8;border-color:#43e97b;color:#1a7a1a}
.ob.wr{background:#ffeaea;border-color:#f5576c;color:#a00}
.ob .ol{width:26px;height:26px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:.8em;font-weight:700;flex-shrink:0}
.ob.sel .ol{border-color:#667eea;background:#667eea;color:white}
.ob.cor .ol{border-color:#43e97b;background:#43e97b;color:white}
.ob.wr .ol{border-color:#f5576c;background:#f5576c;color:white}
.nv{display:flex;gap:10px;margin-top:5px}
.nv .btn{margin-top:0}
.tm{background:#fff3cd;border:2px solid #ffc107;border-radius:10px;padding:10px 18px;text-align:center;font-weight:700;font-size:1.05em;margin-bottom:18px;color:#856404}
.tm.warn{background:#ffe0e0;border-color:#f5576c;color:#a00;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.rs{text-align:center;padding:10px 0}
.rs .sc{font-size:3.5em;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:10px 0}
.rs .sb{display:inline-block;padding:8px 22px;border-radius:20px;font-weight:700;font-size:1.05em;margin:10px 0}
.rs .sb.pass{background:#e8f8e8;color:#1a7a1a;border:2px solid #43e97b}
.rs .sb.fail{background:#ffeaea;color:#a00;border:2px solid #f5576c}
.cert{background:linear-gradient(135deg,#ffecd2,#fcb69f);border-radius:18px;padding:30px;margin:20px 0;text-align:center;border:3px solid #f5a623;box-shadow:0 8px 25px rgba(245,166,35,.25)}
.cert h3{font-size:1.4em;color:#7c4200;margin-bottom:10px;font-weight:700}
.cert .cn{font-size:1.7em;font-weight:800;color:#5c3200;margin:10px 0}
.cert .cl{font-size:1em;color:#7c4200;margin:5px 0}
.cert .cs{font-size:.85em;color:#a05800;margin-top:12px;font-style:italic}
.rv{background:#f8f9fa;border-radius:14px;padding:18px;margin:18px 0;text-align:left}
.rv h4{color:#333;margin-bottom:14px;font-weight:700;font-size:1.05em}
.ri{border-bottom:1px solid #eee;padding:10px 0;font-size:.9em}
.ri:last-child{border-bottom:none}
.ri .rq{color:#444;margin-bottom:5px;font-weight:500;line-height:1.4}
.ri .ra{color:#1a7a1a;font-weight:600}
.ri .rw{color:#a00;font-weight:600}
.ri .rc{color:#2196F3;font-size:.88em}
@media(max-width:500px){.lg{grid-template-columns:1fr 1fr}.cnt{padding:22px 18px}.hdr{padding:25px 18px}.btn{padding:12px 20px}}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// LEVEL CONFIGURATIONS
const LC={
  elementary:{id:'elementary',name:'Elementary',ar:'المستوى الابتدائي',age:'Ages 6–11',dur:25,q:8,pass:70,

    skills:['Recognize Arabic letters','Basic greetings & numbers','Simple vocabulary (animals, colors, family)','Identify short Arabic words']},

// QUESTION BANKS — fully age-appropriate, no duplicates across levels
const QS={

elementary:[

  {id:4,t:'What does  ثلاثة  (thalatha) mean?',o:['One','Two','Three','Four'],c:2},

  {id:6,t:'What does  أسد  mean in English?',o:['Dog','Cat','Lion','Bird'],c:2},

middle:[
  {id:1,passage:{label:'Read the passage then answer Q1–Q3:',text:'ذَهَبَ أَحْمَدُ إِلَى الْمَسْجِدِ كُلَّ يَوْمٍ. هُوَ يُحِبُّ قِرَاءَةَ الْقُرْآنِ الْكَرِيمِ. قَالَ أَبُوهُ: الْعِلْمُ نُورٌ.'},

  {id:8,t:'How do you say "in the house" using a preposition?',o:['على البيت','في البيت','من البيت','إلى البيت'],c:1},
  {id:9,t:'Which Surah is the opening chapter of the Quran?',o:['Al-Baqarah','Al-Ikhlas','Al-Fatiha','Al-Nas'],c:2},
  {id:10,t:'What does  بِسْمِ اللَّهِ  mean?',o:['Praise be to God','In the name of God','God is great','Thanks to God'],c:1},
  {id:11,t:'Identify the subject (المبتدأ) in:  الْوَلَدُ طَالِبٌ',o:['طَالِبٌ','الْوَلَدُ','Both','Neither'],c:1},
  {id:12,t:'What is the past tense of  يَذْهَبُ  (he goes)?',o:['ذَهَبَ','يَذْهَبُ','اذْهَبْ','ذَاهِبٌ'],c:0},
  {id:13,t:'Which word means "knowledge" in Arabic?',o:['صبر','علم','حلم','نور'],c:1},

  {id:15,t:'How many Juz (parts) are in the Holy Quran?',o:['20','25','30','40'],c:2}

// ─── HIGH SCHOOL (Ages 15–18) ────────────────────────────────────────────

// Passage used for Q1–Q3
highschool:[

  {id:5,t:'What is the Verbal Noun (مصدر) of  كَتَبَ ?',o:['كِتَابَة','كَاتِب','مَكْتُوب','كُتُب'],c:0},
  {id:6,t:'What is the Dual form (المثنى) of  كِتَاب ?',o:['كُتُب','كِتَابَيْنِ','كِتَابَات','كَاتِبَان'],c:1},
  {id:7,t:'In Arabic, the Conditional sentence uses which particle?',o:['إِنَّ','إِنْ','إِلَّا','إِنَّمَا'],c:1},

  {id:12,t:'Which grammatical case is marked by Damma (ـُ)?',o:['Genitive','Accusative','Nominative','Jussive'],c:2},

  {id:20,t:'How many letters in the Arabic alphabet?',o:['26','28','29','30'],c:1}

// ─── ADULT / PROFESSIONAL (Ages 18+) ─────────────────────────────────────

  {id:1,passage:{label:'Analyze this Quranic verse (Q1–Q3):',text:'وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا ﴿٢﴾ وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ',note:'(Surah At-Talaq: 2–3)'},

  {id:3,passage:{same:true},t:'What tajweed rule governs  مِنْ حَيْثُ  (noon sakinah before ha)?',o:['Idgham without ghunnah','Idhar (clear pronunciation)','Ikhfa','Iqlab'],c:1},
  {id:4,t:'In Arabic morphology, what is the measure (وزن) of the word  مُكَاتِب ?',o:['فَاعِل','مُفَاعِل','فَعَّال','مُفَعِّل'],c:1},
  {id:5,t:'What is the difference between  إِنَّ  and  أَنَّ  in Arabic grammar?',o:['No difference','إِنَّ follows a sentence; أَنَّ follows a verb','إِنَّ is for past; أَنَّ for future','إِنَّ is nominal; أَنَّ is verbal'],c:1},

  {id:10,t:'What is the CEFR level that RQAP Level 2 (Asasi) corresponds to?',o:['A1','A2','B1','B2'],c:2},
  {id:11,t:'In Arabic grammar,  الحال  (Hal) serves what function?',o:['Subject of the sentence','Describes the state of the doer/object during the action','Defines the verb tense','Acts as a conjunction'],c:1},
  {id:12,t:'What does the tajweed rule  القلقلة  (Qalqalah) apply to?',o:['All letters','Only long vowels','Letters: ق ط ب ج د when sukun','Solar letters only'],c:2},
  {id:13,t:'In Balaghah,  التَّقْدِيم وَالتَّأْخِير  (fronting/delaying) is used for:',o:['Changing verb tense','Emphasis and rhetorical contrast','Connecting two sentences','Describing plurals'],c:1},
  {id:14,t:'The RQAP exam assesses proficiency across which three dimensions?',o:['Writing, Reading, Listening','Receptive, Productive, and Interactive','Grammar, Vocabulary, Pronunciation','Tajweed, Fiqh, History'],c:1},
  {id:15,t:'What is  النَّعْت السَّبَبِي  (causal adjective) in Arabic?',o:['An adjective matching the noun in all 4 features','An adjective describing something related to the noun','A verbal adjective','An adjective in comparative form'],c:1},
  {id:16,t:'In the Quran, what is  الْوَقْف الْمُطْلَق  (absolute stop)?',o:['Recommended pause at end of complete meaning','Mandatory stop mid-verse','Pause forbidden','Optional stop anywhere'],c:0},
  {id:17,t:'Which Arabic grammatical concept describes agreement in gender, number, case & definiteness?',o:['الإضافة','التطابق (agreement)','الإعراب','الصرف'],c:1},
  {id:18,t:'In RQAP assessment, portfolio evidence is:',o:['Not required','Required for all levels','Required for Level 2 and above','Optional but recommended'],c:2},
  {id:19,t:'What is  المفعول المطلق  (Absolute Object) used for in Arabic?',o:['To show direction','To emphasize or clarify the verb','To indicate time','To show cause'],c:1},
  {id:20,t:'The recitation method used in most of the Arab world is:',o:['Warsh','Qalun','Hafs an Asim','Ad-Duri'],c:2},
  {id:21,t:'What distinguishes  التَّشْبِيه البَلِيغ  (Concise Simile) from a regular simile?',o:['It uses the word كَأَنَّ','Both أداة and وجه الشبه are omitted','It compares two nouns directly without أداة','It is only used in poetry'],c:2},
  {id:22,t:'In RQAP certification, what is the standard retake waiting period after a failed attempt?',o:['1 week','1 month','3 months','6 months'],c:2},
  {id:23,t:'What Arabic term refers to the science of Quranic readings (recitation variants)?',o:['التجويد','القراءات','الصرف','البلاغة'],c:1},
  {id:24,t:'Which of the following is a feature of  الأسلوب الخبري  (declarative style)?',o:['It contains a question','It issues a command','It states information as true or false','It expresses a wish'],c:2},
  {id:25,t:'RQAP Level 2 certificate validity period is:',o:['1 year','2 years','3 years','5 years'],c:3}
]};
function App(){
  const [screen,setScreen]=useState('home');
  const [level,setLevel]=useState(null);
  const [info,setInfo]=useState({name:'',email:'',age:''});
  const [qIdx,setQIdx]=useState(0);
  const [answers,setAnswers]=useState({});
  const [selected,setSelected]=useState(null);
  const [confirmed,setConfirmed]=useState(false);
  const [timeLeft,setTimeLeft]=useState(0);
  const timerRef=useRef(null);
  const passageShown=useRef(null);

  useEffect(()=>{
    if(screen==='exam'){
      timerRef.current=setInterval(()=>setTimeLeft(t=>{if(t<=1){clearInterval(timerRef.current);setScreen('results');return 0;}return t-1;}),1000);
    }
    return()=>clearInterval(timerRef.current);
  },[screen]);

  const startExam=(lv)=>{setLevel(lv);setScreen('info');};
  const beginExam=()=>{
    const qs=QS[level.id];
    setQIdx(0);setAnswers({});setSelected(null);setConfirmed(false);
    setTimeLeft(level.dur*60);setScreen('exam');passageShown.current=null;
  };
  const selectOpt=(i)=>{if(!confirmed){setSelected(i);}};
  const confirm=()=>{
    if(selected===null)return;
    setAnswers(a=>({...a,[qIdx]:selected}));
    setConfirmed(true);
  };
  const next=()=>{
    const qs=QS[level.id];
    if(qIdx<qs.length-1){setQIdx(q=>q+1);setSelected(null);setConfirmed(false);}
    else{clearInterval(timerRef.current);setScreen('results');}
  };

  const calcScore=()=>{
    const qs=QS[level.id];
    let correct=0;
    qs.forEach((q,i)=>{if(answers[i]===q.c)correct++;});
    return{correct,total:qs.length,pct:Math.round((correct/qs.length)*100)};
  };

  const fmt=(s)=>{const m=Math.floor(s/60),sec=s%60;return m+':'+(sec<10?'0':'')+sec;};

  if(screen==='home'){
    return(
      <div className="app">
        <div className="hdr home">
          <div className="ar">جُذُور — الاختبار العربي القرآني</div>
          <h1>The Roots – Quranic Arabic Proficiency</h1>
          <div className="sub">Select your level to begin</div>
        </div>
        <div className="cnt">
          <div className="ls">
            <h2>Choose Your Level</h2>
            <p>Age-appropriate exams for non-native Arabic learners — from beginners to advanced professionals</p>
            <div className="lg">
              {Object.values(LC).map(lv=>(
                <div key={lv.id} className={"lc "+lv.id} onClick={()=>startExam(lv)}>
                  <span className="li">{lv.icon}</span>
                  <h3>{lv.name}</h3>
                  <div className="ab">{lv.age}</div>
                  <div className="ld">{lv.desc}</div>
                  <ul className="ls2">{lv.skills.map((s,i)=><li key={i}>{s}</li>)}</ul>
                  <div className="ab">{lv.q} questions · {lv.dur} min · Pass: {lv.pass}%</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  if(screen==='info'){
    return(
      <div className="app">
        <div className={"hdr "+level.color}>
          <div className="ar">{level.ar}</div>
          <h1>{level.name} Level</h1>
          <div className="sub">{level.age} · {level.q} Questions · {level.dur} min</div>
        </div>
        <div className="cnt">
          <div className="if">
            <h2>Candidate Information</h2>
            <div className="fg"><label>Full Name</label>
              <input value={info.name} onChange={e=>setInfo({...info,name:e.target.value})} placeholder="Enter your full name"/></div>
            <div className="fg"><label>Email Address</label>
              <input type="email" value={info.email} onChange={e=>setInfo({...info,email:e.target.value})} placeholder="Enter your email"/></div>
            <div className="fg"><label>Age</label>
              <input type="number" value={info.age} onChange={e=>setInfo({...info,age:e.target.value})} placeholder="Your age"/></div>
            <button className="btn" onClick={()=>{if(info.name.trim())beginExam();}} disabled={!info.name.trim()}>
              Begin Examination →
            </button>
            <button className="btn sec" onClick={()=>setScreen('home')}>← Back to Levels</button>
          </div>
        </div>
      </div>
    );
  }

  if(screen==='exam'){
    const qs=QS[level.id];
    const q=qs[qIdx];
    const pct=((qIdx+1)/qs.length)*100;
    const warn=timeLeft<120;
    const showPassage=q.passage&&!q.passage.same;
    const samePassage=q.passage&&q.passage.same;
    if(showPassage)passageShown.current=q.passage;
    const currentPassage=showPassage?q.passage:(samePassage?passageShown.current:null);
    return(
      <div className="app">
        <div className={"hdr "+level.color}>
          <h1>{level.name} Exam</h1>
          <div className="sub">{info.name}</div>
        </div>
        <div className="cnt">
          <div className="pb"><div className="pf" style={{width:pct+'%'}}></div></div>
          <div className="qn">Question {qIdx+1} of {qs.length}</div>
          <div className={"tm"+(warn?' warn':'')}>⏱ {fmt(timeLeft)}{warn?' — Hurry!':''}</div>
          {currentPassage&&(
            <div>
              <div className="pl">{currentPassage.label}</div>
              <div className="passage">{currentPassage.text}</div>
              {currentPassage.note&&<div style={{fontSize:'.8em',color:'#888',marginBottom:'10px',textAlign:'right'}}>{currentPassage.note}</div>}
            </div>
          )}
          <div className="qt">{q.t}</div>
          <div className="oa">
            {q.o.map((opt,i)=>{
              let cls='ob';
              const isAr=/[؀-ۿ]/.test(opt);
              if(isAr)cls+=' ar-opt';
              if(confirmed){
                if(i===q.c)cls+=' cor';
                else if(i===selected&&selected!==q.c)cls+=' wr';
              }else if(i===selected){cls+=' sel';}
              return(
                <button key={i} className={cls} onClick={()=>selectOpt(i)}>
                  <span className="ol">{String.fromCharCode(65+i)}</span>
                  {opt}
                </button>
              );
            })}
          </div>
          <div className="nv">
            {!confirmed?
              <button className="btn" onClick={confirm} disabled={selected===null}>Confirm Answer</button>:
              <button className="btn" onClick={next}>{qIdx<qs.length-1?'Next Question →':'Finish Exam ✓'}</button>
            }
          </div>
        </div>
      </div>
    );
  }

  if(screen==='results'){
    const {correct,total,pct}=calcScore();
    const passed=pct>=level.pass;
    const qs=QS[level.id];
    return(
      <div className="app">
        <div className={"hdr "+level.color}>
          <h1>Exam Complete</h1>
          <div className="sub">{level.name} Level · {info.name}</div>
        </div>
        <div className="cnt">
          <div className="rs">
            <div className="sc">{pct}%</div>
            <div>{correct} out of {total} correct</div>
            <div className={"sb "+(passed?'pass':'fail')}>{passed?'✅ PASSED':'❌ Did Not Pass'}</div>
            {passed&&(
              <div className="cert">
                <h3>🏅 Certificate of Achievement</h3>
                <div>This certifies that</div>
                <div className="cn">{info.name}</div>
                <div className="cl">has passed the <strong>Roots Quranic Arabic Proficiency</strong></div>
                <div className="cl"><strong>{level.name} Level</strong> with a score of <strong>{pct}%</strong></div>
                <div className="cs">Issued by Pathways School · {new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
              </div>
            )}
            {!passed&&<p style={{color:'#888',margin:'12px 0',fontSize:'.95em'}}>Required passing score: {level.pass}% · Please review the material and try again.</p>}
          </div>
          <div className="rv">
            <h4>📋 Answer Review</h4>
            {qs.map((q,i)=>(
              <div key={i} className="ri">
                <div className="rq">{i+1}. {q.t}</div>
                {answers[i]!==undefined&&answers[i]!==q.c&&<div className="rw">✗ Your answer: {q.o[answers[i]]}</div>}
                <div className="ra">✓ Correct: {q.o[q.c]}</div>
              </div>
            ))}
          </div>
          <button className="btn" onClick={()=>{setScreen('home');setAnswers({});setSelected(null);setConfirmed(false);setQIdx(0);}}>Try Another Level</button>
          <button className="btn sec" onClick={()=>{setQIdx(0);setAnswers({});setSelected(null);setConfirmed(false);setTimeLeft(level.dur*60);setScreen('exam');passageShown.current=null;}}>Retry This Level</button>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
