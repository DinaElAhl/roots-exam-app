<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>The Roots - Arabic and Quran Proficiency</title>
  <meta name="description" content="The Roots - A Duolingo-inspired Arabic Language and Quran proficiency assessment app with 6 levels, prep cards, vocabulary, and auto-advance."/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ar:#2563eb;--ar-lt:#dbeafe;--ar-dk:#1e40af;
  --qu:#16a34a;--qu-lt:#dcfce7;--qu-dk:#15803d;
  --gold:#f59e0b;--red:#ef4444;--green:#22c55e;
  --bg:#f8fafc;--card:#fff;--txt:#1e293b;--sub:#64748b;
  --radius:16px;--shadow:0 4px 24px rgba(0,0,0,.10);
  --font-ar:'Amiri','Traditional Arabic',serif;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}
.topbar{width:100%;max-width:640px;display:flex;align-items:center;gap:12px;margin-bottom:24px}
.topbar .back-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:6px;border-radius:8px;color:var(--sub);transition:background .15s}
.topbar .back-btn:hover{background:#e2e8f0}
.topbar .level-label{font-weight:700;font-size:15px;color:var(--sub);flex:1}
.hud{width:100%;max-width:640px;display:flex;align-items:center;gap:10px;margin-bottom:18px}
.hearts{display:flex;gap:4px;font-size:22px;letter-spacing:1px}
.xp-wrap{flex:1;background:#e2e8f0;border-radius:99px;height:12px;overflow:hidden}
.xp-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.xp-fill.arabic{background:linear-gradient(90deg,#3b82f6,#6366f1)}
.xp-fill.quran{background:linear-gradient(90deg,#22c55e,#16a34a)}
.streak-badge{background:var(--gold);color:#fff;border-radius:99px;padding:3px 12px;font-weight:800;font-size:13px;display:flex;align-items:center;gap:4px}
.level-dots{display:flex;gap:8px;margin-bottom:20px}
.level-dot{width:28px;height:28px;border-radius:50%;border:3px solid #e2e8f0;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#94a3b8;transition:all .3s}
.level-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.level-dot.active{background:#fff;border-color:currentColor;color:currentColor;box-shadow:0 0 0 4px rgba(0,0,0,.08)}
.level-dot.active.arabic{color:var(--ar);border-color:var(--ar)}
.level-dot.active.quran{color:var(--qu);border-color:var(--qu)}
.home-hero{text-align:center;margin-bottom:32px;padding-top:24px}
.home-hero .logo{font-size:56px;margin-bottom:8px}
.home-hero h1{font-size:28px;font-weight:800;color:var(--txt);margin-bottom:6px}
.home-hero p{color:var(--sub);font-size:16px;line-height:1.6}
.track-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:560px}
.track-card{border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.track-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.15)}
.track-card.arabic{background:linear-gradient(135deg,#2563eb,#6366f1);color:#fff}
.track-card.quran{background:linear-gradient(135deg,#16a34a,#059669);color:#fff}
.track-card .emoji{font-size:48px;margin-bottom:12px;display:block}
.track-card h2{font-size:18px;font-weight:800;margin-bottom:4px}
.track-card p{font-size:13px;opacity:.85;line-height:1.5}
.track-card .badge-row{display:flex;gap:6px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.track-card .badge{background:rgba(255,255,255,.22);border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700}
.how-it-works{width:100%;max-width:560px;background:var(--card);border-radius:var(--radius);padding:20px;margin-top:20px;box-shadow:var(--shadow)}
.how-it-works h3{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--txt)}
.how-step{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start}
.how-step .num{min-width:28px;height:28px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--sub)}
.how-step p{font-size:13px;color:var(--sub);line-height:1.5;margin-top:4px}
.name-card{background:var(--card);border-radius:var(--radius);padding:32px 24px;width:100%;max-width:480px;box-shadow:var(--shadow);text-align:center}
.name-card .track-icon{font-size:56px;margin-bottom:16px}
.name-card h2{font-size:22px;font-weight:800;margin-bottom:6px}
.name-card p{color:var(--sub);font-size:14px;margin-bottom:24px;line-height:1.6}
.name-input{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;outline:none;transition:border .2s}
.name-input:focus{border-color:var(--ar)}
.name-input.quran-focus:focus{border-color:var(--qu)}
.btn-primary{width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;transition:opacity .15s,transform .1s;color:#fff}
.btn-primary:hover{opacity:.9}
.btn-primary:active{transform:scale(.98)}
.btn-arabic{background:linear-gradient(135deg,#2563eb,#6366f1)}
.btn-quran{background:linear-gradient(135deg,#16a34a,#059669)}
.prep-header{text-align:center;margin-bottom:24px;width:100%;max-width:640px}
.prep-header .phase-chip{display:inline-block;background:#fef3c7;color:#92400e;border-radius:99px;padding:5px 16px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.prep-header h2{font-size:24px;font-weight:800;margin-bottom:6px}
.prep-header p{color:var(--sub);font-size:14px}
.prep-cards-wrap{width:100%;max-width:640px;display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.prep-tip-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:flex-start;border-left:5px solid transparent}
.prep-tip-card.tip-ar{border-color:var(--ar)}
.prep-tip-card.tip-qu{border-color:var(--qu)}
.prep-tip-card .icon{font-size:28px;flex-shrink:0}
.prep-tip-card .content h4{font-size:15px;font-weight:700;margin-bottom:4px}
.prep-tip-card .content p{font-size:13px;color:var(--sub);line-height:1.6}
.prep-tip-card .arabic-eg{font-family:var(--font-ar);font-size:22px;color:var(--txt);direction:rtl;text-align:right;margin-top:8px;padding:8px 12px;background:#f8fafc;border-radius:8px;line-height:1.8}
.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:640px;margin-bottom:20px}
.vocab-card{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);text-align:center;cursor:pointer;transition:transform .15s}
.vocab-card:hover{transform:scale(1.03)}
.vocab-card .ar-word{font-family:var(--font-ar);font-size:26px;direction:rtl;color:var(--txt);line-height:1.6}
.vocab-card .en-word{font-size:13px;color:var(--sub);margin-top:4px}
.vocab-card .trans{font-size:11px;color:#94a3b8;font-style:italic}
.exam-q-wrap{width:100%;max-width:640px}
.q-counter{font-size:13px;color:var(--sub);margin-bottom:16px;text-align:center;font-weight:600}
.q-card{background:var(--card);border-radius:var(--radius);padding:28px 24px;box-shadow:var(--shadow);margin-bottom:20px}
.q-card .q-text{font-size:18px;font-weight:700;line-height:1.6;color:var(--txt);margin-bottom:8px}
.q-card .q-arabic{font-family:var(--font-ar);font-size:28px;direction:rtl;text-align:right;color:var(--txt);line-height:2;margin-bottom:8px;background:#f8fafc;border-radius:10px;padding:12px 16px}
.q-card .q-hint{font-size:13px;color:var(--sub);font-style:italic}
.options-wrap{display:flex;flex-direction:column;gap:10px;width:100%;max-width:640px}
.opt-btn{background:var(--card);border:2px solid #e2e8f0;border-radius:12px;padding:16px 20px;text-align:left;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;color:var(--txt)}
.opt-btn:hover:not(:disabled){background:#f1f5f9;border-color:#cbd5e1;transform:translateX(4px)}
.opt-btn .opt-letter{width:30px;height:30px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.opt-btn.correct{background:#dcfce7;border-color:var(--green);color:#15803d}
.opt-btn.correct .opt-letter{background:var(--green);color:#fff}
.opt-btn.wrong{background:#fee2e2;border-color:var(--red);color:#b91c1c}
.opt-btn.wrong .opt-letter{background:var(--red);color:#fff}
.opt-btn.show-correct{background:#dcfce7;border-color:var(--green);color:#15803d;opacity:.8}
.opt-btn.show-correct .opt-letter{background:var(--green);color:#fff}
.opt-btn:disabled{cursor:default}
.opt-btn .ar-opt{font-family:var(--font-ar);font-size:20px;direction:rtl}
.feedback-panel{width:100%;position:fixed;bottom:0;left:0;padding:20px 16px;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.feedback-panel.correct-fb{background:#dcfce7;border-top:4px solid var(--green)}
.feedback-panel.wrong-fb{background:#fee2e2;border-top:4px solid var(--red)}
.feedback-panel.hidden-fb{transform:translateY(110%)}
.feedback-inner{max-width:640px;margin:0 auto;display:flex;align-items:flex-start;gap:14px}
.feedback-icon{font-size:34px;flex-shrink:0}
.feedback-text h3{font-size:17px;font-weight:800;margin-bottom:4px}
.feedback-text p{font-size:13px;line-height:1.6;color:var(--txt)}
.feedback-next-btn{margin-left:auto;background:var(--green);color:#fff;border:none;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0;align-self:center}
.feedback-next-btn.wrong-btn{background:var(--red)}
.result-card{background:var(--card);border-radius:var(--radius);padding:32px 24px;width:100%;max-width:480px;box-shadow:var(--shadow);text-align:center}
.result-circle{width:120px;height:120px;border-radius:50%;border:8px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;font-weight:900}
.result-circle.pass{border-color:var(--green);color:var(--green)}
.result-circle.fail{border-color:var(--red);color:var(--red)}
.result-card h2{font-size:22px;font-weight:800;margin-bottom:8px}
.result-card p{color:var(--sub);font-size:14px;line-height:1.6;margin-bottom:20px}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
.result-stat{background:#f8fafc;border-radius:12px;padding:14px 8px;text-align:center}
.result-stat .val{font-size:22px;font-weight:800;color:var(--txt)}
.result-stat .lbl{font-size:11px;color:var(--sub);margin-top:2px}
.cert-wrap{background:var(--card);border-radius:var(--radius);padding:36px 28px;width:100%;max-width:560px;box-shadow:0 8px 48px rgba(0,0,0,.15);text-align:center;border:6px solid var(--gold)}
.cert-wrap .cert-top{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px}
.cert-wrap h1{font-size:28px;font-weight:900;margin-bottom:4px}
.cert-wrap .cert-name{font-size:24px;font-weight:800;color:var(--ar);margin:16px 0}
.cert-wrap .cert-level{font-family:var(--font-ar);font-size:32px;direction:rtl;color:var(--txt);margin-bottom:8px}
.cert-wrap .cert-cefr{display:inline-block;background:var(--gold);color:#fff;border-radius:99px;padding:6px 20px;font-size:18px;font-weight:800;margin-bottom:16px}
.cert-wrap .cert-desc{font-size:14px;color:var(--sub);line-height:1.7;max-width:360px;margin:0 auto 20px}
.cert-wrap .cert-seal{font-size:48px;margin-bottom:8px}
.cert-wrap .cert-date{font-size:12px;color:#94a3b8}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.1)}70%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.anim-pop{animation:popIn .3s ease}
.anim-shake{animation:shakeX .4s ease}
.anim-bounce{animation:bounceIn .5s ease}
.anim-slide{animation:slideUp .3s ease}
.mascot{font-size:64px;display:block;margin:0 auto 10px;animation:bounceIn .6s ease}
@media(max-width:480px){.track-grid{grid-template-columns:1fr}.vocab-grid{grid-template-columns:1fr 1fr}.q-card .q-text{font-size:16px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const ARABIC_DATA=[{"id":"a1","cefr":"A1","name":"Beginner","nameAr":"المُبتدِئ","auc":"AUC Arabic 101","curricula":"ABY Book 1 Units 1-5 | Madinah Arabic Book 1 Lessons 1-6","passPct":70,"timeMin":20,"color":"#2563eb","prepTips":[{"icon":"🔤","title":"Arabic Alphabet","text":"Arabic has 28 letters. All are consonants - short vowels are shown as small marks (Harakat). We read right to left.","arabic":"أ ب ت ث ج ح خ د ذ ر ز س ش ص ض ط ظ ع غ ف ق ك ل م ن و هـ ي"},{"icon":"🗣️","title":"Basic Greetings","text":"Learn the essential greetings used every day in Arabic.","arabic":"السَلَامُ علَيكُمْ — Peace be upon you\nأَهْلًا وَسَهْلًا — Welcome\nكَيْفَ حَالُكَ؟ — How are you?"},{"icon":"📝","title":"Pronouns","text":"Arabic has separate pronouns for masculine / feminine and for singular / dual / plural.","arabic":"أَنَا (I) | أَنْتَ (you m.) | أَنْتِ (you f.) | هُوَ (he) | هِيَ (she)"}],"vocab":[{"ar":"كِتَابٌ","en":"Book","tr":"kitaab"},{"ar":"مَدْرَسَةٌ","en":"School","tr":"madrasa"},{"ar":"بَيْتٌ","en":"House","tr":"bayt"},{"ar":"طَالِبٌ","en":"Student","tr":"taalib"},{"ar":"مُعَلِّمٌ","en":"Teacher","tr":"mualim"},{"ar":"قَلَمٌ","en":"Pen","tr":"qalam"}],"questions":[{"q":"What does \"مَرْحَبًا\" mean?","arabic":"مَرْحَبًا","opts":["Hello/Welcome","Goodbye","Thank you","Sorry"],"ans":0,"exp":"مَرْحَبًا is the most common Arabic greeting meaning \"Welcome\" or \"Hello\"."},{"q":"Which letter makes the \"b\" sound?","arabic":"","opts":["أ","ب","ت","ث"],"ans":1,"exp":"\"ب\" makes the \"b\" sound. It is the second letter of the Arabic alphabet."},{"q":"What does \"كِتَابٌ\" mean?","arabic":"كِتَابٌ","opts":["Pen","Chair","Book","Table"],"ans":2,"exp":"كِتَابٌ means \"book\". The tanwin at the end shows it is indefinite."},{"q":"How do you say \"I\" in Arabic?","arabic":"","opts":["أَنْتَ","هُوَ","نَحْنُ","أَنَا"],"ans":3,"exp":"أَنَا means \"I\". أَنْتَ = you, هُوَ = he, نَحْنُ = we."},{"q":"Which word means \"teacher\"?","arabic":"","opts":["طَالِبٌ","مُعَلِّمٌ","كِتَابٌ","بَيْتٌ"],"ans":1,"exp":"مُعَلِّمٌ means teacher. طَالِبٌ means student."},{"q":"Arabic is written and read from:","arabic":"","opts":["Left to right","Right to left","Top to bottom","Any direction"],"ans":1,"exp":"Arabic is written and read from right to left, unlike English."},{"q":"What does \"شُكْرًا\" mean?","arabic":"شُكْرًا","opts":["Please","Sorry","Thank you","Excuse me"],"ans":2,"exp":"شُكْرًا means \"Thank you\"."},{"q":"How many letters does the Arabic alphabet have?","arabic":"","opts":["26","28","30","22"],"ans":1,"exp":"The Arabic alphabet has 28 letters, all of which are consonants."},{"q":"What does \"بَيْتٌ\" mean?","arabic":"بَيْتٌ","opts":["School","Market","House","Street"],"ans":2,"exp":"بَيْتٌ means \"house/home\"."},{"q":"The greeting \"السَلَامُ علَيكُمْ\" is used:","arabic":"السَلَامُ علَيكُمْ","opts":["Only at night","Only on Fridays","As a general greeting anytime","Only in mosques"],"ans":2,"exp":"السَلَامُ علَيكُمْ is used as a general greeting at any time of day."}]},{"id":"a2","cefr":"A2","name":"Elementary","nameAr":"الأَسَاسِيُّ","auc":"AUC Arabic 102","curricula":"ABY Book 1 Units 6-16 | Madinah Book 1 Lessons 7-20","passPct":70,"timeMin":25,"color":"#2563eb","prepTips":[{"icon":"🔢","title":"Numbers and Gender","text":"Arabic nouns are either masculine or feminine. Feminine nouns often end in ta marbuta. Numbers 3-10 take opposite gender.","arabic":"وَاحِدٌ (1) | اِثْنَانِ (2) | ثَلَاثَةُ كُتُبٍ (3 books)"},{"icon":"📌","title":"Definite Article","text":"Add al- before a noun to make it definite. Sun letters cause the l to assimilate.","arabic":"كِتَابٌ → الْكِتَابُ (the book)\nشَمْسٌ → الشَّمْسُ (the sun)"},{"icon":"🏠","title":"Possessives","text":"Possession uses pronoun suffixes or iDafa (genitive) construction.","arabic":"بَيْتُ الطَّالِبِ — the student's house\nكِتَابِي — my book"}],"vocab":[{"ar":"الأُسْرَةُ","en":"Family","tr":"al-usra"},{"ar":"أَبٌ","en":"Father","tr":"ab"},{"ar":"أُمٌّ","en":"Mother","tr":"umm"},{"ar":"يَوْمٌ","en":"Day","tr":"yawm"},{"ar":"كَبِيرٌ","en":"Big/Old","tr":"kabiir"},{"ar":"صَغِيرٌ","en":"Small/Young","tr":"saghiir"}],"questions":[{"q":"What is the Arabic word for \"family\"?","arabic":"","opts":["بَيْتٌ","الأُسْرَةُ","مَدْرَسَةٌ","سُوقٌ"],"ans":1,"exp":"الأُسْرَةُ means \"the family\"."},{"q":"Which ending usually marks a feminine noun?","arabic":"","opts":["ٌـ","يـِ","ةَـ","ُونَـ"],"ans":2,"exp":"The ta marbuta typically marks feminine nouns: مَدْرَسَةٌ (school), طَالِبَةٌ (female student)."},{"q":"How do you make \"كِتَابٌ\" definite?","arabic":"كِتَابٌ","opts":["كِتَابِي","الْكِتَابُ","كِتَابٌ","كِتَابَةٌ"],"ans":1,"exp":"Add al- to make it definite: الْكِتَابُ (the book). The tanwin disappears."},{"q":"What does \"أَبٌ\" mean?","arabic":"أَبٌ","opts":["Brother","Uncle","Father","Son"],"ans":2,"exp":"أَبٌ means \"father\". أُمٌّ = mother, أَخٌ = brother, اِبْنٌ = son."},{"q":"\"يَوْمٌ\" means:","arabic":"يَوْمٌ","opts":["Week","Month","Year","Day"],"ans":3,"exp":"يَوْمٌ means \"day\". أُسْبُوعٌ = week, شَهْرٌ = month, سَنَةٌ = year."},{"q":"What does \"كَبِيرٌ\" mean?","arabic":"كَبِيرٌ","opts":["New","Old/Big","Beautiful","Small"],"ans":1,"exp":"كَبِيرٌ means big or old. صَغِيرٌ = small/young."},{"q":"In Arabic, the adjective comes:","arabic":"","opts":["Before the noun","After the noun","Either position","In a separate sentence"],"ans":1,"exp":"Arabic adjectives follow the noun: طَالِبٌ ذَكِيٌّ = a smart student."},{"q":"How do you say \"my book\" in Arabic?","arabic":"","opts":["كِتَابُهُ","كِتَابُكَ","كِتَابِي","كِتَابُهَا"],"ans":2,"exp":"كِتَابِي = my book. The suffix i means \"my\"."},{"q":"What does \"صَغِيرٌ\" mean?","arabic":"صَغِيرٌ","opts":["Tall","Beautiful","Small/Young","Far"],"ans":2,"exp":"صَغِيرٌ means small or young."},{"q":"The word \"الشَّمْسُ\" means:","arabic":"الشَّمْسُ","opts":["Moon","Star","Sky","Sun"],"ans":3,"exp":"الشَّمْسُ means \"the sun\". ش is a sun letter."},{"q":"Which phrase means \"the student's book\"?","arabic":"","opts":["كِتَابٌ طَالِبٌ","كِتَابُ الطَّالِبِ","طَالِبُ الْكِتَابِ","الطَّالِبُ كِتَابُ"],"ans":1,"exp":"كِتَابُ الطَّالِبِ = the student's book (iDafa construction)."},{"q":"How do you say \"How are you?\" to a male?","arabic":"","opts":["كَيْفَ حَالُكِ؟","مَا اسْمُكَ؟","كَيْفَ حَالُكَ؟","أَيْنَ أَنْتَ؟"],"ans":2,"exp":"كَيْفَ حَالُكَ؟ is for males. كَيْفَ حَالُكِ؟ is for females."}]},{"id":"b1","cefr":"B1","name":"Intermediate","nameAr":"المُتَوَسِّطُ","auc":"AUC Arabic 201","curricula":"ABY Book 2 Units 1-10 | Al-Kitaab Part 1","passPct":70,"timeMin":35,"color":"#4f46e5","prepTips":[{"icon":"⚖️","title":"Dual and Plural","text":"Arabic has singular, dual, and plural. Dual adds -aani/-ayni. Plurals are often irregular.","arabic":"كِتَابٌ (1 book) | كِتَابَانِ (2 books) | كُتُبٌ (3+ books)"},{"icon":"🕐","title":"Verb Tenses","text":"Arabic verbs are built on 3-letter roots. Past tense is base form. Present adds prefixes/suffixes.","arabic":"كَتَبَ (he wrote) | يَكتُبُ (he writes) | سَيَكتُبُ (he will write)"},{"icon":"🧩","title":"Root System","text":"Most Arabic words share 3-letter roots. Knowing a root unlocks dozens of related words.","arabic":"ك-ت-ب (write): كَتَبَ | كِتَابٌ | مَكتَبٌ | كَاتِبٌ | مَكتُوبٌ"}],"vocab":[{"ar":"يَكتُبُ","en":"He writes","tr":"yaktub"},{"ar":"يَقْرَأُ","en":"He reads","tr":"yaqra"},{"ar":"مَكتَبٌ","en":"Office/Desk","tr":"maktab"},{"ar":"مَدِينَةٌ","en":"City","tr":"madiina"},{"ar":"يَذْهَبُ","en":"He goes","tr":"yadhhab"},{"ar":"كُتُبٌ","en":"Books (pl.)","tr":"kutub"}],"questions":[{"q":"What is the broken plural of \"كِتَابٌ\" (book)?","arabic":"كِتَابٌ","opts":["كِتَابَانِ","كِتَابَاتٌ","كُتُبٌ","كِتَابِيٌّ"],"ans":2,"exp":"كُتُبٌ is the broken plural of كِتَابٌ."},{"q":"Which is the correct past tense \"he wrote\"?","arabic":"","opts":["يَكتُبُ","كَتَبَ","اُكتُبْ","كَاتِبٌ"],"ans":1,"exp":"كَتَبَ = he wrote (past). يَكتُبُ = he writes (present)."},{"q":"What does \"مَكتَبٌ\" mean?","arabic":"مَكتَبٌ","opts":["Letter","Writer","Office/Desk","Library"],"ans":2,"exp":"مَكتَبٌ means office or desk. Root: ك-ت-ب."},{"q":"How do you say \"two books\" in Arabic?","arabic":"","opts":["كُتُبٌ","كِتَابٌ","كِتَابَانِ","كِتَابَاتٌ"],"ans":2,"exp":"Dual adds -aani (subject): كِتَابَانِ = two books."},{"q":"\"يَذْهَبُ إِلَى الْمَدْرَسَةِ\" means:","arabic":"يَذْهَبُ إِلَى الْمَدْرَسَةِ","opts":["He studies at school","He goes to school","He comes from school","He likes school"],"ans":1,"exp":"يَذْهَبُ = he goes, إِلَى = to, الْمَدْرَسَةِ = the school."},{"q":"Which preposition means \"in/at\"?","arabic":"","opts":["مِنْ","إِلَى","عَلَى","فِي"],"ans":3,"exp":"فِي means \"in\" or \"at\". مِنْ = from, إِلَى = to, عَلَى = on."},{"q":"From root ك-ت-ب, which word means \"writer\"?","arabic":"","opts":["كِتَابٌ","مَكتَبٌ","كَاتِبٌ","مَكتُوبٌ"],"ans":2,"exp":"كَاتِبٌ = writer (active participle). مَكتُوبٌ = written (passive participle)."},{"q":"What does \"مَدِينَةٌ\" mean?","arabic":"مَدِينَةٌ","opts":["Village","Town/City","Country","Region"],"ans":1,"exp":"مَدِينَةٌ means \"city/town\". Broken plural: مُدُنٌ."},{"q":"Which verb pattern means \"he is doing X (present)\"?","arabic":"","opts":["فَعَلَ","يَفْعُلُ","أَفْعَلَ","تَفَعَّلَ"],"ans":1,"exp":"يَفْعُلُ is the present tense pattern. The prefix ya- indicates 3rd person masculine singular."},{"q":"How do you express negation in the present tense?","arabic":"","opts":["لَمْ + past verb","لَا + present verb","مَا + past verb","لَيْسَ alone"],"ans":1,"exp":"لَا + present (muDari') negates current action: لَا يَكتُبُ = he does not write."},{"q":"What is the imperative form of كَتَبَ?","arabic":"","opts":["يَكتُبُ","اُكتُبْ","كَاتِبٌ","كِتَابَةٌ"],"ans":1,"exp":"اُكتُبْ! = Write! Drop the ya- prefix and add a connecting hamza."},{"q":"\"هُوَ طَالِبٌ مُجتَهِدٌ\" means:","arabic":"هُوَ طَالِبٌ مُجتَهِدٌ","opts":["He is a lazy student","She is hardworking","He is a hardworking student","He is a new teacher"],"ans":2,"exp":"هُوَ = he, طَالِبٌ = student, مُجتَهِدٌ = hardworking."},{"q":"What does \"يَقْرَأُ\" mean?","arabic":"يَقْرَأُ","opts":["He writes","He speaks","He reads","He studies"],"ans":2,"exp":"يَقْرَأُ = he reads. Root: ق-ر-أ. قَرَأَ = he read (past)."},{"q":"Which word means \"from\"?","arabic":"","opts":["فِي","عَلَى","مِنْ","بَيْنَ"],"ans":2,"exp":"مِنْ = from. مِنَ الْبَيْتِ = from the house."},{"q":"The ta marbuta is pronounced:","arabic":"","opts":["Always as t","Always silent","As a in pause, t when followed","As h"],"ans":2,"exp":"Ta marbuta is pronounced as a short a when the word is said alone, but as t when the sentence continues."}]},{"id":"b2","cefr":"B2","name":"Upper-Intermediate","nameAr":"فَوْقَ المُتَوَسِّطِ","auc":"AUC Arabic 202","curricula":"ABY Book 2 Units 11-20 | Al-Kitaab Part 2","passPct":70,"timeMin":45,"color":"#7c3aed","prepTips":[{"icon":"🔀","title":"Verb Patterns","text":"Arabic has 10 major verb patterns. Pattern II (faaala) often makes a verb causative.","arabic":"كَتَبَ (wrote) → كَتَّبَ (made write/dictated)\nعَلِمَ (knew) → عَلَّمَ (taught)"},{"icon":"📐","title":"Case Endings","text":"Arabic nouns have three cases: Nominative (-u), Accusative (-a), Genitive (-i).","arabic":"الطَّالِبُ يَدْرُسُ (subject -u)\nأَرَى الطَّالِبَ (object -a)\nكِتَابُ الطَّالِبِ (genitive -i)"},{"icon":"🔗","title":"Relative Clauses","text":"Arabic uses allathi (m.) / allati (f.) as relative pronouns = who/which/that.","arabic":"الطَّالِبُ الَّذِي يَدْرُسُ = the student who studies\nالْمَدْرَسَةُ الَّتِي زُرتُهَا = the school that I visited"}],"vocab":[{"ar":"يَستَطِيعُ","en":"He can","tr":"yastati"},{"ar":"أَثَّرَ","en":"He influenced","tr":"aththara"},{"ar":"يَتَكَلَّمُ","en":"He speaks","tr":"yatakallam"},{"ar":"مُجتَمَعٌ","en":"Society","tr":"mujtama"},{"ar":"الَّذِي","en":"Who/Which (m.)","tr":"alladhi"},{"ar":"اِقتِصَادٌ","en":"Economy","tr":"iqtisad"}],"questions":[{"q":"What does Pattern V verb \"takallama\" mean vs \"kallama\"?","arabic":"تَكَلَّمَ / كَلَّمَ","opts":["Same meaning","Reflexive: spoke generally","Causative: made someone speak","Passive: was spoken to"],"ans":1,"exp":"Pattern V (tafaaala) is often reflexive of Pattern II. كَلَّمَ = he addressed someone. تَكَلَّمَ = he spoke generally."},{"q":"In \"الطَّالِبُ يَدْرُسُ\", the -u on \"الطَّالِبُ\" shows:","arabic":"الطَّالِبُ يَدْرُسُ","opts":["Genitive case","Accusative case","Nominative case (subject)","Dual form"],"ans":2,"exp":"Damma (-u) marks nominative case, indicating the subject."},{"q":"Which relative pronoun is used for a feminine noun?","arabic":"","opts":["الَّذِي","مَنْ","الَّتِي","مَا"],"ans":2,"exp":"الَّتِي is used for feminine nouns. الَّذِي is for masculine."},{"q":"\"يَستَطِيعُ أَنْ يَكتُبَ\" means:","arabic":"يَستَطِيعُ أَنْ يَكتُبَ","opts":["He must write","He wrote","He can write","He likes writing"],"ans":2,"exp":"يَستَطِيعُ = he can/is able to (Pattern X). أَنْ + subjunctive follows modal verbs."},{"q":"What case does a noun take after a preposition?","arabic":"","opts":["Nominative","Accusative","Genitive","No change"],"ans":2,"exp":"Prepositions govern genitive case: فِي الْبَيْتِ = in the house (-i on bayt)."},{"q":"Pattern II verb \"عَلَّمَ\" relates to \"عَلِمَ\" how?","arabic":"عَلَّمَ / عَلِمَ","opts":["Same meaning","Causative: to teach (make know)","Passive: was known","Reflexive: learned"],"ans":1,"exp":"Pattern II is often causative. عَلِمَ = he knew; عَلَّمَ = he taught (caused to know)."},{"q":"What does \"مُجتَمَعٌ\" mean?","arabic":"مُجتَمَعٌ","opts":["Meeting","Mosque","Society/Community","Government"],"ans":2,"exp":"مُجتَمَعٌ = society. Root: ج-م-ع (gather)."},{"q":"The passive voice in past tense changes faaala to:","arabic":"","opts":["أَفْعَلَ","تَفَعَّلَ","فُعِلَ","اِفتَعَلَ"],"ans":2,"exp":"Passive changes inner vowels: كَتَبَ → كُتِبَ (it was written). Pattern: fu-ila."},{"q":"\"اِقتِصَادٌ\" means:","arabic":"اِقتِصَادٌ","opts":["Politics","Economy","History","Geography"],"ans":1,"exp":"اِقتِصَادٌ = economy. Root ق-ص-د means to intend/aim."},{"q":"Which sentence uses the accusative case correctly?","arabic":"","opts":["رَأَيْتُ الطَّالِبُ","رَأَيْتُ الطَّالِبِ","رَأَيْتُ الطَّالِبَ","رَأَيْتُ الطَّالِبَانِ"],"ans":2,"exp":"Direct objects take accusative: رَأَيْتُ الطَّالِبَ = I saw the student."},{"q":"What is the meaning of \"أَثَّرَ فِي\"?","arabic":"أَثَّرَ فِي","opts":["He studied about","He wrote about","He influenced/affected","He agreed with"],"ans":2,"exp":"أَثَّرَ فِي = to influence/affect. تَأثِيرٌ = influence (verbal noun)."},{"q":"\"يَتَكَلَّمُ العَرَبِيَّةَ بِطَلَاقَةٍ\" means:","arabic":"يَتَكَلَّمُ العَرَبِيَّةَ بِطَلَاقَةٍ","opts":["He studies Arabic fluently","He speaks Arabic fluently","He writes Arabic fluently","He understands Arabic fluently"],"ans":1,"exp":"يَتَكَلَّمُ = speaks, بِطَلَاقَةٍ = with fluency."},{"q":"In a verbal sentence, the verb:","arabic":"","opts":["Always comes last","Always comes first","Can be anywhere","Comes after object"],"ans":1,"exp":"In a verbal sentence, verb comes first: ذَهَبَ الطَّالِبُ = The student went. Standard Arabic word order: VSO."},{"q":"Which is the verbal noun of كَتَبَ?","arabic":"","opts":["كَاتِبٌ","مَكتُوبٌ","كِتَابَةٌ","مَكتَبٌ"],"ans":2,"exp":"كِتَابَةٌ is the verbal noun (masdar) of كَتَبَ."},{"q":"The phrase \"مَعَ ذَلِكَ\" means:","arabic":"مَعَ ذَلِكَ","opts":["Because of that","In spite of that","Nevertheless/However","Therefore"],"ans":2,"exp":"مَعَ ذَلِكَ = nevertheless / however. Common discourse connector at B2."},{"q":"\"الرَّأْيُ العَامُّ\" means:","arabic":"الرَّأْيُ العَامُّ","opts":["General knowledge","Public opinion","National security","Common sense"],"ans":1,"exp":"رَأْيٌ = opinion/view, عَامٌّ = general/public. Together: public opinion."},{"q":"In Arabic grammar, \"na't\" refers to:","arabic":"","opts":["A verb","An adjective","A subject","A conjunction"],"ans":1,"exp":"نَعْتٌ (or Sifa) is the term for adjective in Arabic grammar."},{"q":"Which negation is for past tense \"he did not write\"?","arabic":"","opts":["لَا يَكتُبُ","لَمْ يَكتُبْ","مَا كَتَبَ","لَنْ يَكتُبَ"],"ans":1,"exp":"لَمْ + jussive negates past: لَمْ يَكتُبْ = he did not write."}]},{"id":"c1","cefr":"C1","name":"Advanced","nameAr":"المُتَقدِّمُ","auc":"AUC Arabic 301","curricula":"ABY Book 3 | Al-Kitaab Part 3","passPct":65,"timeMin":60,"color":"#9333ea","prepTips":[{"icon":"📜","title":"Rhetorical Devices","text":"Advanced Arabic uses balagha (rhetoric): tashbih (simile), isti'ara (metaphor), tikrar (repetition).","arabic":"العِلْمُ كَالنُّورِ (simile)\nالوَقْتُ سَيْفٌ (metaphor: time is a sword)"},{"icon":"🏛️","title":"MSA vs Classical","text":"Modern Standard Arabic (MSA) is used in media and education. Classical includes pre-Islamic poetry and Quran.","arabic":"Both share the same grammar but Classical has more archaic vocabulary."},{"icon":"🔄","title":"Complex Verb Patterns","text":"Patterns VI-X add nuanced meanings. Pattern VI = mutual action. Pattern X = to request/consider.","arabic":"تَعَاوَنَ (cooperated, Pattern VI)\nاِستَخدَمَ (used/employed, Pattern X)"}],"vocab":[{"ar":"يَستَخدِمُ","en":"He uses","tr":"yastakhdim"},{"ar":"تَعَاوُنٌ","en":"Cooperation","tr":"ta'awun"},{"ar":"مُستَقْبَلٌ","en":"Future","tr":"mustaqbal"},{"ar":"اِنْعِكَاسٌ","en":"Impact/Reflection","tr":"in'ikas"},{"ar":"بِرَغْمِ","en":"Despite","tr":"biraghm"},{"ar":"تَحَدٍّ","en":"Challenge","tr":"tahadin"}],"questions":[{"q":"Pattern X verb \"istakhdama\" literally means:","arabic":"اِستَخدَمَ","opts":["He worked","He sought to use - used/employed","He was employed","He made work"],"ans":1,"exp":"Pattern X (istaf'ala) often means to seek/consider as X. اِستَخدَمَ = to seek to use - to use/employ."},{"q":"What is the rhetorical device in \"العِلْمُ نُورٌ\"?","arabic":"العِلْمُ نُورٌ","opts":["Simile","Metaphor","Repetition","Contrast"],"ans":1,"exp":"\"Knowledge is light\" - no comparison word used; it directly equates two things. This is isti'ara (metaphor)."},{"q":"The verb \"ta'awana\" (Pattern VI) means:","arabic":"تَعَاوَنَ","opts":["He helped","They cooperated with each other","He was helped","He sought help"],"ans":1,"exp":"Pattern VI (tafaa'ala) expresses mutual/reciprocal action. تَعَاوَنَ = they cooperated with each other."},{"q":"In Classical Arabic, \"qad\" before a past verb means:","arabic":"","opts":["Negation","Emphasis/certainty of past action","Future possibility","Conditional"],"ans":1,"exp":"قَدْ + past verb = emphasis/confirmation: قَدْ كَتَبَ = \"he has indeed written.\""},{"q":"What does \"اِنْعِكَاسٌ\" mean?","arabic":"اِنْعِكَاسٌ","opts":["Cooperation","Investment","Reflection/repercussion","Development"],"ans":2,"exp":"اِنْعِكَاسٌ = reflection, repercussion. From root ع-ك-س."},{"q":"Which construction expresses \"despite\"?","arabic":"","opts":["بِسَبَبِ","بِرَغْمِ","بِنَاءً عَلَى","نَتِيجَةً لِ"],"ans":1,"exp":"بِرَغْمِ = despite/in spite of. بِسَبَبِ = because of."},{"q":"The \"hal\" (Haal) in Arabic grammar is:","arabic":"","opts":["Subject","Adverbial of manner describing state","Object","Predicate"],"ans":1,"exp":"الحَالُ describes the state of the subject at the time of action: جَاءَ مُسْرِعًا = He came hurrying."},{"q":"What does \"تَحَدٍّ\" mean?","arabic":"تَحَدٍّ","opts":["Opportunity","Challenge","Agreement","Solution"],"ans":1,"exp":"تَحَدٍّ = challenge. Plural: تحديات."},{"q":"\"عَلَى الصَّعِيدِ الدَّوْلِيِّ\" means:","arabic":"عَلَى الصَّعِيدِ الدَّوْلِيِّ","opts":["On the national level","On the local level","On the international level","In the economy"],"ans":2,"exp":"صَعِيدٌ = level/plane, دَوْلِيٌّ = international."},{"q":"Which is a mim-prefixed verbal noun (masdar mimi)?","arabic":"","opts":["كِتَابَةٌ","مَكتُوبٌ","مَكتَبٌ","مَكتِبٌ"],"ans":2,"exp":"مَكتَبٌ = place/time of writing - office. Masadir mimiyya start with ma- and often refer to place."},{"q":"In \"lawla al-'ilmu lama taqaddama al-insaan\", \"lawla\" means:","arabic":"لَوْلَا العِلْمُ لَمَا تَقَدَّمَ الإِنْسَانُ","opts":["Because of","If not for/Had it not been for","As long as","Although"],"ans":1,"exp":"لَوْلَا = if not for / were it not for. \"Had it not been for knowledge, humanity would not have advanced.\""},{"q":"What is the grammatical term for \"mustaqbal\"?","arabic":"مُستَقْبَلٌ","opts":["Active participle","Passive participle","Verbal noun","Adjective"],"ans":1,"exp":"مُستَقْبَلٌ is a passive participle of Pattern X, but in modern usage means \"future\"."},{"q":"The literary device \"tibaaq\" means:","arabic":"","opts":["Simile","Metaphor","Antithesis (pairing opposites)","Alliteration"],"ans":2,"exp":"طِبَاقٌ = pairing opposites: النُّورُ وَالظَّلَامُ (light and darkness)."},{"q":"Which sentence contains a maf'ul mutlaq?","arabic":"","opts":["ضَرَبْتُهُ","ضَرَبْتُ ضَرْبًا شَدِيدًا","ضَرَبَهُ الرَّجُلُ","أَضْرَبَ"],"ans":1,"exp":"ضَرَبْتُ ضَرْبًا شَدِيدًا = I struck a hard strike. The verbal noun from same root used for emphasis."},{"q":"\"فِيمَا يَخُصُّ\" is used to mean:","arabic":"فِيمَا يَخُصُّ","opts":["In conclusion","As for/Regarding","However","In addition"],"ans":1,"exp":"فِيمَا يَخُصُّ = as for / regarding. Very common in formal Arabic."},{"q":"Pattern IX verb (if'alla) is used for:","arabic":"","opts":["Causative actions","Colors and physical defects","Requesting something","Mutual actions"],"ans":1,"exp":"Pattern IX (if'alla) is specifically for colors and defects: اِحْمَرَّ = became red, اِسْوَدَّ = became black."},{"q":"\"afaadat masadir\" in Arabic journalism means:","arabic":"أَفَادَتْ مَصَادِرُ","opts":["Sources confirmed officially","Sources reported/indicated","Sources denied","Sources questioned"],"ans":1,"exp":"أَفَادَتْ مَصَادِرُ = sources reported/indicated. Common journalistic formula."},{"q":"The parsing of \"saa'atan\" in \"sirtu saa'atan\" is:","arabic":"سِرْتُ سَاعَةً","opts":["Direct object","Temporal adverbial (maf'ul fihi)","Hal","Tamyiz"],"ans":1,"exp":"سَاعَةً = temporal adverbial (maf'ul fihi zarfi zaman): \"I walked for an hour.\""},{"q":"What distinguishes MSA from Classical Arabic?","arabic":"","opts":["MSA has no grammar","Classical uses only spoken forms","MSA has modernized vocabulary; Classical preserves ancient language","They are identical"],"ans":2,"exp":"MSA (fush al-'asr) has modernized vocabulary. Classical (fush al-turath) = Quran, Hadith, pre-Islamic poetry - stricter and more archaic."},{"q":"Which particle introduces an indirect question?","arabic":"","opts":["هَلْ","مَا","إِنَّ","لَوْ"],"ans":2,"exp":"إِنَّ introduces nominal clauses with emphasis. أَنَّ can introduce indirect speech: أَعْرِفُ أَنَّهُ ذَاهِبٌ = I know that he is going."}]},{"id":"c2","cefr":"C2","name":"Mastery","nameAr":"الإِتْقَانُ","auc":"AUC Arabic 302","curricula":"Post-ABY | Al-Kitaab Part 3 Advanced | Classical Arabic","passPct":65,"timeMin":75,"color":"#be185d","prepTips":[{"icon":"📖","title":"Classical Arabic Sources","text":"C2 Arabic includes reading classical texts: Hadith, pre-Islamic poetry, Abbasid prose, and Quranic exegesis.","arabic":"وَالْعَصْرِ ۝ إِنَّ الْإِنسَانَ لَفِي خُسْرٍ (Quran, Al-Asr)"},{"icon":"🎭","title":"Literary Analysis","text":"At C2 you analyze literary texts using Arabic metalanguage: naqd adabi, identifying asalib balaghiyya.","arabic":"الرَّمْزِيَّةُ (symbolism) | الغَموضُ الشِّعْرِيُّ (poetic ambiguity)"},{"icon":"⚖️","title":"Dialectology vs Fusha","text":"Understanding the spectrum from colloquial to classical and diglossia.","arabic":"الازدواجية اللغوية = linguistic diglossia (Ferguson, 1959)"}],"vocab":[{"ar":"ازدِهَارٌ","en":"Flourishing","tr":"izdihaar"},{"ar":"رَمْزِيَّةٌ","en":"Symbolism","tr":"ramziyya"},{"ar":"مِحْوَرٌ","en":"Axis/Pivot","tr":"mihwar"},{"ar":"اِستِشْهَادٌ","en":"Citation","tr":"istishhad"},{"ar":"نُقْطَةُ الانْعِطَافِ","en":"Turning point","tr":"nuqtat al-in3itaf"},{"ar":"الفُصَاحَةُ","en":"Eloquence","tr":"al-fasaaha"}],"questions":[{"q":"In classical Arabic metrics (arud), \"al-Tawil\" refers to:","arabic":"الطَّوِيلُ","opts":["A long grammatical sentence","The longest classical verse meter","A type of rhetoric","A Quranic reading style"],"ans":1,"exp":"الطَّوِيلُ is one of the 16 classical Arabic poetic meters. It is the most commonly used meter."},{"q":"The Quranic rhetorical feature \"al-iltifat\" means:","arabic":"الالتفات","opts":["Repetition for emphasis","A sudden shift in grammatical person mid-speech","Using antonyms","Parallelism"],"ans":1,"exp":"الالتفات = a sudden shift in grammatical person (3rd to 2nd, etc.) for rhetorical effect. Used extensively in the Quran."},{"q":"\"izdihaar\" comes from which root?","arabic":"ازدِهَارٌ","opts":["ز-ه-ر","د-ه-ر","ز-د-ه","ه-ر-ز"],"ans":0,"exp":"ازدِهَارٌ (flourishing) comes from root ز-ه-ر (flower/bloom). زَهْرَةٌ = flower. ازدَهَرَ = to flourish (Pattern VIII)."},{"q":"In Arabic linguistics, \"al-izdiwajiyya al-lughawiyya\" describes:","arabic":"","opts":["Learning two languages simultaneously","Coexistence of formal and colloquial varieties of one language","Code-switching between two dialects","Unification of Arabic dialects"],"ans":1,"exp":"Diglossia describes coexistence of a high (H) formal variety and a low (L) colloquial variety within Arabic-speaking society."},{"q":"Which term describes Quranic exegesis?","arabic":"","opts":["الفِقْهُ","التَّفْسِيرُ","البَلَاغَةُ","النَّحْوُ"],"ans":1,"exp":"التَّفْسِيرُ is the science of Quran interpretation. الفِقْهُ = jurisprudence. البَلَاغَةُ = rhetoric."},{"q":"In Abbasid prose, \"al-maqamat\" is characterized by:","arabic":"المَقَامَاتُ","opts":["Epic poetry","Rhymed prose (saj) with picaresque narrative","Historical chronicles","Philosophical dialogues"],"ans":1,"exp":"المَقَامَاتُ by al-Hamadhani and al-Hariri = short narratives in rhymed prose featuring a clever wandering hero."},{"q":"The grammatical concept \"al-maf'ul li-ajlihi\" expresses:","arabic":"","opts":["The direct object","Cause/reason for an action","Manner of action","Time of action"],"ans":1,"exp":"مفعول لأجله = accusative of reason: قُمت إجلالا له = I stood out of respect for him."},{"q":"The pre-Islamic qasida traditionally begins with:","arabic":"","opts":["Praise of the patron","Elegizing the dead","The amatory prelude at the abandoned campsite (al-Tallal)","Description of nature"],"ans":2,"exp":"The classical qasida begins with al-Tallal - the abandoned campsite, where the poet laments the departure of his beloved."},{"q":"What does \"istishhad\" mean in literary criticism?","arabic":"اِستِشْهَادٌ","opts":["Martyrdom","Quotation/citation as evidence","A type of metaphor","An oath"],"ans":1,"exp":"In literary criticism, اِستِشْهَادٌ = citation of a text as evidence for a grammatical or stylistic point."},{"q":"The Quranic term \"al-i'jaz\" refers to:","arabic":"الإعجاز","opts":["The science of recitation","The inimitable miraculous nature of Quranic language","The seven readings","A grammatical irregularity"],"ans":1,"exp":"الإعجاز القرآني = the Quranic miracle - the inimitability of the Quran's language, style, and content."},{"q":"The \"Sarf\" discipline in Arabic morphology studies:","arabic":"","opts":["Sentence structure","Internal word structure and derivation","Literary interpretation","Phonology only"],"ans":1,"exp":"الصَّرْفُ (morphology) studies internal word structure. النَّحْوُ (syntax) studies sentence structure."},{"q":"\"nuqtat al-in'itaf\" means:","arabic":"نُقْطَةُ الانْعِطَافِ","opts":["Starting point","Turning point/inflection point","End result","Central axis"],"ans":1,"exp":"نُقْطَةُ الانْعِطَافِ = turning point/inflection point."},{"q":"A conditional sentence (al-jumla al-shartiyya) consists of:","arabic":"","opts":["Subject + predicate","Verb + object + adverb","Conditional clause + response clause","Noun + adjective"],"ans":2,"exp":"جملة شرطية = adawa al-shart + shart + jawab al-shart: إِنْ تَدْرُسْ تَنْجَحْ = If you study, you will succeed."},{"q":"Which classical grammarian wrote \"al-Kitab\" (foundational grammar)?","arabic":"","opts":["الزَّمَخْشَرِيُّ","ابْنُ مَالِكٍ","سِيبَوَيْهِ","ابْنُ هِشَامٍ"],"ans":2,"exp":"Sibawayhi (d. 796 CE) wrote al-Kitab, the first comprehensive Arabic grammar. He is considered the father of Arabic grammar."},{"q":"The rhetorical device \"al-jinaas\" (paronomasia) refers to:","arabic":"","opts":["Using synonyms","Words that sound similar but differ in meaning","Repeating a word with different cases","Using an unexpected root"],"ans":1,"exp":"الجناس = words that sound similar but differ in meaning. Used extensively in Abbasid poetry."},{"q":"\"ramziyya\" in literary analysis means:","arabic":"رَمْزِيَّةٌ","opts":["Historical accuracy","Symbolism - use of symbols to represent deeper meanings","Narrative structure","Rhyme scheme"],"ans":1,"exp":"الرَمْزِيَّةُ = symbolism in literature. Common in modern Arabic literature (Mahfouz, Darwish)."},{"q":"Al-ishtiqaq al-kabir (major derivation) refers to:","arabic":"","opts":["Borrowing words from other languages","All permutations of root letters sharing a meaning family","Adding prefixes to form new words","Combining two roots"],"ans":1,"exp":"Al-ishtiqaq al-kabir (theory of Ibn Jinni) = all permutations of the same root letters carry related meanings."},{"q":"The Mu'allaqat are:","arabic":"المُعَلَّقَاتُ","opts":["Quranic commentaries","Seven pre-Islamic odes considered masterpieces","Abbasid philosophical texts","A collection of Sufi poetry"],"ans":1,"exp":"المُعَلَّقَاتُ = seven pre-Islamic qasidas considered the finest Arabic poetry, by poets including Imru al-Qays, Zuhayr, Labid."},{"q":"\"al-naqd al-adabi\" (literary criticism) involves:","arabic":"","opts":["Translating texts","Analyzing style, structure, theme, and historical context","Memorizing texts","Describing events"],"ans":1,"exp":"النَّقدُ الأدَبِيُّ involves critical analysis: style, structure, theme, context, and symbolism."},{"q":"Which particle introduces a nominal clause with emphasis?","arabic":"","opts":["هَلْ","مَا","إِنَّ","لَوْ"],"ans":2,"exp":"إِنَّ is a \"sister of kana\" that adds emphatic meaning: إِنَّ العِلْمَ نُورٌ = \"Verily knowledge is light\"."},{"q":"\"al-fasaaha\" specifically refers to:","arabic":"الفُصَاحَةُ","opts":["The ability to write","Eloquence - linguistic purity and clarity","The study of dialects","The science of Quranic readings"],"ans":1,"exp":"الفُصَاحَةُ = eloquence - purity and clarity of Arabic expression, free of obscurity, harshness, and weakness."}]}];
const QURAN_DATA=[{"id":"q1","name":"Quran Beginner","nameAr":"تِلَاوَةٌ مُبتدِئٌ","passPct":70,"timeMin":20,"color":"#16a34a","prepTips":[{"icon":"📿","title":"The Arabic Letters","text":"The Quran is written in Arabic with full diacritical marks (Tashkeel). Every letter has a specific point of articulation (makhraj).","arabic":"مخارج الحروف: throat, tongue, lips"},{"icon":"🤲","title":"Starting Recitation","text":"Before reciting Quran, one says al-Isti'adha and al-Basmala first.","arabic":"أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ\nبِسْمِ اللهِ الرَّحْمَٰنِ الرَّحِيمِ"},{"icon":"🔤","title":"Basic Tajweed Signs","text":"The Harakat (vowel marks) tell you how to pronounce each letter.","arabic":"فَتْحَةٌ (-a) | ضَمَّةٌ (-u) | كَسْرَةٌ (-i)\nشَدَّةٌ (double) | سُكُونٌ (no vowel)"}],"vocab":[{"ar":"بِسْمِ اللهِ","en":"In the name of Allah","tr":"Bismillah"},{"ar":"الرَّحْمَٰنُ","en":"The Most Gracious","tr":"Ar-Rahman"},{"ar":"سُورَةٌ","en":"Chapter","tr":"Surah"},{"ar":"آيَةٌ","en":"Verse","tr":"Ayah"},{"ar":"جُزْءٌ","en":"Part (1/30)","tr":"Juz'"},{"ar":"حِزْبٌ","en":"Section (half juz)","tr":"Hizb"}],"questions":[{"q":"What phrase is recited before starting Quran recitation?","arabic":"","opts":["الْحَمْدُ للَّهِ","أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ","سُبْحَانَ اللهِ","اللهُ أَكْبَرُ"],"ans":1,"exp":"Al-Isti'adha (I seek refuge in Allah from the accursed Satan) is recited before beginning Quran recitation."},{"q":"How many Surahs are in the Quran?","arabic":"","opts":["100","112","114","120"],"ans":2,"exp":"The Quran has 114 Surahs, from Al-Fatiha to An-Nas."},{"q":"The Basmala appears at the beginning of how many surahs?","arabic":"بِسْمِ اللهِ الرَّحْمَٰنِ الرَّحِيمِ","opts":["112","113","114","All except one"],"ans":3,"exp":"The Basmala appears at the beginning of 113 surahs - all except Surah At-Tawbah (9)."},{"q":"What does sukoon indicate on a letter?","arabic":"","opts":["Double the letter","Long vowel","No vowel after it","Skip this letter"],"ans":2,"exp":"Sukoon means the letter has no vowel - it is pronounced and immediately followed by the next letter."},{"q":"What does shadda indicate?","arabic":"","opts":["Elongate for 2 counts","Double (geminate) the letter","Skip the letter","Raise the voice"],"ans":1,"exp":"Shadda means the letter is doubled (geminated). Hold it slightly longer."},{"q":"The Quran is divided into how many equal Juz parts?","arabic":"","opts":["7","10","30","60"],"ans":2,"exp":"The Quran is divided into 30 equal parts called ajzaa'. Each juz' is further divided into 2 hizb and 4 rub'."},{"q":"What is the shortest Surah in the Quran?","arabic":"","opts":["Al-Fatiha","Al-Ikhlas","Al-Kawthar","An-Nasr"],"ans":2,"exp":"Surah Al-Kawthar (108) is the shortest with only 3 verses."},{"q":"What does Fatiha produce?","arabic":"","opts":["The u sound","The i sound","The a sound","The o sound"],"ans":2,"exp":"Fatiha produces a short a sound. Damma = u, Kasra = i."},{"q":"The first Surah of the Quran is:","arabic":"","opts":["Al-Baqarah","Al-Fatiha","Al-Ikhlas","Al-Alaq"],"ans":1,"exp":"Surah Al-Fatiha is the first and most recited surah. Recited in every raka'ah of salah."},{"q":"What does \"makhraj\" mean in Tajweed?","arabic":"مَخْرَجٌ","opts":["Elongation rule","Point of articulation","Silent letter","Merging of sounds"],"ans":1,"exp":"مَخْرَجٌ = the point of articulation from which a letter originates. Mastering makhaarij is the foundation of correct Tajweed."}]},{"id":"q2","name":"Quran Intermediate","nameAr":"تِلَاوَةٌ مُتَوَسِّطٌ","passPct":70,"timeMin":30,"color":"#15803d","prepTips":[{"icon":"🔀","title":"Rules of Noon Sakin and Tanwin","text":"When noon with sukoon or tanwin is followed by a letter, one of 4 rules applies.","arabic":"إظهار (clear) | إدغام (merge) | إقلاب (change to m) | إخفاء (hide)"},{"icon":"〰️","title":"Madd (Elongation)","text":"Madd means stretching a vowel sound. Madd Tabee'i = natural 2-count stretch.","arabic":"مد طبيعي: waw sakin after damma | alif after fatha | ya sakin after kasra"},{"icon":"🔔","title":"Ghunna (Nasalization)","text":"Ghunna is the nasal sound when reciting shadda-noon or shadda-meem. Duration: 2 counts.","arabic":"إِنَّ (ghunna on nn) | مِمَّا | hear the nasal hum"}],"vocab":[{"ar":"إظْهَارٌ","en":"Clear pronunciation","tr":"Izhar"},{"ar":"إدْغَامٌ","en":"Merging/assimilation","tr":"Idgham"},{"ar":"إِقْلَابٌ","en":"Conversion to m","tr":"Iqlab"},{"ar":"إِخْفَاءٌ","en":"Hiding/nasalizing","tr":"Ikhfa'"},{"ar":"غُنَّةٌ","en":"Nasalization","tr":"Ghunna"},{"ar":"مَدٌ طَبِيعِيٌّ","en":"Natural elongation","tr":"Madd Tabee'i"}],"questions":[{"q":"When noon sakin is followed by a throat letter, which rule applies?","arabic":"نْ + حرف حلقي","opts":["إخْفَاءٌ","إدْغَامٌ","إظْهَارٌ","إِقْلَابٌ"],"ans":2,"exp":"إظْهَارٌ (clear) - the noon is pronounced clearly when followed by the 6 throat letters: alif, ha, ain, ha, ghain, kha."},{"q":"When noon sakin is followed by \"ba\", which rule applies?","arabic":"نْ + بَ","opts":["إظْهَارٌ","إدْغَامٌ","إِقْلَابٌ","إخْفَاءٌ"],"ans":2,"exp":"إِقْلَابٌ (conversion) - the noon changes to an m sound with ghunna when followed by ba."},{"q":"What is the duration of Madd Tabee'i?","arabic":"المَدُّ الطَّبِيعِيُّ","opts":["1 count","2 counts","4 counts","6 counts"],"ans":1,"exp":"Madd Tabee'i lasts 2 counts. It occurs whenever a long vowel letter follows its corresponding short vowel without a hamza or sukoon after it."},{"q":"In idgham, what happens to the noon?","arabic":"إدْغَامٌ","opts":["Pronounced clearly","Converted to m","Merges into the following letter","Silent with no sound"],"ans":2,"exp":"In idgham (merging), the noon merges completely into the following letter. Letters: ya ra meem lam waw noon."},{"q":"Ghunna is produced from:","arabic":"","opts":["The lips","The throat","The nose","The tongue tip"],"ans":2,"exp":"Ghunna is a nasal sound produced from the nose. It accompanies shadda-noon and shadda-meem."},{"q":"When noon sakin is followed by other letters, which rule applies?","arabic":"","opts":["إظْهَارٌ","إخْفَاءٌ","إدْغَامٌ","إِقْلَابٌ"],"ans":1,"exp":"إخْفَاءٌ (hiding) - the noon is hidden with a nasal sound when followed by any of the 15 remaining letters."},{"q":"Which letters require Idgham WITH ghunna?","arabic":"","opts":["ل ر","ي ن م و","أ ه ع ح غ خ","the 15 ikhfa letters"],"ans":1,"exp":"Idgham with ghunna: ya noon meem waw (remember: yanmu = it grows). The noon merges and a nasal sound held for 2 counts."},{"q":"What is Qalqala?","arabic":"قَلْقَلَةٌ","opts":["Nasalization of meem","An echo/bounce effect on specific letters with sukoon","Elongation of a vowel","Merging two letters"],"ans":1,"exp":"قَلْقَلَةٌ = a slight echoing sound when specific letters carry sukoon. Qalqala letters: qa ta ba ja dal."},{"q":"Madd Muttasil occurs when:","arabic":"","opts":["Long vowel + hamza in the SAME word","Long vowel + hamza in the NEXT word","Long vowel at end of verse","Two identical letters meet"],"ans":0,"exp":"مد متصل = long vowel + hamza in the SAME word. Duration: 4-5 counts. Examples: ja'a, al-samaa'a."},{"q":"Which Surah is equal to 1/3 of the Quran?","arabic":"","opts":["Al-Fatiha","Al-Falaq","Al-Ikhlas","Al-Kafirun"],"ans":2,"exp":"Surah Al-Ikhlas (112) begins with \"Say: He is Allah, One\" and is said in hadith to equal one-third of the Quran in reward."},{"q":"The sign \"m\" (mandatory stop) in the Quran means:","arabic":"","opts":["You must stop here","You may or may not stop","Stopping is preferred","Stopping is forbidden"],"ans":0,"exp":"Waqf lazim (m) = mandatory stop. Reciting past it without stopping could change the meaning."},{"q":"The first word revealed to Prophet Muhammad was:","arabic":"","opts":["بِسْمِ","اِقْرَأْ","اللهُ","يَا مُحَمَّدُ"],"ans":1,"exp":"اِقْرَأْ = Read/Recite! was the first word revealed in Surah Al-Alaq (96:1). This happened in the Cave of Hira."}]},{"id":"q3","name":"Quran Advanced","nameAr":"تِلَاوَةٌ مُتَقدِّمٌ","passPct":65,"timeMin":45,"color":"#166534","prepTips":[{"icon":"🌟","title":"Madd Types","text":"Beyond Madd Tabee'i: Madd Lazim = 6 counts, Madd Munfasil = 4-5 counts.","arabic":"مد لازم: same-word vowel + sukoon/shadda = 6 counts\nمد منفصل: vowel at word end + hamza starting next word"},{"icon":"🔡","title":"Letters of Elevation (Tafkheem)","text":"7 letters are always heavy: kha sa dhad ghain ta qaf dha. The letter ra alternates.","arabic":"خص ضغط قظ - mnemonic for 7 heavy letters\nRa is heavy next to fatha/damma, light next to kasra"},{"icon":"📚","title":"The Narration of Warsh","text":"Warsh from Nafi' is widely used in North/West Africa. Has longer madds and special hamza treatment.","arabic":"Rasm differences: Warsh uses tashiil and ibdal for certain hamzas"}],"vocab":[{"ar":"مَدٌ لَازِمٌ","en":"Obligatory 6-count madd","tr":"Madd Lazim"},{"ar":"مَدٌ مُنْفَصِلٌ","en":"Separated madd","tr":"Madd Munfasil"},{"ar":"تَفْخِيمٌ","en":"Heavy pronunciation","tr":"Tafkheem"},{"ar":"تَرْقِيقٌ","en":"Light pronunciation","tr":"Tarqeeq"},{"ar":"وَرْشٌ","en":"Warsh narration","tr":"Warsh"},{"ar":"تَرْتِيلٌ","en":"Measured recitation","tr":"Tarteel"}],"questions":[{"q":"Madd Lazim requires how many counts?","arabic":"مَدٌ لَازِمٌ","opts":["2","4","6","8"],"ans":2,"exp":"Madd Lazim = 6 counts (compulsory). Occurs when a long vowel letter is followed by sukoon or shadda in the same word."},{"q":"The 7 letters of elevation (tafkheem) are:","arabic":"","opts":["خ ص ض غ ط ق ظ","ب ج د ذ ر ز ظ","ء ه ع ح غ خ","ق ط ب ج د"],"ans":0,"exp":"The 7 heavy letters are: kha sa dhad ghain ta qaf dha. Always pronounced with full, heavy resonance."},{"q":"When is the letter ra pronounced with tafkheem?","arabic":"","opts":["Always","Next to kasra or ya","Next to fatha or damma","Never"],"ans":2,"exp":"Ra is heavy when it has fatha or damma, or when sukoon preceded by fatha/damma. Light when it has kasra or is preceded by kasra."},{"q":"Madd Munfasil occurs when:","arabic":"","opts":["Long vowel + hamza in the same word","Long vowel ends one word AND hamza starts the next","A hamza is followed by madd","Two hamzas meet"],"ans":1,"exp":"Madd Munfasil = long vowel at end of one word + hamza at start of next word. Duration: 4-5 counts."},{"q":"The Warsh narration is mainly used in:","arabic":"","opts":["Egypt and Saudi Arabia","North and West Africa","Turkey and Central Asia","The Gulf states"],"ans":1,"exp":"Riwayat Warsh is predominant in Morocco, Algeria, Tunisia, Libya, Mauritania, and West Africa."},{"q":"What does tarteel mean?","arabic":"تَرْتِيلٌ","opts":["Very fast recitation","Measured, precise, unhurried recitation","Melodic recitation","Memorization"],"ans":1,"exp":"تَرْتِيلٌ = measured, clear, and unhurried recitation. Commanded: warattil al-Qur'ana tartiilan (73:4)."},{"q":"In Warsh, how are hamzas sometimes treated?","arabic":"","opts":["Always fully pronounced","Sometimes softened (tashiil) or replaced with a long vowel","Always dropped","Doubled"],"ans":1,"exp":"Warsh employs tashiil (softening) for certain hamzas and ibdal (replacement with a long vowel) in specific positions."},{"q":"How many authentic Quranic reading traditions are recognized?","arabic":"","opts":["3","7","10","14"],"ans":2,"exp":"There are 10 mutawatir Qira'at. Most widely used: Hafs from Asim and Warsh from Nafi'. Ibn al-Jazari documented all 10."},{"q":"Which verse commands Tarteel recitation?","arabic":"","opts":["إِنَّا أَنزَلْنَاهُ","وَرَتِّلِ الْقُرْآنَ تَرْتِيلًا","اِقْرَأْ بِاسْمِ رَبِّكَ","إِنَّهُ لَقُرْآنٌ كَرِيمٌ"],"ans":1,"exp":"وَرَتِّلِ الْقُرْآنَ تَرْتِيلًا (Surah Al-Muzzammil 73:4) = \"And recite the Quran with measured recitation.\""},{"q":"The sign \"la\" in Quran recitation marks means:","arabic":"","opts":["Mandatory stop","Preferred pause","Stopping is not permitted here","Optional stop"],"ans":2,"exp":"La = waqf mamnu' - stopping here is not permitted as it would disrupt the meaning."},{"q":"\"Al-Daallin\" in Al-Fatiha contains which Madd?","arabic":"الضَّالِّينَ","opts":["Madd Tabee'i","Madd Muttasil","Madd Lazim","Madd Munfasil"],"ans":2,"exp":"الضَّالِّينَ contains Madd Lazim - the alif is followed by a shadda on the lam in the same word = 6 counts obligatory."},{"q":"What is the difference between Hadr and Tarteel?","arabic":"","opts":["They are identical","Hadr is fast (with rules), Tarteel is slow and measured","Tarteel is faster","Hadr is only for memorization"],"ans":1,"exp":"Three speeds: Tahqiq (very slow, for learning), Tarteel (measured, ideal), Hadr (faster, still applying rules). All valid if rules observed."}]},{"id":"q4","name":"Quran Scholar","nameAr":"حَافِظٌ وَقَارِئٌ","passPct":65,"timeMin":60,"color":"#14532d","prepTips":[{"icon":"📜","title":"The 10 Qira'at","text":"Ten authentic reading traditions, each traced to a Companion or Tabi'i with two narrators. Documented by Ibn al-Jazari.","arabic":"عاصم (Hafs & Shu'bah) | نافع (Warsh & Qalun) | ابن كثير | أبو عمرو | ابن عامر | حمزة | الكسائي | أبو جعفر | يعقوب | خلف"},{"icon":"🔬","title":"Sifaat Al-Huruf","text":"Each Arabic letter has sifaat (qualities). Key: Jahr/Hams, Shidda/Rakhawa, Isti'la'/Istifal.","arabic":"جهر (voiced) | همس (whispered)\nشدة (plosive) | رخاوة (fricative) | توسط (intermediate)"},{"icon":"⚠️","title":"Lahn Al-Jali","text":"Obvious mistake in recitation that changes meaning or distorts a letter. Forbidden and must be corrected.","arabic":"Example: reading ra as la, or dropping a vowel that changes Quranic meaning."}],"vocab":[{"ar":"صِفَاتُ الحُرُوفِ","en":"Qualities of letters","tr":"Sifaat al-Huruf"},{"ar":"لَحْنٌ جَلِيٌّ","en":"Obvious recitation error","tr":"Lahn Jali"},{"ar":"لَحْنٌ خَفِيٌّ","en":"Subtle recitation error","tr":"Lahn Khafi"},{"ar":"جَهْرٌ","en":"Voiced (letter quality)","tr":"Jahr"},{"ar":"هَمْسٌ","en":"Whispered (letter quality)","tr":"Hams"},{"ar":"اِستِعْلَاءٌ","en":"Elevation (letter quality)","tr":"Isti'la'"}],"questions":[{"q":"Which is a correct pair: Qari and his narrators?","arabic":"","opts":["نافع → حفص و شعبة","عاصم → ورش و قالون","نافع → ورش و قالون","حمزة → إدريس و رويس"],"ans":2,"exp":"نافع has two narrators: Warsh and Qalun. Asim has two narrators: Hafs and Shu'bah."},{"q":"What is Lahn Jali?","arabic":"لَحْنٌ جَلِيٌّ","opts":["A subtle nuance","A recitation method","An obvious mistake distorting letters/meaning - forbidden","A pause mark"],"ans":2,"exp":"لحن جلي = obvious recitation error that changes a letter or distorts a word - forbidden. Lahn khafi = subtle error - disliked."},{"q":"The quality \"Jahr\" (voiced) means:","arabic":"جَهْرٌ","opts":["Breath flows freely (whispered)","Breath is blocked - letter is voiced","Elongation of the letter","Resonance in the nose"],"ans":1,"exp":"جهر (voiced) = breath is compressed during the letter, making it voiced. همس (whispered) = breath flows freely."},{"q":"How many letters have the quality of Isti'la' (elevation)?","arabic":"اِستِعْلَاءٌ","opts":["4","5","7","9"],"ans":2,"exp":"The 7 letters of Isti'la' are: kha sa dhad ghain ta qaf dha - same as the 7 tafkheem letters."},{"q":"Ibn al-Jazari's definitive book on the 10 Qira'at is called:","arabic":"","opts":["al-Taysir","al-Shatibiyya","al-Tayyiba fi al-Qira'at al-Ashr","al-Nashr fi al-Qira'at al-Ashr"],"ans":3,"exp":"al-Nashr fi al-Qira'at al-Ashr by Imam Ibn al-Jazari (d. 833 AH) is the comprehensive reference on the 10 Qira'at."},{"q":"What is the quality \"al-Shidda\" (plosiveness)?","arabic":"صِفَةُ الشِّدَّةِ","opts":["Sound flows freely","Sound stops completely at point of articulation","Tongue elevates","Breath flows with the letter"],"ans":1,"exp":"الشِدَّةُ = the sound is completely blocked/stopped before releasing (plosive stop). Shidda letters: Ajidu Qattan Bakat."},{"q":"When noon merges in idgham with meem, what happens?","arabic":"","opts":["Noon disappears with no sound","Noon converts to meem then merges (Iqlab, not Idgham)","Noon merges into meem with ghunna","Noon is pronounced clearly"],"ans":1,"exp":"When noon sakin precedes ba only - that is Iqlab (not Idgham). Iqlab: noon converts to meem and merges into ba with ghunna."},{"q":"Hafs and Warsh are narrations of which Qari(s)?","arabic":"","opts":["Ibn Kathir","Nafi'","Asim and Nafi' respectively","Abu Amr"],"ans":2,"exp":"Hafs is a narrator of Asim (Kufi). Warsh is a narrator of Nafi' (Madani). They trace to different Qurra'."},{"q":"What is \"al-Rawm\" in Tajweed stops?","arabic":"الرَّوْمُ","opts":["A full pause with no sound","Pronouncing 1/3 of the vowel sound very faintly when stopping","Elongating the final vowel","A type of ghunna"],"ans":1,"exp":"الرَّوْمُ = uttering about 1/3 of the final vowel so faintly only heard up close. Permitted at stops."},{"q":"Madd Arid lil-Sukoon occurs:","arabic":"","opts":["Long vowel + hamza in same word","At end of verse when reciter pauses on normally short-voweled word","Two identical letters meet","At start of surah"],"ans":1,"exp":"مد عارض للسكون = madd from pause-induced sukoon at word end. Duration: 2, 4, or 6 counts (reciter's choice). Only when stopping."},{"q":"\"Lahn khafi\" differs from Lahn Jali because:","arabic":"","opts":["It is forbidden while Jali is not","It is a subtle Tajweed rule violation not changing word meaning","They are the same","Khafi refers to vowel errors only"],"ans":1,"exp":"لحن خفي = subtle error: violation of Tajweed rule (missing ghunna, wrong madd length) but not distorting the word. Disliked (makruh)."},{"q":"The narration of Qalun differs from Warsh in:","arabic":"","opts":["Qalun uses tafkheem everywhere","Qalun generally has shorter madd lengths than Warsh","Qalun follows Hafs rules","No difference"],"ans":1,"exp":"Qalun and Warsh are both from Nafi' but differ: Warsh uses longer madd, while Qalun has shorter madd. Also differ in hamza treatment."}]}];
</script>

<script>
const DATA={arabic:ARABIC_DATA,quran:QURAN_DATA};
const S={screen:'home',track:'',name:'',levelIdx:0,qIdx:0,answers:[],hearts:5,xp:0,streak:0,feedbackVisible:false,selectedOpt:-1,startTime:0,totalCorrect:0,totalWrong:0};
const $=id=>document.getElementById(id);
const app=document.getElementById('app');
function levels(){return DATA[S.track];}
function lvl(){return levels()[S.levelIdx];}
function question(){return lvl().questions[S.qIdx];}
function trackColor(){return S.track==='arabic'?'#2563eb':'#16a34a';}
function trackClass(){return S.track==='arabic'?'arabic':'quran';}
function render(html){app.innerHTML=html;}
function dotsHTML(){
  const lvls=levels();
  return lvls.map((l,i)=>{
    let cls='level-dot';
    if(i<S.levelIdx)cls+=' done';
    else if(i===S.levelIdx)cls+=' active '+trackClass();
    return '<div class="'+cls+'" title="'+(l.cefr||l.id.toUpperCase())+'">'+(l.cefr||l.id.toUpperCase())+'</div>';
  }).join('');
}
function heartsHTML(){
  let h='';
  for(let i=0;i<5;i++)h+=i<S.hearts?'<span style="color:#ef4444">&#9829;</span>':'<span style="color:#e2e8f0">&#9829;</span>';
  return h;
}
function showHome(){
  S.screen='home';S.track='';S.levelIdx=0;
  render('<div class="screen" style="justify-content:flex-start;padding-top:40px">'+
    '<div class="home-hero"><span class="mascot">&#127807;</span><h1>The Roots</h1><p>Arabic &amp; Quran Proficiency Assessment<br><em>Duolingo-inspired: Study first, then prove it</em></p></div>'+
    '<div class="track-grid">'+
    '<div class="track-card arabic" onclick="startTrack(\x27arabic\x27)" tabindex="0"><span class="emoji">&#128218;</span><h2>Arabic Language</h2><p>اللُّغَةُ العَرَبِيَّةُ</p><div class="badge-row"><span class="badge">6 Levels</span><span class="badge">A1 → C2</span><span class="badge">AUC / CEFR</span></div></div>'+
    '<div class="track-card quran" onclick="startTrack(\x27quran\x27)" tabindex="0"><span class="emoji">&#128332;</span><h2>Quran &amp; Tajweed</h2><p>تِلَاوَةُ القُرْآنِ</p><div class="badge-row"><span class="badge">4 Levels</span><span class="badge">Q1 → Q4</span><span class="badge">Tajweed</span></div></div>'+
    '</div>'+
    '<div class="how-it-works"><h3>&#127919; How it works</h3>'+
    '<div class="how-step"><div class="num">1</div><p><strong>Pick a track</strong> — Arabic Language or Quran &amp; Tajweed</p></div>'+
    '<div class="how-step"><div class="num">2</div><p><strong>Study first</strong> — Duolingo-style prep cards with key vocabulary &amp; tips</p></div>'+
    '<div class="how-step"><div class="num">3</div><p><strong>Take the exam</strong> — Hearts system, XP points, instant feedback after each answer</p></div>'+
    '<div class="how-step"><div class="num">4</div><p><strong>Auto-advance</strong> — Pass one level and automatically move to the next</p></div>'+
    '<div class="how-step"><div class="num">5</div><p><strong>Earn your certificate</strong> — at your highest passing level</p></div></div>'+
    '</div>');
}
function startTrack(track){S.track=track;S.levelIdx=0;S.hearts=5;S.xp=0;S.streak=0;showNameEntry();}
function showNameEntry(){
  S.screen='name';
  var tc=trackClass();
  render('<div class="screen"><div class="name-card anim-pop">'+
    '<div class="track-icon">'+(S.track==='arabic'?'&#128218;':'&#128332;')+'</div>'+
    '<h2>'+(S.track==='arabic'?'Arabic Language':'Quran &amp; Tajweed')+'</h2>'+
    '<p>You will start at <strong>Level 1</strong> and advance automatically after each passing score.<br>No level selection needed!</p>'+
    '<input id="nameIn" class="name-input '+tc+'-focus" type="text" placeholder="Enter your full name..." onkeydown="if(event.key===\x27Enter\x27)beginJourney()"/>'+
    '<button class="btn-primary btn-'+tc+'" onclick="beginJourney()">Start My Journey &#8594;</button>'+
    '<br><br><button style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:13px" onclick="showHome()">&#8592; Back to tracks</button>'+
    '</div></div>');
  setTimeout(function(){var i=$('nameIn');if(i)i.focus();},100);
}
function beginJourney(){
  var n=($('nameIn')||{}).value;
  if(!n||!n.trim()){var i=$('nameIn');if(i){i.style.border='2px solid #ef4444';i.placeholder='Please enter your name first!';}return;}
  S.name=n.trim();showPrep();
}
function showPrep(){
  S.screen='prep';
  var l=lvl();var tc=trackClass();var color=l.color||trackColor();
  var tipsHTML=l.prepTips.map(function(t,i){
    return '<div class="prep-tip-card tip-'+tc+' anim-slide" style="animation-delay:'+(i*0.1)+'s">'+
      '<span class="icon">'+t.icon+'</span>'+
      '<div class="content"><h4>'+t.title+'</h4><p>'+t.text+'</p>'+
      (t.arabic?'<div class="arabic-eg">'+t.arabic.replace(/\n/g,'<br>')+'</div>':'')+'</div></div>';
  }).join('');
  var vocabHTML=l.vocab.map(function(v){
    return '<div class="vocab-card"><div class="ar-word">'+v.ar+'</div><div class="en-word">'+v.en+'</div><div class="trans"><em>'+v.tr+'</em></div></div>';
  }).join('');
  render('<div class="screen" id="prepScreen">'+
    '<div class="topbar"><button class="back-btn" onclick="showHome()">&#10005;</button><span class="level-label">'+(l.cefr?l.cefr+' – ':'')+l.name+'</span></div>'+
    '<div class="level-dots">'+dotsHTML()+'</div>'+
    '<div class="prep-header"><div class="phase-chip">&#128218; Study Phase</div>'+
    '<h2 style="color:'+color+'">'+l.name+' <span style="font-family:var(--font-ar)">'+l.nameAr+'</span></h2>'+
    '<p>Review these key concepts before your exam</p></div>'+
    '<div class="prep-cards-wrap">'+tipsHTML+'</div>'+
    '<div style="width:100%;max-width:640px;background:#fff;border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px">'+
    '<h3 style="font-size:15px;font-weight:700;margin-bottom:14px">&#128218; Key Vocabulary</h3>'+
    '<div class="vocab-grid">'+vocabHTML+'</div></div>'+
    '<button class="btn-primary btn-'+tc+'" style="max-width:640px" onclick="startExam()">'+
    '&#10003; I'm Ready – Start Exam ('+l.questions.length+' questions | '+l.timeMin+' min)</button>'+
    '</div>');
}
function startExam(){
  S.screen='exam';S.qIdx=0;S.answers=[];S.hearts=5;S.startTime=Date.now();
  S.totalCorrect=0;S.totalWrong=0;S.feedbackVisible=false;S.xp=0;S.streak=0;
  showQuestion();
}
function showQuestion(){
  if(S.hearts<=0){showResult(true);return;}
  var l=lvl();var q=question();var tc=trackClass();
  var pct=Math.round((S.qIdx/l.questions.length)*100);
  var opts=['A','B','C','D'];
  var optsHTML=q.opts.map(function(o,i){
    var isAr=q.arabic&&/[؀-ۿ]/.test(o);
    return '<button class="opt-btn" id="opt'+i+'" onclick="selectAnswer('+i+')">'+
      '<span class="opt-letter">'+opts[i]+'</span>'+
      (isAr?'<span class="ar-opt">'+o+'</span>':'<span>'+o+'</span>')+'</button>';
  }).join('');
  render('<div class="screen" style="padding-bottom:120px">'+
    '<div class="topbar"><button class="back-btn" onclick="confirmQuit()">&#10005;</button><span class="level-label">'+(l.cefr||l.id.toUpperCase())+' – '+l.name+'</span></div>'+
    '<div class="hud"><div class="hearts">'+heartsHTML()+'</div>'+
    '<div class="xp-wrap"><div class="xp-fill '+tc+'" style="width:'+pct+'%"></div></div>'+
    '<div class="streak-badge">&#128293; '+S.streak+'</div></div>'+
    '<div class="level-dots">'+dotsHTML()+'</div>'+
    '<div class="q-counter">Question '+(S.qIdx+1)+' of '+l.questions.length+'</div>'+
    '<div class="exam-q-wrap">'+
    '<div class="q-card anim-slide"><div class="q-text">'+q.q+'</div>'+
    (q.arabic?'<div class="q-arabic">'+q.arabic+'</div>':'')+'</div>'+
    '<div class="options-wrap" id="optsWrap">'+optsHTML+'</div></div>'+
    '<div id="feedbackPanel" class="feedback-panel hidden-fb">'+
    '<div class="feedback-inner">'+
    '<div id="fbIcon" class="feedback-icon"></div>'+
    '<div id="fbText" class="feedback-text"><h3></h3><p></p></div>'+
    '<button id="fbBtn" class="feedback-next-btn" onclick="nextQuestion()">Continue &#8594;</button>'+
    '</div></div></div>');
}
function selectAnswer(i){
  if(S.feedbackVisible)return;
  S.feedbackVisible=true;
  var q=question();var correct=(i===q.ans);
  S.answers.push({q:S.qIdx,chosen:i,correct:correct});
  document.querySelectorAll('.opt-btn').forEach(function(b){b.disabled=true;});
  var chosen=$('opt'+i);var rightBtn=$('opt'+q.ans);
  if(correct){
    chosen.classList.add('correct','anim-bounce');
    S.streak++;S.xp+=10;S.totalCorrect++;
  } else {
    chosen.classList.add('wrong','anim-shake');
    rightBtn.classList.add('show-correct');
    S.hearts=Math.max(0,S.hearts-1);S.streak=0;S.totalWrong++;
  }
  var fp=$('feedbackPanel');var fbIcon=$('fbIcon');var fbText=$('fbText');var fbBtn=$('fbBtn');
  fp.classList.remove('hidden-fb','correct-fb','wrong-fb');
  if(correct){
    fp.classList.add('correct-fb');
    fbIcon.textContent='\u2705';
    fbText.innerHTML='<h3 style="color:#15803d">Correct! +10 XP</h3><p>'+q.exp+'</p>';
    fbBtn.className='feedback-next-btn';
  } else {
    fp.classList.add('wrong-fb');
    fbIcon.textContent='\u274C';
    fbText.innerHTML='<h3 style="color:#b91c1c">Incorrect</h3><p>'+q.exp+'</p>';
    fbBtn.className='feedback-next-btn wrong-btn';
  }
  if(S.hearts<=0)setTimeout(function(){showResult(true);},1200);
}
function nextQuestion(){
  S.feedbackVisible=false;S.qIdx++;
  if(S.qIdx>=lvl().questions.length){showResult(false);return;}
  showQuestion();
}
function confirmQuit(){if(confirm('Quit this exam? Your progress will be lost.'))showHome();}
function showResult(outOfHearts){
  S.screen='result';
  var l=lvl();var total=l.questions.length;
  var correct=S.answers.filter(function(a){return a.correct;}).length;
  var pct=Math.round((correct/total)*100);
  var passed=!outOfHearts&&pct>=l.passPct;
  var tc=trackClass();
  var elapsed=Math.round((Date.now()-S.startTime)/1000);
  var mins=Math.floor(elapsed/60);var secs=elapsed%60;
  var nextLvl=S.levelIdx+1<levels().length;
  render('<div class="screen"><div class="result-card anim-bounce">'+
    '<div class="result-circle '+(passed?'pass':'fail')+'">'+(passed?'&#127881;':'&#128532;')+'<div style="font-size:22px">'+pct+'%</div></div>'+
    '<h2>'+(passed?'Level Passed!':outOfHearts?'Out of Hearts!':'Not Quite Yet')+'</h2>'+
    '<p>'+(passed?'Excellent! You passed <strong>'+l.name+'</strong> with '+pct+'%.'+
      (nextLvl?' Ready for the next challenge!':' You've reached the highest level!'):
      outOfHearts?'You ran out of hearts. Score: '+pct+'%. Need '+l.passPct+'% to pass.':
      'You scored '+pct+'%. Need '+l.passPct+'% to pass. Review and try again!')+'</p>'+
    '<div class="result-stats">'+
    '<div class="result-stat"><div class="val" style="color:#22c55e">'+correct+'</div><div class="lbl">Correct</div></div>'+
    '<div class="result-stat"><div class="val" style="color:#ef4444">'+(total-correct)+'</div><div class="lbl">Incorrect</div></div>'+
    '<div class="result-stat"><div class="val" style="color:#f59e0b">'+S.xp+'</div><div class="lbl">XP Earned</div></div></div>'+
    '<div class="result-stats" style="margin-bottom:20px">'+
    '<div class="result-stat"><div class="val" style="color:#8b5cf6">'+mins+'m '+secs+'s</div><div class="lbl">Time</div></div>'+
    '<div class="result-stat"><div class="val">'+pct+'%</div><div class="lbl">Score</div></div>'+
    '<div class="result-stat"><div class="val">'+l.passPct+'%</div><div class="lbl">Pass Mark</div></div></div>'+
    (passed&&nextLvl?'<button class="btn-primary btn-'+tc+'" onclick="advanceLevel()" style="margin-bottom:10px">Next Level: '+levels()[S.levelIdx+1].name+' &#8594;</button>':
     passed&&!nextLvl?'<button class="btn-primary btn-'+tc+'" onclick="showCertificate()" style="margin-bottom:10px">&#127891; View Your Certificate</button>':
     '<button class="btn-primary btn-'+tc+'" onclick="retryLevel()" style="margin-bottom:10px">&#128260; Retry This Level</button>')+
    (passed?'<button style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:13px;display:block;margin:0 auto" onclick="showCertificate()">View certificate for current level</button>':'')+
    '</div></div>');
}
function advanceLevel(){S.levelIdx++;showPrep();}
function retryLevel(){showPrep();}
function showCertificate(){
  S.screen='certificate';
  var l=lvl();var tc=trackClass();var color=l.color||trackColor();
  var d=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var correct=S.answers.filter(function(a){return a.correct;}).length;
  var pct=Math.round((correct/lvl().questions.length)*100);
  render('<div class="screen"><div class="cert-wrap anim-bounce">'+
    '<div class="cert-top">Certificate of Proficiency</div>'+
    '<h1>The Roots</h1>'+
    '<div style="font-size:14px;color:#64748b;margin-bottom:12px">This certifies that</div>'+
    '<div class="cert-name">'+S.name+'</div>'+
    '<div style="font-size:14px;color:#64748b;margin-bottom:12px">has demonstrated proficiency at</div>'+
    '<div class="cert-level">'+l.nameAr+'</div>'+
    '<div class="cert-cefr">'+(l.cefr||l.id.toUpperCase())+' – '+l.name+'</div>'+
    '<div class="cert-desc">'+(l.cefr?'Aligned with the CEFR framework and AUC Arabic curriculum. Based on Al-Arabiyya Bayna Yadayk and Al-Kitaab methodology.':
    'Aligned with Tajweed sciences of al-Quran al-Karim based on established Qira'at traditions.')+'</div>'+
    '<div class="cert-seal">'+(S.track==='arabic'?'&#128220;':'&#128332;')+'</div>'+
    '<div style="font-size:14px;font-weight:700;color:'+color+';margin-bottom:6px">Score: '+pct+'% | XP: '+S.xp+'</div>'+
    '<div class="cert-date">Issued: '+d+'</div><br>'+
    '<button class="btn-primary btn-'+tc+'" style="margin-bottom:10px" onclick="window.print()">&#128424; Print Certificate</button>'+
    '<button style="background:none;border:2px solid #e2e8f0;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;color:#64748b;width:100%" onclick="showHome()">&#8592; Back to Home</button>'+
    '</div></div>');
}
showHome();
</script>
</body></html>
