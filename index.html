<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>The Roots - Quranic Arabic Proficiency Exam</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px}
#app{width:100%;max-width:860px;background:#fff;border-radius:22px;box-shadow:0 16px 50px rgba(0,0,0,.28);overflow:hidden;margin:auto}
.hdr{color:#fff;padding:32px 28px;text-align:center}
.hdr.home{background:linear-gradient(135deg,#667eea,#764ba2)}
.hdr.elementary{background:linear-gradient(135deg,#f093fb,#f5576c)}
.hdr.middle{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.hdr.highschool{background:linear-gradient(135deg,#43e97b,#38f9d7)}
.hdr.adult{background:linear-gradient(135deg,#fa709a,#fee140)}
.hdr h1{font-size:1.75em;font-weight:700;margin:8px 0}
.hdr .sub{font-size:1em;opacity:.9;font-style:italic}
.hdr .ar{font-size:1.5em;font-weight:600;direction:rtl;margin:8px 0}
.cnt{padding:32px 28px}
/* HOME */
.home-title{text-align:center;margin-bottom:24px}
.home-title h2{font-size:1.7em;font-weight:700;color:#222;margin-bottom:6px}
.home-title p{color:#666;font-size:.97em}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:16px}
.card{border:2.5px solid #e8e8e8;border-radius:14px;padding:22px 16px;cursor:pointer;transition:transform .25s,box-shadow .25s,border-color .25s;background:#fafafa;text-align:center}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 30px rgba(0,0,0,.13)}
.card.elementary:hover{border-color:#f5576c;background:rgba(245,87,108,.05)}
.card.middle:hover{border-color:#4facfe;background:rgba(79,172,254,.05)}
.card.highschool:hover{border-color:#43e97b;background:rgba(67,233,123,.05)}
.card.adult:hover{border-color:#fa709a;background:rgba(250,112,154,.05)}
.card .icon{font-size:2.6em;display:block;margin-bottom:8px}
.card h3{font-size:1.1em;font-weight:700;color:#222;margin:4px 0}
.card .age{font-size:.78em;font-weight:700;margin:3px 0}
.card.elementary .age{color:#f5576c}
.card.middle .age{color:#0099cc}
.card.highschool .age{color:#1ea86b}
.card.adult .age{color:#d63f6f}
.card .desc{color:#666;font-size:.82em;margin:6px 0}
.card ul{text-align:left;background:#f0f0f0;border-radius:8px;padding:10px 12px;margin:10px 0;list-style:none;font-size:.8em;color:#555}
.card ul li{padding:3px 0 3px 16px;position:relative}
.card ul li::before{content:"✓";position:absolute;left:0;color:#43e97b;font-weight:700}
.card .meta{font-size:.75em;color:#999;margin-top:6px}
/* INFO FORM */
.info-form{max-width:520px;margin:0 auto}
.info-form h2{text-align:center;font-size:1.5em;font-weight:700;color:#222;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-weight:600;color:#444;font-size:.92em;margin-bottom:5px}
.field input{width:100%;padding:11px 14px;border:2px solid #ddd;border-radius:9px;font-size:.97em;outline:none;transition:border-color .2s}
.field input:focus{border-color:#667eea}
/* EXAM */
.prog-bar{background:#eee;border-radius:20px;height:7px;margin-bottom:18px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#667eea,#764ba2);transition:width .3s}
.qnum{color:#888;font-size:.87em;margin-bottom:6px;font-weight:500}
.timer{padding:9px 16px;border-radius:9px;text-align:center;font-weight:700;font-size:1em;margin-bottom:16px;background:#fff8e1;border:2px solid #ffc107;color:#7a5500}
.timer.warn{background:#ffe8e8;border-color:#f5576c;color:#a00;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.passage-label{font-size:.78em;color:#667eea;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.passage-box{background:#f5f7ff;border-left:4px solid #667eea;padding:16px;border-radius:0 10px 10px 0;margin-bottom:18px;direction:rtl;text-align:right;font-size:1.1em;line-height:2;color:#222}
.passage-note{font-size:.78em;color:#888;text-align:right;margin-bottom:12px}
.qtext{font-size:1.18em;font-weight:700;color:#111;margin-bottom:16px;line-height:1.55}
.options{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.opt{background:#f7f7f7;border:2px solid #ddd;border-radius:9px;padding:12px 16px;cursor:pointer;transition:all .2s;text-align:left;font-size:.96em;display:flex;align-items:center;gap:10px}
.opt:hover:not(.locked){background:#f0f0ff;border-color:#667eea}
.opt.selected{background:#eef0ff;border-color:#667eea}
.opt.correct{background:#e6f9ee;border-color:#2ecc71;color:#155724}
.opt.wrong{background:#fce8e8;border-color:#e74c3c;color:#7a0000}
.opt.ar{direction:rtl;text-align:right;font-size:1.05em}
.opt-letter{width:26px;height:26px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:.78em;font-weight:700;flex-shrink:0}
.opt.selected .opt-letter{border-color:#667eea;background:#667eea;color:#fff}
.opt.correct .opt-letter{border-color:#2ecc71;background:#2ecc71;color:#fff}
.opt.wrong .opt-letter{border-color:#e74c3c;background:#e74c3c;color:#fff}
/* BUTTONS */
.btn{display:block;width:100%;padding:13px;border-radius:11px;font-size:1em;font-weight:600;cursor:pointer;border:none;transition:all .22s;margin-top:8px}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 7px 18px rgba(102,126,234,.4)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-sec{background:#f0f0f0;color:#333;border:2px solid #ddd}
.btn-sec:hover{background:#e4e4e4}
/* RESULTS */
.result-box{text-align:center;padding:8px 0}
.score-big{font-size:3.8em;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin:10px 0}
.score-label{color:#555;font-size:.97em;margin-bottom:10px}
.badge{display:inline-block;padding:7px 22px;border-radius:20px;font-weight:700;font-size:1em;margin:10px 0}
.badge.pass{background:#e6f9ee;color:#155724;border:2px solid #2ecc71}
.badge.fail{background:#fce8e8;color:#7a0000;border:2px solid #e74c3c}
.cert{background:linear-gradient(135deg,#fff8e1,#ffe0b2);border-radius:16px;padding:26px;margin:18px 0;border:2.5px solid #f5a623;text-align:center}
.cert h3{color:#7c4200;font-size:1.3em;font-weight:700;margin-bottom:8px}
.cert .cname{font-size:1.6em;font-weight:800;color:#5c3200;margin:8px 0}
.cert .cline{color:#7c4200;font-size:.95em;margin:4px 0}
.cert .cdate{font-size:.8em;color:#a05800;margin-top:10px;font-style:italic}
.review{background:#f8f9fa;border-radius:12px;padding:16px;margin:16px 0;text-align:left}
.review h4{font-weight:700;color:#333;margin-bottom:12px;font-size:1em}
.ritem{border-bottom:1px solid #eee;padding:9px 0;font-size:.88em}
.ritem:last-child{border-bottom:none}
.rq{color:#444;font-weight:500;margin-bottom:4px;line-height:1.4}
.rcorrect{color:#155724;font-weight:600}
.rwrong{color:#7a0000;font-weight:600}
.fail-note{color:#888;font-size:.9em;margin:12px 0;text-align:center}
@media(max-width:480px){.grid{grid-template-columns:1fr 1fr}.cnt{padding:20px 15px}.hdr{padding:22px 15px}}
</style>
</head>

  const cards=Object.values(LEVELS).map(lv=>{
    const skills=lv.skills.map(s=>"<li>"+s+"</li>").join("");
    return "<div class='card "+lv.id+"' data-level='"+lv.id+"'><span class='icon'>"+lv.icon+"</span><h3>"+lv.name+"</h3><div class='age'>"+lv.age+"</div><div class='desc'>"+lv.desc+"</div><ul>"+skills+"</ul><div class='meta'>"+lv.total+" questions &middot; "+lv.dur+" min &middot; Pass: "+lv.pass+"%</div></div>";
  }).join("");
  return "<div class='hdr home'><div class='ar'>جُذُور — الاختبار العربي القرآني</div><h1>The Roots - Quranic Arabic Proficiency</h1><div class='sub'>Select your level to begin</div></div><div class='cnt'><div class='home-title'><h2>Choose Your Level</h2><p>Age-appropriate exams for non-native Arabic learners — from beginners to advanced professionals</p></div><div class='grid'>"+cards+"</div></div>";
}

// ── INFO ──────────────────────────────────────────────────────────────────
function renderInfo(){
  const lv=state.level;
  return "<div class='hdr "+lv.id+"'><div class='ar'>"+lv.ar+"</div><h1>"+lv.name+" Level</h1><div class='sub'>"+lv.age+" &middot; "+lv.total+" Questions &middot; "+lv.dur+" min</div></div><div class='cnt'><div class='info-form'><h2>Candidate Information</h2><div class='field'><label>Full Name</label><input id='inp-name' type='text' placeholder='Enter your full name' value='"+esc(state.name)+"'></div><div class='field'><label>Email Address</label><input id='inp-email' type='email' placeholder='Enter your email' value='"+esc(state.email)+"'></div><div class='field'><label>Age</label><input id='inp-age' type='number' placeholder='Your age' value='"+esc(state.age)+"'></div><button class='btn btn-primary' id='btn-begin' "+(state.name.trim()?"":"disabled")+">Begin Examination</button><button class='btn btn-sec' id='btn-back' style='margin-top:10px'>Back to Levels</button></div></div>";
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}

// ── EXAM ──────────────────────────────────────────────────────────────────
function renderExam(){
  const lv=state.level;
  const qs=QS[lv.id];
  const q=qs[state.qIdx];
  const pct=((state.qIdx+1)/qs.length*100).toFixed(1);
  const warn=state.timeLeft<120;
  const mins=Math.floor(state.timeLeft/60);
  const secs=state.timeLeft%60;
  const timeStr=mins+":"+(secs<10?"0":"")+secs;

  // Passage logic
  let passageHtml="";
  if(q.passage&&!q.passage.same){
    state.passageRef=q.passage;
    passageHtml="<div class='passage-label'>"+q.passage.label+"</div><div class='passage-box'>"+q.passage.text+"</div>"+(q.passage.note?"<div class='passage-note'>"+q.passage.note+"</div>":"");
  } else if(q.passage&&q.passage.same&&state.passageRef){
    passageHtml="<div class='passage-label'>"+state.passageRef.label+"</div><div class='passage-box'>"+state.passageRef.text+"</div>"+(state.passageRef.note?"<div class='passage-note'>"+state.passageRef.note+"</div>":"");
  }

  const opts=q.o.map((opt,i)=>{
    const isAr=/[؀-ۿ]/.test(opt);
    let cls="opt"+(isAr?" ar":"");
    if(state.confirmed){
      if(i===q.a) cls+=" correct";
      else if(i===state.selected&&state.selected!==q.a) cls+=" wrong";
      cls+=" locked";
    } else if(i===state.selected) cls+=" selected";
    const letter=String.fromCharCode(65+i);
    return "<button class='"+cls+"' data-opt='"+i+"'><span class='opt-letter'>"+letter+"</span>"+opt+"</button>";
  }).join("");

  const navBtn=state.confirmed
    ? "<button class='btn btn-primary' id='btn-next'>"+(state.qIdx<qs.length-1?"Next Question &rarr;":"Finish Exam ✓")+"</button>"
    : "<button class='btn btn-primary' id='btn-confirm' "+(state.selected===null?"disabled":"")+"}>Confirm Answer</button>";

  return "<div class='hdr "+lv.id+"'><h1>"+lv.name+" Exam</h1><div class='sub'>"+esc(state.name)+"</div></div><div class='cnt'><div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div><div class='qnum'>Question "+(state.qIdx+1)+" of "+qs.length+"</div><div class='timer"+(warn?" warn":"")+"'>⏱ "+timeStr+(warn?" — Hurry!":"")+"</div>"+passageHtml+"<div class='qtext'>"+q.q+"</div><div class='options'>"+opts+"</div>"+navBtn+"</div>";
}

// ── RESULTS ───────────────────────────────────────────────────────────────
function renderResults(){
  const lv=state.level;
  const qs=QS[lv.id];
  let correct=0;
  qs.forEach((q,i)=>{if(state.answers[i]===q.a)correct++;});
  const pct=Math.round(correct/qs.length*100);
  const passed=pct>=lv.pass;

  const certHtml=passed?"<div class='cert'><h3>Certificate of Achievement</h3><div>This certifies that</div><div class='cname'>"+esc(state.name)+"</div><div class='cline'>has passed the <b>Roots Quranic Arabic Proficiency</b></div><div class='cline'><b>"+lv.name+" Level</b> with a score of <b>"+pct+"%</b></div><div class='cdate'>Issued by Pathways School &middot; "+new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})+"</div></div>":"<p class='fail-note'>Required passing score: "+lv.pass+"% &mdash; Please review the material and try again.</p>";

  const reviewItems=qs.map((q,i)=>{
    const userAns=state.answers[i];
    const wrongHtml=(userAns!==undefined&&userAns!==q.a)?"<div class='rwrong'>✗ Your answer: "+q.o[userAns]+"</div>":"";
    return "<div class='ritem'><div class='rq'>"+(i+1)+". "+q.q+"</div>"+wrongHtml+"<div class='rcorrect'>✓ Correct: "+q.o[q.a]+"</div></div>";
  }).join("");

  return "<div class='hdr "+lv.id+"'><h1>Exam Complete</h1><div class='sub'>"+lv.name+" Level &middot; "+esc(state.name)+"</div></div><div class='cnt'><div class='result-box'><div class='score-big'>"+pct+"%</div><div class='score-label'>"+correct+" out of "+qs.length+" correct</div><div class='badge "+(passed?"pass":"fail")+"'>"+(passed?"✅ PASSED":"❌ Did Not Pass")+"</div>"+certHtml+"</div><div class='review'><h4>📋 Answer Review</h4>"+reviewItems+"</div><button class='btn btn-primary' id='btn-home'>Try Another Level</button><button class='btn btn-sec' id='btn-retry' style='margin-top:10px'>Retry This Level</button></div>";
}

// ── EVENTS ────────────────────────────────────────────────────────────────
function attachEvents(){
  // Home: click level card
  document.querySelectorAll(".card[data-level]").forEach(el=>{
    el.addEventListener("click",()=>{
      state.level=LEVELS[el.dataset.level];
      state.screen="info";
      render();
    });
  });

  // Info: live name update
  const nm=document.getElementById("inp-name");
  if(nm){
    nm.addEventListener("input",e=>{
      state.name=e.target.value;
      const btn=document.getElementById("btn-begin");
      if(btn) btn.disabled=!state.name.trim();
    });
  }
  const em=document.getElementById("inp-email");
  if(em) em.addEventListener("input",e=>state.email=e.target.value);
  const ag=document.getElementById("inp-age");
  if(ag) ag.addEventListener("input",e=>state.age=e.target.value);

  const btnBegin=document.getElementById("btn-begin");
  if(btnBegin) btnBegin.addEventListener("click",()=>{
    if(!state.name.trim())return;
    state.screen="exam";
    state.qIdx=0;state.answers={};state.selected=null;state.confirmed=false;
    state.passageRef=null;
    state.timeLeft=state.level.dur*60;
    if(state.timer)clearInterval(state.timer);
    state.timer=setInterval(()=>{
      state.timeLeft--;
      if(state.timeLeft<=0){clearInterval(state.timer);state.screen="results";}
      render();
    },1000);
    render();
  });

  const btnBack=document.getElementById("btn-back");
  if(btnBack) btnBack.addEventListener("click",()=>{state.screen="home";render();});

  // Exam: select option
  document.querySelectorAll(".opt[data-opt]").forEach(el=>{
    el.addEventListener("click",()=>{
      if(state.confirmed)return;
      state.selected=parseInt(el.dataset.opt);
      render();
    });
  });

  const btnConfirm=document.getElementById("btn-confirm");
  if(btnConfirm) btnConfirm.addEventListener("click",()=>{
    if(state.selected===null)return;
    state.answers[state.qIdx]=state.selected;
    state.confirmed=true;
    render();
  });

  const btnNext=document.getElementById("btn-next");
  if(btnNext) btnNext.addEventListener("click",()=>{
    const qs=QS[state.level.id];
    if(state.qIdx<qs.length-1){
      state.qIdx++;state.selected=null;state.confirmed=false;
      render();
    } else {
      clearInterval(state.timer);
      state.screen="results";render();
    }
  });

  const btnHome=document.getElementById("btn-home");
  if(btnHome) btnHome.addEventListener("click",()=>{
    clearInterval(state.timer);
    state.screen="home";state.qIdx=0;state.answers={};state.selected=null;state.confirmed=false;state.passageRef=null;
    render();
  });

  const btnRetry=document.getElementById("btn-retry");
  if(btnRetry) btnRetry.addEventListener("click",()=>{
    state.screen="exam";state.qIdx=0;state.answers={};state.selected=null;state.confirmed=false;state.passageRef=null;
    state.timeLeft=state.level.dur*60;
    if(state.timer)clearInterval(state.timer);
    state.timer=setInterval(()=>{
      state.timeLeft--;
      if(state.timeLeft<=0){clearInterval(state.timer);state.screen="results";}
      render();
    },1000);
    render();
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
