<!DOCTYPE html>
<html lang="en">
<head>

<title>The Roots - Quranic Arabic Exam | Pathways</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:15px;color:#333}
.app{width:100%;max-width:1100px;background:white;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:si .5s ease-out;max-height:95vh;overflow-y:auto}
@keyframes si{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hdr{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:40px 30px;text-align:center}
.hdr.elementary{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)}
.hdr.middle{background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)}
.hdr.highschool{background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)}
.hdr.adult{background:linear-gradient(135deg,#fa709a 0%,#fee140 100%)}
.hdr h1{font-size:2em;margin:10px 0;font-weight:600}
.hdr .sub{font-size:1.5em;font-style:italic;margin:8px 0}
.hdr .ar{font-size:1.4em;margin:15px 0;direction:rtl}
.cnt{padding:40px 30px;min-height:400px;animation:fu .6s ease-out}
.ls{text-align:center}
.ls h2{color:#333;margin-bottom:15px;font-size:2em;font-weight:700}
.ls p{color:#666;margin-bottom:30px;font-size:1.1em}
.lg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:30px}
.lc{border:3px solid #e0e0e0;border-radius:16px;padding:30px 20px;cursor:pointer;transition:all .4s;background:#fafafa;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.lc:hover{transform:translateY(-8px);box-shadow:0 15px 40px rgba(0,0,0,.2)}
.lc.elementary{border-color:#f093fb}.lc.elementary:hover{background:rgba(240,147,251,.1)}
.lc.middle{border-color:#4facfe}.lc.middle:hover{background:rgba(79,172,254,.1)}
.lc.highschool{border-color:#43e97b}.lc.highschool:hover{background:rgba(67,233,123,.1)}
.lc.adult{border-color:#fa709a}.lc.adult:hover{background:rgba(250,112,154,.1)}
.li{font-size:3.5em;margin-bottom:15px;transition:transform .4s}
.lc:hover .li{transform:scale(1.2) rotate(-8deg)}
.lc h3{font-size:1.5em;margin:15px 0 8px;font-weight:700;color:#333}
.ab{font-size:.85em;color:#999;margin:6px 0}
.ld{color:#777;font-size:.9em;margin:10px 0}
.ls2{text-align:left;background:white;padding:12px;border-radius:8px;margin:12px 0;font-size:.8em;color:#666;list-style:none;border:1px solid #f0f0f0}
.ls2 li{margin:6px 0;padding-left:18px;position:relative}
.ls2 li:before{content:'✓';position:absolute;left:0;color:#43e97b;font-weight:bold}
.db{display:inline-block;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:8px 16px;border-radius:20px;font-size:.8em;font-weight:700;margin-top:12px}
.lc.elementary .db{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)}
.lc.middle .db{background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)}
.lc.highschool .db{background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)}
.lc.adult .db{background:linear-gradient(135deg,#fa709a 0%,#fee140 100%)}
.fs{margin:25px 0}
.fs h3{color:#333;margin-bottom:18px;font-size:1.3em;font-weight:700;border-bottom:3px solid #667eea;padding-bottom:10px}
.fg{margin-bottom:18px}
.fg label{display:block;margin-bottom:8px;color:#333;font-weight:600;font-size:.95em}
.fg input,.fg select{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:16px;font-family:inherit;transition:all .3s}
.fg input:focus,.fg select:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:15px}

.eh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid #e0e0e0;gap:15px;flex-wrap:wrap}
.ps{flex:1;min-width:150px}
.pl{color:#666;font-weight:600;font-size:.9em;margin-bottom:8px;display:flex;justify-content:space-between}
.pb{width:100%;height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);transition:width .4s}
.tm{font-size:1.5em;font-weight:800;color:#667eea;white-space:nowrap;padding:10px 16px;background:rgba(102,126,234,.1);border-radius:8px;border:2px solid rgba(102,126,234,.2);font-family:'Courier New',monospace}
.tm.warn{color:#e74c3c;background:rgba(231,76,60,.15);border-color:rgba(231,76,60,.3);animation:pu .8s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.6}}
.qc{background:#f9f9f9;border-left:5px solid #667eea;padding:30px;border-radius:10px;margin-bottom:25px;animation:fu .5s}
.qb{display:inline-block;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:6px 12px;border-radius:16px;font-size:.7em;font-weight:700;margin-bottom:15px;text-transform:uppercase}
.qt{font-size:1.15em;color:#333;margin-bottom:20px;line-height:1.6;font-weight:600}
.qo{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.op{padding:14px 16px;border:2px solid #ddd;border-radius:8px;cursor:pointer;transition:all .3s;background:white;display:flex;align-items:center;gap:12px;font-size:.95em}
.op:hover{border-color:#667eea;transform:translateX(2px)}
.op input{cursor:pointer;width:20px;height:20px;accent-color:#667eea;flex-shrink:0}
.op.sel{border-color:#667eea;background:rgba(102,126,234,.08);font-weight:600}
.bg{display:flex;gap:12px;justify-content:center;margin-top:30px;flex-wrap:wrap}
button{padding:12px 30px;font-size:.95em;border:none;border-radius:8px;cursor:pointer;transition:all .3s;font-weight:700;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 4px 12px rgba(0,0,0,.15)}
button:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.2)}
button:disabled{opacity:.5;cursor:not-allowed}
.bp{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
.bs{background:#f0f0f0;color:#333;border:2px solid #ddd}
.rc{text-align:center}
.rc h2{color:#333;margin-bottom:10px;font-size:2em;font-weight:700}
.sd{font-size:4em;font-weight:900;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:20px 0}
.sf{font-size:1.5em;color:#333;margin:15px 0;font-weight:700}
.sb{display:inline-block;padding:10px 25px;border-radius:20px;font-weight:700;font-size:.95em;margin:15px 0;text-transform:uppercase}
.sb.pass{background:rgba(39,174,96,.15);color:#27ae60;border:2px solid #27ae60}
.sb.fail{background:rgba(231,76,60,.15);color:#e74c3c;border:2px solid #e74c3c}
.sdt{background:#f9f9f9;padding:25px;border-radius:10px;margin:25px 0;text-align:left;border-left:5px solid #667eea}
.sdt h4{color:#333;margin-bottom:18px;font-size:1.2em;font-weight:700}
.dr{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #e0e0e0}
.dr:last-child{border-bottom:none}
.cert{border:4px solid #667eea;border-radius:12px;padding:40px 25px;margin:30px 0;background:rgba(102,126,234,.05);text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.1)}
.cs{font-size:4em;margin:15px 0}
.cert h3{color:#333;font-size:1.8em;margin:15px 0;font-weight:700}
.cert p{color:#666;margin:12px 0;font-size:1em}
.cert .ach{font-weight:900;color:#667eea}
.pn{background:rgba(102,126,234,.1);border-left:4px solid #667eea;padding:15px;margin:20px 0;border-radius:8px;font-size:.9em;color:#555}
@media(max-width:480px){.sd{font-size:2.5em}.eh{flex-direction:column}}
</style>
</head>

omplete verb','Weak verb','Linking verb','Hollow verb'],c:1},{id:5,t:'"كان" indicates?',o:['Past','Future','State of being','Action'],c:2},{id:6,t:'Agent in "كتب الطالب"?',o:['كتب','الطالب','Both','الـ'],c:1},{id:7,t:'Dual of "محمد"?',o:['محمدان','محمدين','محمادة','محمدات'],c:0},{id:8,t:'Translate "بسم الله"?',o:['In the name of God','Named God','God named','All above'],c:0},{id:9,t:'What is "الإعراب"?',o:['Voweling','Grammar cases','Diacritical marks','All above'],c:3},{id:10,t:'Tense of "سيكتب"?',o:['Past','Present','Future','Conditional'],c:2},{id:11,t:'Arabic root forms?',o:['3 main','7 forms','10 forms','14 forms'],c:3},{id:12,t:'Nominative case marker?',o:['Damma (u)','Kasra (i)','Sukun','Fatha (a)'],c:0},{id:13,t:'Mudhaf structure?',o:['Two nouns in genitive','Adjective+noun','Verb+object','Prep+noun'],c:0},{id:14,t:'"الفعل المصروف" means?',o:['Unchanged verb','Fully conjugable verb','Invariable','Derived verb'],c:1},{id:15,t:'Total surahs?',o:['50','100','114','200'],c:2},{id:16,t:'Jussive case marker?',o:['Damma','Kasra','Sukun','Fatha'],c:2},{id:17,t:'5 Pillars of Islam?',o:['5 religious practices','Set of beliefs','Islamic law','All of the above'],c:3},{id:18,t:'Solar letters count?',o:['12','13','14','15'],c:2},{id:19,t:'What is "الضمير المنفصل"?',o:['Separate pronoun','Attached pronoun','Demonstrative','Relative pronoun'],c:0},{id:20,t:'"Bismillah" is?',o:['3-letter phrase','A full word','An opening phrase','All above'],c:3}],adult:[{id:1,t:'Grammar of "إن الله مع الصابرين"?',o:['Assertive+subject/predicate','Conditional clause','Question form','Imperative'],c:0},{id:2,t:'Tajweed rule for "ال"?',o:['Assimilation','Definite article','Solar/Lunar letters','Glottal stop'],c:2},{id:3,t:'Features in "والمؤمنات والمؤمنون"?',o:['Plural forms','Gender markers','Coordinated clause','All of above'],c:3},{id:4,t:'CEFR Level B1 describes?',o:['Independent user','Proficient user','Basic user','Mastery level'],c:0},{id:5,t:'What is "الإظهار" in tajweed?',o:['Assimilation','Clear pronunciation','Nasal sound','Emphatic'],c:1},{id:6,t:'Conjugate "درس" all persons?',o:['درسوا only','يدرس only','ندرس only','All forms possible'],c:3},{id:7,t:'"الإدغام" is a?',o:['Regional dialect','Tajweed rule','Grammar concept','Variation'],c:1},{id:8,t:'Mudhaf-Mudhaf ilayh structure?',o:['Two nouns genitive relation','Adjective+noun','Verb+object','Prep+noun'],c:0},{id:9,t:'Fully conjugable Arabic verb?',o:['Unchanged verb','Conjugable verb','Invariable','Derived only'],c:1},{id:10,t:'Number of Quran surahs?',o:['100','110','114','120'],c:2},{id:11,t:'5 Pillars include?',o:['Shahada,Prayer,Zakat,Hajj,Fasting','Five beliefs only','Five laws','All correct'],c:3},{id:12,t:'Solar letters in Arabic?',o:['12 letters','13 letters','14 letters','15 letters'],c:2},{id:13,t:'What is "الضمير المنفصل"?',o:['Separate pronoun','Attached pronoun','Demonstrative','Relative'],c:0},{id:14,t:'"Bismillah" structure?',o:['Three words','One compound word','An opening phrase','All correct'],c:3},{id:15,t:'CEFR Framework levels?',o:['5 levels','6 levels','7 levels','4 levels'],c:1},{id:16,t:'Major tajweed rules?',o:['10 rules','15 rules','20 rules','25+ rules'],c:2},{id:17,t:'Quran chapters?',o:['100','114','130','150'],c:1},{id:18,t:'Arabic root pattern?',o:['2 letters','3 letters (most)','4 letters','Varies always'],c:1},{id:19,t:'Arabic grammar cases?',o:['Nominative only','Accusative only','Genitive only','All three cases'],c:3},{id:20,t:'RQAP assessment level?',o:['RQAP Level 1','RQAP Level 2 (Asasi)','RQAP Level 3','Professional Only'],c:1},{id:21,t:'Proficiency dimensions?',o:['Receptive only','Productive only','Interactive only','All three'],c:3},{id:22,t:'RQAP certification basis?',o:['Level-based','Score-based','Test-based','All integrated'],c:3},{id:23,t:'RQAP certificate validity?',o:['1 year','2 years','3 years','5 years'],c:3},{id:24,t:'Standard retake policy?',o:['Only once','Maximum 2 times','Unlimited','Every 6 months'],c:1},{id:25,t:'Portfolio in assess )
)
),
