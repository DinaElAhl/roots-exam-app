<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>The Roots - Arabic &amp; Quran Proficiency Assessment</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;min-height:100%;font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(145deg,#0d3b5e,#1a6b3a);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px}#app{width:100%;max-width:860px;background:#fff;border-radius:16px;box-shadow:0 12px 48px rgba(0,0,0,.3);overflow:hidden;margin:auto}.hdr{color:#fff;padding:22px 26px;text-align:center}.hdr.at{background:linear-gradient(135deg,#1a5276,#2980b9)}.hdr.qt{background:linear-gradient(135deg,#145a32,#27ae60)}.hdr.home{background:linear-gradient(135deg,#0d3b5e,#1a6b3a)}.hdr h1{font-size:1.55em;font-weight:700;margin:4px 0}.hdr .sub{font-size:.88em;opacity:.85;margin-top:4px}.hdr .ar{font-size:1.6em;font-weight:700;direction:rtl;margin:5px 0;font-family:'Traditional Arabic','Amiri',serif}.cnt{padding:20px 24px}.home-intro{text-align:center;margin-bottom:22px}.home-intro h2{font-size:1.45em;font-weight:700;color:#0d3b5e;margin-bottom:5px}.home-intro p{color:#555;font-size:.93em;line-height:1.6}.tracks{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}@media(max-width:560px){.tracks{grid-template-columns:1fr}}.tcard{border:2.5px solid #ddd;border-radius:13px;padding:20px 16px;cursor:pointer;transition:transform .2s,box-shadow .2s;text-align:center}.tcard:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.12)}.tcard.at{border-color:#2980b9;background:linear-gradient(145deg,#eaf4fb,#fafafa)}.tcard.at:hover{border-color:#1a5276;background:#eaf4fb}.tcard.qt{border-color:#27ae60;background:linear-gradient(145deg,#eafaf1,#fafafa)}.tcard.qt:hover{border-color:#145a32;background:#eafaf1}.tcard .ic{font-size:2.5em;display:block;margin-bottom:9px}.tcard h3{font-size:1.1em;font-weight:700;margin-bottom:5px}.tcard.at h3{color:#1a5276}.tcard.qt h3{color:#145a32}.tcard p{font-size:.83em;color:#666;line-height:1.5}.tcard .badges{margin-top:9px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center}.bdg{font-size:.71em;padding:2px 8px;border-radius:10px;font-weight:600}.bdg.ab{background:#d6eaf8;color:#1a5276}.bdg.qb{background:#d5f5e3;color:#145a32}.nav-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}.btn{display:inline-block;padding:10px 22px;border-radius:8px;font-size:.93em;font-weight:700;cursor:pointer;border:none;transition:background .2s,transform .1s}.btn:active{transform:scale(.97)}.btn-a{background:#1a5276;color:#fff}.btn-a:hover{background:#0d3b5e}.btn-q{background:#145a32;color:#fff}.btn-q:hover{background:#0b4125}.btn-sec{background:#eee;color:#444}.btn-sec:hover{background:#ddd}.btn-sm{padding:7px 15px;font-size:.83em}.exam-meta{display:flex;justify-content:space-between;align-items:center;background:#f8f9fa;border-radius:9px;padding:9px 14px;margin-bottom:16px;font-size:.86em;color:#555;flex-wrap:wrap;gap:8px}.em-level{font-weight:700;color:#1a5276}.em-level.q{color:#145a32}.timer{font-weight:700;font-size:.98em;color:#e74c3c;font-variant-numeric:tabular-nums}.timer.warn{color:#c0392b;animation:pulse .8s infinite alternate}@keyframes pulse{from{opacity:1}to{opacity:.4}}.prog-wrap{margin-bottom:16px}.prog-lbl{display:flex;justify-content:space-between;font-size:.8em;color:#777;margin-bottom:4px}.prog{height:6px;background:#eee;border-radius:3px;overflow:hidden}.prog-fill{height:100%;border-radius:3px;transition:width .3s}.prog-fill.a{background:linear-gradient(90deg,#2980b9,#1a5276)}.prog-fill.q{background:linear-gradient(90deg,#27ae60,#145a32)}.passage{background:#fdf8f0;border:1.5px solid #d4ac62;border-radius:9px;padding:13px 16px;margin-bottom:16px;direction:rtl;text-align:right}.passage h4{font-size:.81em;font-weight:600;color:#7d6028;margin-bottom:7px;direction:ltr;text-align:left}.passage .pt{font-family:'Traditional Arabic','Amiri',serif;font-size:1.32em;line-height:2;color:#333}.passage .ptr{direction:ltr;text-align:left;font-family:'Segoe UI',sans-serif;font-size:.8em;color:#777;margin-top:7px;font-style:italic}.qbox{border:1.5px solid #e0e0e0;border-radius:11px;padding:17px 18px;margin-bottom:15px}.qnum{font-size:.78em;font-weight:600;color:#999;margin-bottom:5px}.qtext{font-size:1em;color:#222;margin-bottom:13px;line-height:1.6}.qtext .arq{font-family:'Traditional Arabic','Amiri',serif;font-size:1.38em;direction:rtl;display:block;text-align:right;margin:7px 0;color:#1a3a5c;line-height:2}.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}@media(max-width:480px){.opts{grid-template-columns:1fr}}.opt{padding:9px 13px;border:1.5px solid #ddd;border-radius:7px;cursor:pointer;font-size:.89em;text-align:center;transition:all .18s;background:#fafafa;color:#333;min-height:40px;display:flex;align-items:center;justify-content:center;font-family:'Traditional Arabic','Amiri',serif}.opt span.en{font-family:'Segoe UI',sans-serif;font-size:.8em}.opt:hover:not(.locked){border-color:#2980b9;background:#eaf4fb}.opt.ok{background:#d5f5e3;border-color:#27ae60;color:#145a32;font-weight:700}.opt.wrong{background:#fde8e8;border-color:#e74c3c;color:#c0392b;font-weight:700}.opt.showok{background:#d5f5e3;border-color:#27ae60;color:#145a32}.opt.locked{cursor:default}.explain{background:#f0f9ff;border-left:4px solid #2980b9;border-radius:0 8px 8px 0;padding:9px 13px;margin-top:11px;font-size:.86em;color:#1a3a5c;line-height:1.6;display:none}.explain.show{display:block}.explain.qe{background:#f0fff8;border-left-color:#27ae60;color:#0b4125}.nxt{text-align:right;margin-top:12px}.result{text-align:center;padding:28px 18px}.result .ric{font-size:3.3em;margin-bottom:10px}.result h2{font-size:1.45em;margin-bottom:7px}.result .score{font-size:2.6em;font-weight:800;margin:11px 0}.score.pass-a{color:#1a5276}.score.pass-q{color:#145a32}.score.fail{color:#e74c3c}.result p{color:#555;margin-bottom:14px;line-height:1.6}.rmsg{font-size:.93em;background:#f8f9fa;border-radius:9px;padding:13px;margin-bottom:16px;color:#444;line-height:1.6}.cert{background:linear-gradient(135deg,#fdf8e1,#fff9e6);border:2px solid #d4ac62;border-radius:13px;padding:18px;margin-bottom:16px}.cert h3{color:#7d6028;font-size:1.05em;margin-bottom:5px}.cert .clvl{font-size:1.25em;font-weight:800;color:#5d4037;margin:7px 0}.cert .cdesc{font-size:.83em;color:#8d6e63}.nf-wrap{max-width:380px;margin:0 auto 18px;text-align:center}.nf-wrap label{display:block;font-size:.9em;color:#555;margin-bottom:5px;font-weight:600}.nf-wrap input{width:100%;padding:10px 14px;border:1.5px solid #ccc;border-radius:8px;font-size:.93em;font-family:inherit}.nf-wrap input:focus{outline:none;border-color:#2980b9}.pt-bar{display:flex;gap:3px;flex-wrap:wrap;margin:10px 0}.pt-step{flex:1;min-width:52px;padding:5px 4px;text-align:center;border-radius:6px;font-size:.7em;font-weight:600;border:1.5px solid #ddd;background:#fff;color:#999}.pt-step.done{background:#2980b9;border-color:#2980b9;color:#fff}.pt-step.done.q{background:#27ae60;border-color:#27ae60}.pt-step.curr{border-color:#e67e22;color:#e67e22;background:#fef9e7}.pt-step.lk{background:#f8f9fa;color:#ccc;border-color:#eee}</style></head><body><div id="app"></div><script>var ARABIC_LEVELS=[{"id":"a1","cefr":"A1","name":"Beginner","nameAr":"المبتدئ","track":"arabic","passPct":70,"timeMin":20,"questions":[{"q":"What Arabic letter makes the \"B\" sound?","opts":["أ","ب","ت","ث"],"oa":true,"c":1,"exp":"ب (baa) = \"B\" sound, 2nd letter of Arabic alphabet."},{"q":"Which word means \"a book\"?","opts":["كِتَابٌ","بَيْتٌ","قَلَمٌ","بَابٌ"],"oa":true,"c":0,"exp":"كِتَابٌ (kitaab) = \"a book.\" Core vocab, ABY Book 1 Unit 1."},{"q":"Which means \"Peace be upon you\"?","opts":["شُكْرًا","السَّلَامُ عَلَيْكُمْ","مَعَ السَّلَامَةِ","صَبَاحُ الخَيْرِ"],"oa":true,"c":1,"exp":"السَّلَامُ عَلَيْكُمْ = the standard Islamic greeting."},{"q":"Which is the word for \"pen\"?","opts":["بَابٌ","كُرْسِيٌّ","قَلَمٌ","لَوْحٌ"],"oa":true,"c":2,"exp":"قَلَمٌ (qalam) = pen. Classroom vocabulary, ABY Book 1."},{"q":"What does the definite article ال do?","opts":["Makes plural","Makes definite (the)","Makes feminine","Makes verb"],"c":1,"exp":"ال (al-) = \"the.\" كِتَابٌ = \"a book\"; الكِتَابُ = \"the book.\""},{"q":"Which word means \"five\"?","opts":["ثَلَاثَةٌ","سَبْعَةٌ","خَمْسَةٌ","عَشَرَةٌ"],"oa":true,"c":2,"exp":"خَمْسَةٌ (khamsa) = five."},{"q":"What color is الأَحْمَرُ?","opts":["Blue","Green","Red","White"],"c":2,"exp":"الأَحْمَرُ (al-ahmar) = red. ABY Book 1, Unit 3 colors."},{"q":"Which means \"What is your name?\"","opts":["كَيْفَ حَالُكَ؟","مَا اسْمُكَ؟","مِنْ أَيْنَ أَنْتَ؟","كَمْ عُمْرُكَ؟"],"oa":true,"c":1,"exp":"مَا اسْمُكَ؟ (Maa ismuka?) = \"What is your name?\""},{"q":"How many letters in the Arabic alphabet?","opts":["22","26","28","30"],"c":2,"exp":"Arabic has 28 letters. Step 1 in all non-native Arabic curricula."},{"q":"Which is a correct nominal sentence (جملة اسمية)?","opts":["ذَهَبَ الوَلَدُ","هَذَا كِتَابٌ","يَقْرَأُ أَحْمَدُ","فِي البَيْتِ"],"oa":true,"c":1,"exp":"هَذَا كِتَابٌ = \"This is a book.\" No verb, subject + predicate. Core pattern, Madinah Arabic Lesson 1."}]},{"id":"a2","cefr":"A2","name":"Elementary","nameAr":"الأساسي","track":"arabic","passPct":70,"timeMin":25,"questions":[{"q":"Which verb form means \"she writes\"?","opts":["يَكْتُبُ","تَكْتُبُ","أَكْتُبُ","كَتَبَ"],"oa":true,"c":1,"exp":"تَكْتُبُ = 3rd person feminine singular present. يَكْتُبُ = he writes; أَكْتُبُ = I write."},{"q":"What is the plural of كِتَابٌ?","opts":["كِتَابَانِ","كُتُبٌ","كِتَابَاتٌ","مَكَاتِبُ"],"oa":true,"c":1,"exp":"كُتُبٌ = broken plural of كِتَابٌ (pattern: فُعُلٌ). Essential in ABY Book 1 and Madinah Arabic."},{"q":"Which word is feminine?","opts":["وَلَدٌ","كِتَابٌ","مَدْرَسَةٌ","بَابٌ"],"oa":true,"c":2,"exp":"مَدْرَسَةٌ = feminine (ends with ة = taa marbuta, feminine marker)."},{"q":"What does بَيْتُ المُعَلِّمِ mean?","opts":["The teacher is home","The teacher's house","A house and teacher","The big house"],"c":1,"exp":"Idhafa construction: first noun (مُضَاف) + second genitive (مُضَاف إليه) = possession."},{"q":"Which preposition means \"in/at\"?","opts":["مِنْ","إِلَى","فِي","عَلَى"],"oa":true,"c":2,"exp":"فِي = in/at. مِنْ = from, إِلَى = to, عَلَى = on."},{"q":"Correct sentence: \"The student goes to school\"","opts":["الطَّالِبُ ذَهَبَتْ إِلَى المَدْرَسَةِ","الطَّالِبُ يَذْهَبُ إِلَى المَدْرَسَةِ","الطَّالِبُ تَذْهَبُ إِلَى المَدْرَسَةِ","الطَّالِبَ يَذْهَبُ المَدْرَسَةَ"],"oa":true,"c":1,"exp":"يَذْهَبُ = masculine present; المَدْرَسَةِ = genitive after إِلَى."},{"q":"What does مُدَرِّسٌ mean?","opts":["Student","Principal","Teacher","Classmate"],"c":2,"exp":"مُدَرِّسٌ = teacher (Form II active participle, root د-ر-س)."},{"q":"How do you say \"my house\"?","opts":["بَيْتُهُ","بَيْتُكَ","بَيْتِي","بَيْتُنَا"],"oa":true,"c":2,"exp":"بَيْتِي (baytii) = my house. Suffix ي = my."},{"q":"Which question word means \"where\"?","opts":["مَتَى","كَيْفَ","أَيْنَ","لِمَاذَا"],"oa":true,"c":2,"exp":"أَيْنَ = where. مَتَى = when, كَيْفَ = how, لِمَاذَا = why."},{"q":"Nominative dual of قَلَمٌ (pen)?","opts":["أَقْلَامٌ","قَلَمَانِ","قَلَمَيْنِ","قَلَمَتَانِ"],"oa":true,"c":1,"exp":"قَلَمَانِ = two pens (nominative dual, suffix ـَانِ). Accusative/genitive = قَلَمَيْنِ."},{"passage":{"t":"أَنَا اسْمِي سَارَةُ. أَنَا طَالِبَةٌ. أَسْكُنُ فِي القَاهِرَةِ.","tr":"My name is Sarah. I am a student. I live in Cairo."},"q":"Where does Sarah live?","opts":["In school","In Riyadh","In Cairo","In a house"],"c":2,"exp":"أَسْكُنُ فِي القَاهِرَةِ = \"I live in Cairo.\""},{"q":"Which means \"There is a book on the table\"?","opts":["الكِتَابُ تَحْتَ الطَّاوِلَةِ","عَلَى الطَّاوِلَةِ كِتَابٌ","الكِتَابُ فِي الطَّاوِلَةِ","وَضَعْتُ الكِتَابَ"],"oa":true,"c":1,"exp":"Existential: preposition phrase + indefinite noun. كِتَابٌ = indefinite nominative."}]},{"id":"b1","cefr":"B1","name":"Intermediate","nameAr":"المتوسط","track":"arabic","passPct":70,"timeMin":35,"questions":[{"q":"Root of اِسْتَخْدَمَ (to use)?","opts":["خ-د-م","س-خ-د","د-م-س","خ-م-د"],"c":0,"exp":"Root: خ-د-م. Prefix اِسْتَ = Form X. Root means service."},{"q":"Verb form (وَزْن) of دَرَّسَ (to teach)?","opts":["Form I فَعَلَ","Form II فَعَّلَ","Form III فَاعَلَ","Form IV أَفْعَلَ"],"c":1,"exp":"Form II (فَعَّلَ): doubled middle radical (شدة). Root د-ر-س."},{"q":"Correct use of الَّذِي?","opts":["الكِتَابُ الَّذِي قَرَأَتْهُ مُفِيدٌ","الطَّالِبَةُ الَّذِي نَجَحَتْ","البُيُوتُ الَّذِي بُنِيَتْ","المَدْرَسَةُ الَّذِي زُرْتُهُ"],"oa":true,"c":0,"exp":"الَّذِي agrees with masculine كِتَابٌ. For feminine: الَّتِي; plural: الَّذِينَ."},{"q":"Future tense of يَذْهَبُ (he goes)?","opts":["ذَهَبَ","سَيَذْهَبُ","يَكُونُ يَذْهَبُ","كَانَ يَذْهَبُ"],"oa":true,"c":1,"exp":"سَ + present = future: سَيَذْهَبُ = \"he will go.\""},{"q":"Form III verb from root ك-ت-ب?","opts":["كَتَّبَ","كَاتَبَ","أَكْتَبَ","تَكَاتَبَ"],"oa":true,"c":1,"exp":"كَاتَبَ = Form III (فَاعَلَ) = to correspond with."},{"q":"What does سَافَرَ إِلَى مِصْرَ mean?","opts":["Returned from Egypt","Traveled to Egypt","Lives in Egypt","Came from Egypt"],"c":1,"exp":"سَافَرَ = traveled; إِلَى = to; مِصْرَ = Egypt (diptote, no tanwin)."},{"passage":{"t":"كَانَ أَحْمَدُ يَدْرُسُ اللُّغَةَ العَرَبِيَّةَ. بَعْدَ التَّخَرُّجِ، عَمِلَ مُدَرِّسًا فِي مَدْرَسَةٍ ثَانَوِيَّةٍ.","tr":"Ahmad studied Arabic. After graduation, he worked as a teacher in secondary school."},"q":"What did Ahmad do after graduation?","opts":["Continued studying","Traveled abroad","Worked as teacher","Wrote novels"],"c":2,"exp":"عَمِلَ مُدَرِّسًا = worked as a teacher."},{"q":"Correct negation of past ذَهَبَ?","opts":["لَا يَذْهَبُ","لَمْ يَذْهَبْ","مَا ذَهَبَ","لَمَّا ذَهَبَ"],"oa":true,"c":1,"exp":"لَمْ + jussive = past negation: لَمْ يَذْهَبْ = \"he did not go.\" Note jussive ending (sukun)."},{"q":"Correct subject-verb agreement?","opts":["الطُّلَّابُ يَدْرُسُونَ","الطُّلَّابُ يَدْرُسُ","الطُّلَّابُ تَدْرُسُونَ","الطُّلَّابُ يَدْرُسَانِ"],"oa":true,"c":0,"exp":"Masculine plural subject + يَدْرُسُونَ (masculine plural verb)."},{"q":"Active participle (اسم فاعل) from root د-ر-س?","opts":["دِرَاسَةٌ","مَدْرَسَةٌ","دَارِسٌ","مَدْرُوسٌ"],"oa":true,"c":2,"exp":"دَارِسٌ = Form I active participle (فَاعِلٌ) = \"one who studies.\""},{"q":"Meaning of اِزْدَادَ?","opts":["To decrease","To increase","To visit","To benefit"],"c":1,"exp":"اِزْدَادَ = to increase. Form VIII from root ز-ي-د."},{"q":"إعراب of الوَلَدَ in: رَأَيْتُ الوَلَدَ?","opts":["Nominative مَرْفُوعٌ","Accusative مَنْصُوبٌ","Genitive مَجْرُورٌ","Jussive مَجْزُومٌ"],"c":1,"exp":"الوَلَدَ = accusative (مَنْصُوبٌ) as direct object of رَأَيْتُ (fatHa ending)."},{"q":"Translation of \"I wish I had studied more\"?","opts":["أُرِيدُ أَنْ أَدْرُسَ أَكْثَرَ","كُنْتُ أَدْرُسُ كَثِيرًا","لَيْتَنِي دَرَسْتُ أَكْثَرَ","يَجِبُ أَنْ أَدْرُسَ أَكْثَرَ"],"oa":true,"c":2,"exp":"لَيْتَنِي = \"I wish that I.\" Past tense after لَيْتَ = regret about past."},{"q":"مَصْدَر of Form IV أَفْعَلَ from root ف-ه-م?","opts":["فَهْمٌ","فَهَّمَ","إِفْهَامٌ","تَفَاهُمٌ"],"oa":true,"c":2,"exp":"Form IV مَصْدَر pattern = إِفْعَالٌ. أَفْهَمَ → إِفْهَامٌ."},{"q":"Correct comparative: \"Ahmad is taller than Ali\"?","opts":["أَحْمَدُ طَوِيلٌ مِثْلَ عَلِيٍّ","أَحْمَدُ أَطْوَلُ مِنْ عَلِيٍّ","أَحْمَدُ طَوِيلٌ مِنْ عَلِيٍّ","أَحْمَدُ هُوَ الأَطْوَلُ"],"oa":true,"c":1,"exp":"أَفْعَلُ مِنْ = comparative pattern. أَطْوَلُ from طَوِيلٌ."}]},{"id":"b2","cefr":"B2","name":"Upper-Intermediate","nameAr":"فوق المتوسط","track":"arabic","passPct":70,"timeMin":45,"questions":[{"q":"Passive voice of كَتَبَ الطَّالِبُ الرِّسَالَةَ?","opts":["كَتَبَتِ الرِّسَالَةُ","كُتِبَتِ الرِّسَالَةُ","تُكْتَبُ الرِّسَالَةُ","كَتَبَ الرِّسَالَةَ"],"oa":true,"c":1,"exp":"Passive pattern: ضُمَّ الأَوَّلُ وَكُسِرَ مَا قَبْلَ الآخِرِ. الرِّسَالَةُ becomes subject (نائب فاعل) in nominative."},{"q":"Form V verb from root ع-ل-م?","opts":["أَعْلَمَ","تَعَلَّمَ","عَالَمَ","اِعْتَلَمَ"],"oa":true,"c":1,"exp":"تَعَلَّمَ = Form V (تَفَعَّلَ) = to learn (reflexive of Form II عَلَّمَ = to teach)."},{"q":"Role of مَكَانَهَا in: أُقِيمَتْ مَكَانَهَا نَاطِحَاتُ سَحَابٍ?","opts":["Subject","Adverb of place (ظرف مكان)","Direct object","Predicate"],"c":1,"exp":"مَكَانَهَا = ظَرْفُ مَكَانٍ (adverbial of place), accusative: \"in their place.\""},{"q":"Unreal/hypothetical conditional?","opts":["إِذَا دَرَسْتَ نَجَحْتَ","لَوْ دَرَسْتَ لَنَجَحْتَ","إِنْ تَدْرُسْ تَنْجَحْ","حِينَ دَرَسْتَ نَجَحْتَ"],"oa":true,"c":1,"exp":"لَوْ + past → لَـ + past = unreal condition: \"If you had studied, you would have passed.\""},{"q":"What is المَصْدَرُ الصِّنَاعِيُّ?","opts":["Verbal noun (Form I)","Abstract noun with ـِيَّةٌ suffix","Plural of nouns","Active participle"],"c":1,"exp":"Abstract noun formed by adding ـِيَّةٌ: إِنْسَانٌ→إِنْسَانِيَّةٌ (humanity); حُرٌّ→حُرِّيَّةٌ (freedom)."},{"q":"Identify Form VIII verb?","opts":["اِنْفَتَحَ","اِجْتَمَعَ","تَعَاوَنَ","اِسْتَخْدَمَ"],"oa":true,"c":1,"exp":"اِجْتَمَعَ = Form VIII (اِفْتَعَلَ) from ج-م-ع (to meet). VII=اِنفتح; VI=تَعَاوَنَ; X=اِستَخدَمَ."},{"q":"In أَعْجَبَنِي الكِتَابُ, grammatical subject?","opts":["أَعْجَبَ (verb)","نِي (me)","الكِتَابُ (book)","No subject"],"c":2,"exp":"الكِتَابُ = الفَاعِلُ (subject, nominative). \"The book pleased me.\""},{"q":"Which is a مَصْدَرٌ مِيمِيٌّ?","opts":["مَكْتَبٌ","كِتَابَةٌ","مَكْتُوبٌ","مَكْتَبَةٌ"],"oa":true,"c":0,"exp":"مَكْتَبٌ can be مَصْدَرٌ مِيمِيٌّ (act of writing) or noun of place (office)."},{"q":"Analyze: تَطَوُّرِ المُجْتَمَعَاتِ الإِنْسَانِيَّةِ","opts":["Noun + adjective","Two-word idhafa","Three-term idhafa chain","Verb + noun"],"c":2,"exp":"Three-term idhafa: تَطَوُّرِ (development of) + المُجْتَمَعَاتِ (societies) + الإِنْسَانِيَّةِ (adjective) = \"development of human societies.\""},{"q":"Meaning of Form VII: اِنْكَسَرَ?","opts":["To break something","To be broken (intransitive)","To fix","To shatter intentionally"],"c":1,"exp":"Form VII (اِنْفَعَلَ) = intransitive/reflexive. اِنْكَسَرَ = \"to be broken.\" Cannot take a direct object."},{"q":"What does لَيْسَ do grammatically?","opts":["Subject nominative + predicate accusative","Negates future","Is a preposition","Forms questions"],"c":0,"exp":"لَيْسَ = sister of كَانَ. Puts اسم لَيْسَ in nominative and خَبَر لَيْسَ in accusative."},{"q":"Correct use of الحَالُ (circumstantial acc.)?","opts":["جَاءَ أَحْمَدُ الطَّالِبُ","جَاءَ أَحْمَدُ مُسْرِعًا","جَاءَ أَحْمَدُ إِلَى البَيْتِ","جَاءَ أَحْمَدُ وَهُوَ"],"oa":true,"c":1,"exp":"مُسْرِعًا = حَالٌ: describes state of subject during action. \"Ahmad came hurrying.\" Must be indefinite + accusative."},{"q":"Meaning of إِنَّمَا?","opts":["Perhaps","Truly (emphasis)","Only/nothing but (restriction)","Even though"],"c":2,"exp":"إِنَّمَا = إِنَّ + مَا kaffa = restriction. إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ = \"Actions are judged ONLY by intentions.\""},{"q":"What is جَمْعُ التَّكْسِيرِ?","opts":["Plural by adding ون/ات","Plural by internal vowel change","Dual form","Diminutive"],"c":1,"exp":"Broken plural = internal rearrangement. كِتَابٌ→كُتُبٌ, بَيْتٌ→بُيُوتٌ. Unique Arabic feature."},{"q":"Correct case after preposition?","opts":["ذَهَبْتُ إِلَى المَدْرَسَةَ","ذَهَبْتُ إِلَى المَدْرَسَةِ","ذَهَبْتُ إِلَى المَدْرَسَةُ","ذَهَبْتُ إِلَى المَدْرَسَةً"],"oa":true,"c":1,"exp":"Prepositions govern genitive (مَجْرُورٌ, kasra). المَدْرَسَةِ = correct."},{"q":"What does عَلَى الرَّغْمِ مِنْ mean?","opts":["As a result of","Instead of","Despite/In spite of","According to"],"c":2,"exp":"\"Despite/in spite of.\" Common concessive phrase in MSA."},{"passage":{"t":"هُدِمَتْ كَثِيرٌ مِنَ المَبَانِي التُّرَاثِيَّةِ وَأُقِيمَتْ مَكَانَهَا نَاطِحَاتُ سَحَابٍ، مِمَّا أَثَارَ جَدَلًا وَاسِعًا بَيْنَ المُثَقَّفِينَ.","tr":"Many heritage buildings were demolished and modern skyscrapers erected, sparking widespread controversy among intellectuals."},"q":"What caused the controversy?","opts":["Preservation of buildings","Demolition of heritage + replacement with skyscrapers","Arrival of intellectuals","Construction of a university"],"c":1,"exp":"هُدِمَتْ (demolished) + replacement with نَاطِحَاتُ سَحَابٍ = caused controversy."},{"q":"التَّنَازُعُ in: يَأْكُلُ وَيَشْرَبُ أَحْمَدُ?","opts":["Two subjects/one verb","Two verbs compete for one noun","Subject agrees with two predicates","Verb disagrees with subject"],"c":1,"exp":"التَّنَازُعُ: يَأْكُلُ and يَشْرَبُ both compete to govern أَحْمَدُ. Advanced AUC 202 grammar."}]},{"id":"c1","cefr":"C1","name":"Advanced","nameAr":"المتقدم","track":"arabic","passPct":65,"timeMin":60,"questions":[{"passage":{"t":"لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا","tr":"Allah does not burden a soul beyond that it can bear. (Al-Baqarah 2:286)"},"q":"Role of نَفْسًا?","opts":["Subject (فاعل)","Direct object (مفعول به)","Adverb of time","Predicate"],"c":1,"exp":"نَفْسًا = مَفْعُولٌ بِهِ of يُكَلِّفُ, accusative (tanwin fath). وُسْعَهَا = second object."},{"q":"Rhetorical device in: وَالسَّمَاءُ رَفَعَهَا وَوَضَعَ الْمِيزَانَ (55:7)?","opts":["تشبيه (Simile)","طِبَاق (Antithesis)","كناية (Metonymy)","مجاز مرسل"],"c":1,"exp":"الطِّبَاقُ: رَفَعَهَا (raised) vs وَضَعَ (lowered/placed) = pair of opposites for emphasis."},{"q":"Difference between التَّشْبِيهُ and الاسْتِعَارَةُ?","opts":["Identical","تشبيه uses كَ/مِثْلَ; استعارة omits the comparison particle (metaphor)","استعارة only for verbs","تشبيه is modern"],"c":1,"exp":"التَّشْبِيهُ = explicit comparison with أداة (كَ، مِثْلَ، كَأَنَّ). الاسْتِعَارَةُ = comparison element omitted = implied metaphor."},{"q":"إِعْرَابُ الفِعْلِ in لَنْ يَذْهَبَ?","opts":["مرفوع","منصوب (subjunctive) after لَنْ","مجزوم","مبني على الفتح"],"c":1,"exp":"لَنْ + مضارع → منصوب (fatHa ending). لَنْ يَذْهَبَ = \"he will never go.\""},{"q":"What is الكِنَايَةُ in rhetoric?","opts":["Direct simile using كَأَنَّ","Literal expression that implies figurative meaning","Rhyming prose (سجع)","Repetition"],"c":1,"exp":"الكِنَايَةُ: you say the literal but mean the figurative. E.g., \"He has a long hand\" = generosity (كناية)."},{"passage":{"t":"عَلَى قَدْرِ أَهْلِ العَزْمِ تَأْتِي العَزَائِمُ *** وَتَأْتِي عَلَى قَدْرِ الكِرَامِ المَكَارِمُ","tr":"To the measure of determined people come great endeavors, and to the measure of the noble come noble deeds. (Al-Mutanabbi)"},"q":"Which rhetorical device is prominent?","opts":["Extended simile","Antithesis","رَدُّ العَجُزِ عَلَى الصَّدْرِ","Quotation"],"c":2,"exp":"رَدُّ العَجُزِ عَلَى الصَّدْرِ: end words echo beginning roots (العَزْمِ/العَزَائِمُ, الكِرَامِ/المَكَارِمُ). ABY Book 3."},{"q":"إعراب of خَيْرًا in: مَا رَأَيْتُ مِنْكَ خَيْرًا?","opts":["خبر ما","مفعول به","تمييز","حال"],"c":1,"exp":"خَيْرًا = مَفْعُولٌ بِهِ of رَأَيْتُ, accusative (tanwin fatH)."},{"q":"Perfect طِبَاق (antithesis) pair?","opts":["الليلُ والظلامُ","الليلُ والنهارُ","الليلُ والقمرُ","الليلُ والسكونُ"],"c":1,"exp":"الليلُ والنهارُ = night/day = complete opposites. Synonyms are not طباق."},{"q":"What is السَّجْعُ?","opts":["Rhyming prose (matched endings)","Poetic meter","Simile","Repetition"],"c":0,"exp":"السَّجْعُ = rhymed prose (sentences ending similarly without meter). Used in Quran and classical Arabic prose."},{"q":"مَفْعُولٌ لِأَجْلِهِ in: جِئْتُ إِكْرَامًا لَكَ?","opts":["جِئْتُ","إِكْرَامًا","لَكَ","Whole sentence"],"c":1,"exp":"إِكْرَامًا = accusative of purpose (answers why?). Verbal noun expressing motive."},{"q":"Function of أَمَّا in: أَمَّا أَحْمَدُ فَنَاجِحٌ?","opts":["Conditional topic-marker (شَرْطٌ تَفْصِيلِيٌّ)","Negative particle","Discourse connector","Conjunction"],"c":0,"exp":"أَمَّا = topicalizing particle introducing topic. Followed by فَاءُ الرَّابِطَةُ."},{"q":"Rhetorical effect of مَا...إِلَّا in: وَمَا النَّصْرُ إِلَّا مِنْ عِندِ اللَّهِ (3:126)?","opts":["Creates question","Restriction/exclusivity (قَصْرٌ)","Comparison","Condition"],"c":1,"exp":"أُسْلُوبُ القَصْرِ: مَا...إِلَّا restricts attribute to one entity only. \"Victory is ONLY from Allah.\""},{"q":"مَصْدَر of اِسْتَفَادَ?","opts":["فَائِدَةٌ","إِفَادَةٌ","اِسْتِفَادَةٌ","فَيْدٌ"],"oa":true,"c":2,"exp":"Form X مَصْدَر pattern = اِسْتِفْعَالٌ → اِسْتِفَادَةٌ."},{"q":"Omission of main clause in لَوْ رَأَيْتَ مَا حَدَثَ is called?","opts":["الإِيجَازُ بِالحَذْفِ","التَّضْمِينُ","الاعْتِرَاضُ","الالْتِفَاتُ"],"c":0,"exp":"الإِيجَازُ بِالحَذْفِ: answer clause omitted for rhetorical effect (emotional impact)."},{"q":"What is الاسْتِعَارَةُ المَكْنِيَّةُ?","opts":["Simile with stated element","Metaphor: المشبه به omitted, its attribute mentioned","Metonymy","Rhymed prose"],"c":1,"exp":"الاسْتِعَارَةُ المَكْنِيَّةُ: predator (المشبه به) omitted, but \"claws\" remains. E.g., \"Death came with its claws.\""},{"q":"Full إعراب of المُعَلِّمُ in: المُعَلِّمُ مُجْتَهِدٌ?","opts":["مبتدأ مرفوع بالضمة الظاهرة","فاعل مرفوع","مفعول به منصوب","خبر مرفوع"],"c":0,"exp":"المُعَلِّمُ: مُبْتَدَأٌ مَرْفُوعٌ بِالضَّمَّةِ الظَّاهِرَةِ. مُجْتَهِدٌ = خَبَر."},{"q":"Example of التَّوْرِيَةُ (double entendre)?","opts":["رَأَيْتُ أَسَدًا يُقَاتِلُ (=brave man)","قَلْبِي مُرِيضٌ (ill OR love-sick)","السَّمَاءُ تَبْكِي (personification)","الشَّمْسُ مِثْلَ الذَّهَبِ"],"c":1,"exp":"التَّوْرِيَةُ: near (literal ill heart) and far (love-sick) meanings. Poet intends the far meaning."},{"q":"عَلَى صَعِيدٍ آخَرَ in MSA journalism means?","opts":["On another battlefield","In another country","On another front/topic (transitional)","Meanwhile"],"c":2,"exp":"\"On another front\" — standard MSA transitional phrase to change topics."},{"q":"Label for: ابْنُ خَلْدُونَ مُؤَرِّخٌ عَظِيمٌ?","opts":["فعلية جملة","جملة اسمية + نعت","جملة فعلية مجهولة","جملة شرطية"],"c":1,"exp":"جُمْلَةٌ اسْمِيَّةٌ: مبتدأ + خبر + نعت."},{"q":"What is الفِعْلُ الناقص (الفعل المعتل الآخر)?","opts":["Verb with weak final radical (و/ي)","Verb with hamza at start","Passive verb","Verb with doubled middle radical"],"c":0,"exp":"الفعل الناقص: final radical = و or ي (e.g., دَعَا، رَمَى، نَسِيَ). Special conjugation rules."}]},{"id":"c2","cefr":"C2","name":"Mastery","nameAr":"الإتقان","track":"arabic","passPct":65,"timeMin":75,"questions":[{"passage":{"t":"قِفَا نَبْكِ مِنْ ذِكْرَى حَبِيبٍ وَمَنْزِلِ","tr":"Stop (you two), let us weep at the memory of a beloved and her dwelling. (Imru al-Qays — Muallaqah)"},"q":"Form of قِفَا?","opts":["Singular imperative","Dual imperative (أمر للمثنى)","Plural imperative","Past tense"],"c":1,"exp":"قِفَا = dual imperative of وَقَفَ. ا = dual sign. Poet addresses two companions (classical wuquf ala al-atlal)."},{"q":"What is البَدَلُ الاشْتِمَالِيُّ?","opts":["Appositive where second is part of first","Appositive where second is inherent in/associated with first","Comprehensive appositive","Corrective appositive"],"c":1,"exp":"بَدَلُ الاشْتِمَالِ: second noun = something associated with first. أَعْجَبَنِي زَيْدٌ عِلْمُهُ — عِلْمُهُ is not a physical part but inherent quality."},{"q":"What is البَحْرُ الطَّوِيلُ in Arabic prosody?","opts":["Shortest meter","Most common","فَعُولُنْ مَفَاعِيلُنْ فَعُولُنْ مَفَاعِلُنْ — meter of the Muallaqat","Free verse"],"c":2,"exp":"البَحْرُ الطَّوِيلُ = most prestigious Arabic poetic meter. Meter of the Seven Muallaqat. \"King\" of Arabic meters."},{"q":"Function of واوُ المَعِيَّةِ?","opts":["Coordinating conjunction","Simultaneity: following verb = منصوب (subjunctive)","Oath particle","Resumptive"],"c":1,"exp":"وَاوُ المَعِيَّةِ: \"while/along with\" → following مضارع is منصوب. E.g., لَا تَأْكُلِ السَّمَكَ وَتَشْرَبَ اللَّبَنَ."},{"q":"Analyze: مَا زَالَ الطَّالِبُ يَدْرُسُ","opts":["Nominal with كان","مَا زَالَ (sister of كان) expressing continuity","Negated verb","Conditional"],"c":1,"exp":"مَا زَالَ = sister of كَانَ = continuity/persistence. \"The student is still studying.\""},{"q":"What is الاحْتِبَاكُ?","opts":["A pun","Complementary omissions in two parallel clauses (each present in the other)","Anaphora","Exaggeration"],"c":1,"exp":"الاحْتِبَاكُ: two parallel clauses where each omits what the other states. A sophisticated ellipsis device."},{"passage":{"t":"إِنَّا أَنزَلْنَاهُ قُرْآنًا عَرَبِيًّا لَّعَلَّكُمْ تَعْقِلُونَ","tr":"Indeed We have sent it down as an Arabic Quran so that you might understand. (Yusuf 12:2)"},"q":"Full إِعْرَاب of قُرْآنًا?","opts":["مفعول به منصوب","حال منصوبة بالفتحة","تمييز","خبر إنَّ"],"c":1,"exp":"قُرْآنًا = حَالٌ (circumstantial acc.) منصوب بالفتحة: describes state of object (هاء in أَنزَلْنَاهُ). Answers \"how was it sent?\""},{"q":"التَّوْكِيدُ اللَّفْظِيُّ vs المَعْنَوِيُّ?","opts":["Verbal (exact repetition) vs semantic (نَفْسُ/كُلُّ/عَيْنُ)","Identical","Verbal for verbs only","One classical/one modern"],"c":0,"exp":"لَفْظِيٌّ = exact repetition. مَعْنَوِيٌّ = نَفْسُ، عَيْنُ (same/very), كُلُّ، جَمِيعُ (all)."},{"q":"إِعْرَابُ لَا in: لَا رَجُلَ فِي البَيْتِ?","opts":["No grammatical effect","لا النافية للجنس: puts noun in accusative","Conditional","Prohibitive"],"c":1,"exp":"لَا النَّافِيَةُ لِلْجِنْسِ: negates entire category. Sister of إِنَّ. اسمها in accusative (مبني على الفتح)."},{"q":"What is الاشْتِغَالُ?","opts":["Verb takes two objects","Noun precedes verb connected to a pronoun referring to that noun","Subject omitted","Two verbs/one subject"],"c":1,"exp":"الاشْتِغَالُ: زَيْدًا ضَرَبْتُهُ — verb ضَرَبْتُهُ is \"occupied\" with pronoun هُ (referring to زَيْدًا)."},{"q":"الفَصْلُ وَالوَصْلُ in rhetoric?","opts":["Figurative vs literal","Rules for using وَ vs no conjunction (asyndeton)","Short vs long sentences","Active vs passive"],"c":1,"exp":"عِلْمُ المَعَانِي topic: وَصْلُ = join with وَ; فَصْلُ = omit وَ. Based on relation between clauses. Hallmark of Quranic style."},{"q":"أَنَّكَ صَادِقٌ in: عَلِمْتُ أَنَّكَ صَادِقٌ is what?","opts":["جملة حالية","أن المصدرية + مصدر مؤول = مفعول به","جملة معترضة","استئناف"],"c":1,"exp":"المُؤَوَّلُ بِالمَصْدَرِ: أَنَّ + clause = implied مَصْدَر in محل نصب مفعول به. Advanced AUC 302 syntax."},{"q":"Difference: الإِيجَازُ vs الإِطْنَابُ?","opts":["Both mean conciseness","الإيجاز = few words/rich meaning; الإطناب = elaboration for emphasis","Reversed meanings","Unrelated concepts"],"c":1,"exp":"الإِيجَازُ = much in few words. الإِطْنَابُ = more words for emphasis/clarity. Both praiseworthy when used appropriately."},{"q":"مَفْعُولُ المُطْلَقُ in: ضَرَبْتُهُ ضَرْبًا شَدِيدًا?","opts":["هُ (him)","ضَرْبًا (cognate accusative)","شَدِيدًا","ضَرَبْتُهُ"],"c":1,"exp":"ضَرْبًا = مَفْعُولٌ مُطْلَقٌ: verbal noun from same root, confirms the verb. شَدِيدًا = its adjective (نَعْت)."},{"q":"Type of واو in: جَاءَ زَيْدٌ وَطَلَعَتِ الشَّمْسُ?","opts":["واو العطف (coordinating)","واو المعية","واو الحال","واو القسم"],"c":0,"exp":"واوُ العَطْفِ: joins two independent equal clauses. No simultaneity or oath implied."},{"q":"الخَلِيلُ بْنُ أَحْمَدَ الفَرَاهِيدِيُّ is known for?","opts":["Inventing Arabic grammar","Codifying Arabic prosody (عَرُوض) + first Arabic dictionary (العَيْن)","Writing first Arabic novel","Establishing Basran school"],"c":1,"exp":"الخَلِيلُ (d.~786 CE) = codified عِلْمُ العَرُوضِ and authored كِتَابُ العَيْنِ (first Arabic dictionary). Teacher of سِيبَوَيْهِ."},{"q":"What is التَّعَلُّقُ in syntax?","opts":["Verb conjugation","Dependency of prepositions/adverbs on verbs or verb-like particles","Breaking plural","Dual"],"c":1,"exp":"التَّعَلُّقُ: شِبْهُ الجُمْلَةِ must be \"attached\" to a verb or its equivalent. Cannot stand alone."},{"q":"What is الإِعْجَازُ القُرْآنِيُّ?","opts":["Legal rulings","Miraculous literary inimitability (التَّحَدِّي) — language surpassing human ability","Historical accuracy","Mathematical patterns"],"c":1,"exp":"Doctrine that Quran's Arabic is inimitable. Analyzed through بلاغة، نظم، إيجاز. Foundation of classical Arabic rhetoric study."},{"q":"What is العَامِلُ النَّحْوِيُّ?","opts":["Case endings (إعراب)","The governor — word/particle determining إعراب of other words","Morphology (صرف)","Indeclinability (بناء)"],"c":1,"exp":"Theory of العَوَامِلُ = backbone of traditional Arabic grammar (النَّحْوُ العَرَبِيُّ)."},{"q":"Analyze: يَتَسَاءَلُونَ أَيَّانَ يَوْمُ الْقِيَامَةِ (75:6)","opts":["Direct statement","Interrogative for disbelief/mockery (استفهام إنكاري)","Request for information","Affirms faith"],"c":1,"exp":"الاسْتِفْهَامُ الإِنْكَارِيُّ: question expressing denial/mockery. أَيَّانَ = emphatic \"when\" in classical Arabic."}]}];
var QURAN_LEVELS=[{"id":"q1","cefr":"Q1","name":"Quran Beginner","nameAr":"تلاوة مبتدئ","track":"quran","passPct":70,"timeMin":20,"questions":[{"q":"How many Surahs (chapters) are in the Quran?","opts":["99","114","120","144"],"c":1,"exp":"The Quran has exactly 114 Surahs. The longest is Al-Baqarah (286 verses); the shortest are Surahs Al-Kawthar and Al-Nasr (3 verses each)."},{"q":"What is the first Surah of the Quran?","opts":["Al-Baqarah","Al-Fatiha","Al-Ikhlas","Al-Nas"],"c":1,"exp":"سُورَةُ الفَاتِحَةِ (Al-Fatiha = \"The Opening\") is the 1st Surah. It is recited in every unit (rak'a) of prayer."},{"q":"How many verses (ayat) does Surah Al-Fatiha have?","opts":["5","6","7","8"],"c":2,"exp":"Al-Fatiha has 7 verses. The 7 oft-repeated verses (السَّبْعُ المَثَانِي) mentioned in Quran 15:87 refer to Al-Fatiha."},{"q":"What does تَجْوِيدٌ (Tajweed) mean?","opts":["Memorization","Beautification/improving — the science of correct Quran recitation","Translation","Interpretation"],"c":1,"exp":"تَجْوِيدٌ (root: ج-و-د) = to improve, to do well. As a science: the set of rules governing correct pronunciation of the Quran."},{"q":"What is the Basmala?","opts":["أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ","بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ","الحَمْدُ لِلَّهِ رَبِّ العَالَمِينَ","سُبْحَانَ اللَّهِ"],"oa":true,"c":1,"exp":"The Basmala: بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ = \"In the name of Allah, the Most Gracious, the Most Merciful.\" It begins 113 of 114 Surahs."},{"q":"What is the isti'atha (الاستعاذة)?","opts":["أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ","بِسْمِ اللَّهِ","اَللَّهُ أَكْبَرُ","سُبْحَانَ اللَّهِ"],"oa":true,"c":0,"exp":"أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ = \"I seek refuge in Allah from the accursed Satan.\" Recited before beginning Quran recitation (Quran 16:98)."},{"q":"What letter has the Sukun (سُكُون) sign?","opts":["A letter with a vowel","A letter with no vowel (rest/static)","A letter that is doubled","A letter that is silent"],"c":1,"exp":"السُّكُونُ (ـْ) indicates absence of a vowel — the letter is \"static/resting.\" It is essential in Tajweed to identify non-voweled letters."},{"q":"What is the ShaddA (الشَّدَّة)?","opts":["A mark indicating silence","A mark indicating the letter is doubled (gemination)","A small alif for prolongation","The hamza mark"],"c":1,"exp":"الشَّدَّةُ (ـّ) = gemination mark. It doubles the consonant, equivalent to writing it twice (one with sukun + one with vowel). E.g., رَبِّ = rabb-i."},{"q":"How many letters in the Arabic alphabet have 4 forms (initial, medial, final, isolated)?","opts":["All 28","Only 6 letters (الحروف المنفصلة) have 2 forms; rest have 4","22","10"],"c":1,"exp":"6 letters (و، ز، ر، ذ، د، أ) connect only to the right — they have 2 forms. The remaining 22 letters connect on both sides and have 4 forms."},{"q":"What does مَخْرَجُ الحَرْفِ mean in Tajweed?","opts":["The meaning of the letter","The sound exit point (articulation point) of the letter","The vowel of the letter","The written form"],"c":1,"exp":"مَخْرَجُ الحَرْفِ = the articulation point where the sound is produced (throat, tongue, lips, nose). Identifying مَخَارِجُ الحُرُوفِ is the foundation of Tajweed."}]},{"id":"q2","cefr":"Q2","name":"Quran Intermediate","nameAr":"تلاوة متوسط","track":"quran","passPct":70,"timeMin":30,"questions":[{"q":"What is الإِظْهَارُ (Izhar) in Tajweed?","opts":["Nasal sound of 2 counts","Clear pronunciation of Noon/Tanwin (no nasalization)","Merging of two letters","Doubling a letter"],"c":1,"exp":"الإِظْهَارُ الحَلْقِيُّ: when Noon Sakin (نْ) or Tanwin (ً ٍ ٌ) is followed by a throat letter (أ ه ع ح غ خ), the Noon is pronounced clearly without nasalization."},{"q":"What is الإِدْغَامُ (Idgham)?","opts":["Clear pronunciation","Merging/assimilation of Noon Sakin into following letter","Hiding the Noon","Doubling without merging"],"c":1,"exp":"الإِدْغَامُ: when Noon Sakin/Tanwin is followed by certain letters (ي ن م و ل ر), the Noon merges into the following letter. With letters (ي ن م و) = with ghunna; with (ل ر) = without ghunna."},{"q":"What is الإِخْفَاءُ (Ikhfa)?","opts":["Full nasalization","Hiding the Noon — pronounced between Izhar and Idgham (with nasalization)","Stopping of sound","Lengthening"],"c":1,"exp":"الإِخْفَاءُ: when Noon Sakin/Tanwin is followed by 15 remaining letters, the Noon is hidden (between clear and merged) with a light ghunna of 2 counts."},{"q":"What is الإِقْلَابُ (Iqlab)?","opts":["Prolonging a vowel","Converting Noon Sakin into Meem when followed by باء","Doubling","Stopping"],"c":1,"exp":"الإِقْلَابُ: when Noon Sakin/Tanwin is followed by بَاء (ب), the Noon converts to a Meem sound: نُنبِئُكُمْ is pronounced nuMbi'ukum. Symbol: a small م above the Noon."},{"q":"What is الغُنَّةُ (Ghunna)?","opts":["A guttural sound","Nasalization — the nasal sound produced through the nose, associated with ن and م","A vowel sound","The hamza sound"],"c":1,"exp":"الغُنَّةُ = nasal resonance produced through the nasal passage. It is an essential characteristic of ن and م. Measured in counts (harakaat)."},{"q":"Identify the Tajweed rule in this verse: مِن دُونِ اللَّهِ","opts":["Izhar","Idgham","Ikhfa","Iqlab"],"c":2,"exp":"مِن (Noon Sakin) + دُونِ — دَال is one of the 15 Ikhfa letters → الإِخْفَاءُ. The Noon is hidden with nasalization of 2 counts."},{"q":"What is the مَدُّ الطَّبِيعِيُّ (Natural Madd)?","opts":["Prolongation of 6 counts","Prolongation of 4-5 counts","Basic/natural prolongation of 2 counts (1 alif unit) — no additional cause","Prolongation due to hamza"],"c":2,"exp":"المَدُّ الطَّبِيعِيُّ (Natural/Original Madd): prolonging the long vowels (الف، واو، ياء مدية) 2 counts. It is the base case — no hamza or sukun follows."},{"q":"What is الوَقْفُ (stopping) at end of a verse?","opts":["Reading without pause","Stopping breathing and voice completely, with sukun on final letter","Continuing to next verse without pause","Repeating the verse"],"c":1,"exp":"الوَقْفُ: stopping voice and breath at a place in recitation. At the end of a verse: apply sukun on the last letter. There are rules for acceptable stopping places (التام، الكافي، الحسن، القبيح)."},{"q":"Which Surah is known as \"the heart of the Quran\"?","opts":["Al-Fatiha","Ya-Sin","Al-Baqarah","Al-Kahf"],"c":1,"exp":"سُورَةُ يس (Ya-Sin) — the Prophet (ﷺ) said: \"Everything has a heart, and the heart of the Quran is Ya-Sin.\" It covers core theological themes: resurrection, prophethood, divine power."},{"q":"What is تَفْخِيمُ الرَّاءِ (heavy Ra)?","opts":["Always thin","Ra is pronounced heavy/full when it has a fatha or damma, or has sukun preceded by fath/damm","Ra is always silent","Ra merges with next letter"],"c":1,"exp":"الرَّاءُ المُفَخَّمَةُ: Ra is heavy (full mouth) when it has fatha/damma (رَ، رُ), or is sukun preceded by fatha/damma. E.g., رَبُّنَا, رُزِقُوا."},{"q":"What does قَلْقَلَةٌ mean?","opts":["A type of Madd","A vibration/echo in letters ق ط ب ج د when they have sukun","A type of stop","Nasalization"],"c":1,"exp":"القَلْقَلَةُ: a slight echo/vibration produced when reciting the 5 Qalqala letters (قُطُبُ جَدٍّ — ق ط ب ج د) when they have sukun. Makes them \"bounce\" slightly."},{"q":"In Tajweed, what is the Madd Al-Muttasil (المد المتصل)?","opts":["Natural madd","Madd where long vowel and hamza are in same word","Madd where they are in separate words","Madd due to sukun"],"c":1,"exp":"المَدُّ المُتَّصِلُ (Connected Madd): long vowel + hamza in the SAME word. Must be prolonged 4-5 counts. E.g., جَاءَ، سُوءٍ، شِئْتُمْ."}]},{"id":"q3","cefr":"Q3","name":"Quran Advanced","nameAr":"تلاوة متقدم","track":"quran","passPct":65,"timeMin":45,"questions":[{"passage":{"t":"اقْرَأْ بِاسْمِ رَبِّكَ الَّذِي خَلَقَ ﴿١﴾ خَلَقَ الْإِنسَانَ مِنْ عَلَقٍ ﴿٢﴾","tr":"Read in the name of your Lord who created (1) Created man from a clinging substance (2) — Surah Al-Alaq 96:1-2"},"q":"What Tajweed rule applies at: بِاسْمِ رَبِّكَ?","opts":["Idgham — م merges into ر","Ikhfa — م hidden before ر","The م in بِاسْمِ has no rule with ر","Iqlab — م converts to ن"],"c":1,"exp":"الإِخْفَاءُ الشَّفَوِيُّ: Meem Sakin (مْ) before بَاء → hidden with nasalization. Here: بِاسْمِ is not a Meem Sakin case — but بِاسْمِ رَبِّكَ: the Meem Sakin of اسمِ before ر — this Meem Sakin rule does not apply (it follows regular Idgham Shafawi only before م and Ikhfa Shafawi only before ب). The م here has a kasra, not sukun."},{"q":"What are the 3 types of Lam in لفظ الجلالة (the word اللَّه)?","opts":["Always thin","Always heavy","Heavy when preceded by fatha or damma; thin when preceded by kasra","Always follows previous vowel"],"c":2,"exp":"لَفْظُ الجَلَالَةِ: ل is مُفَخَّمٌ (heavy) when preceded by fatha (قَالَ اللَّهُ) or damma (رَسُولُ اللَّهِ); it is مُرَقَّقٌ (thin) when preceded by kasra (بِسْمِ اللَّهِ). Unique rule in Tajweed."},{"q":"What is المَدُّ الَّلازِمُ (Necessary Madd)?","opts":["Madd of 2 counts","Madd of 4-5 counts","Compulsory Madd of exactly 6 counts — occurs when long vowel is followed by a shaddah or permanent sukun in same word","Natural madd"],"c":2,"exp":"المَدُّ اللَّازِمُ: when a long vowel is followed by a permanent sukun or shaddah. Must be prolonged EXACTLY 6 counts (3 alif-units). E.g., الضَّالِّينَ (in Al-Fatiha), دَابَّةٍ, حَاقَّةُ."},{"q":"What is الترقيق (Tarqiq / thinning) of الراء?","opts":["Always used","Ra is pronounced thin when it has kasra, or has sukun preceded by kasra (and no barrier)","Ra is always heavy","Ra is always thin after ي"],"c":1,"exp":"الرَّاءُ المُرَقَّقَةُ (thin Ra): when Ra has a kasra (رِ), or has sukun preceded by a kasra with no barrier. E.g., رِزْقٌ, الحِجْرِ."},{"q":"In which case does the مَدُّ المُنْفَصِلُ (Separated Madd) occur?","opts":["Long vowel + hamza in same word","Long vowel at end of word + hamza begins next word","Long vowel + sukun","Natural prolongation"],"c":1,"exp":"المَدُّ المُنْفَصِلُ: long vowel at end of one word + hamza at beginning of next word. Prolonged 4-5 counts in Hafs recitation. E.g., يَا أَيُّهَا، بِمَا أُنزِلَ."},{"q":"What is الإِدْغَامُ الشَّفَوِيُّ (Labial Idgham)?","opts":["Noon merging into ل","Meem Sakin merging into following Meem (full nasalization)","Meem Sakin merging into ب","Ra becoming heavy"],"c":1,"exp":"الإِدْغَامُ الشَّفَوِيُّ: when Meem Sakin (مْ) is followed by Meem (م), the first Meem merges completely into the second with a ghunna of 2 counts. E.g., كَمْ مِّن."},{"q":"What are الحُرُوفُ المُسْتَعْلِيَةُ (Letters of Elevation/Heaviness)?","opts":["The throat letters","خص ضغط قظ — 7 letters always heavy","م and ن only","The Qalqala letters"],"c":1,"exp":"الحُرُوفُ المُسْتَعْلِيَةُ (7 letters): خ ص ض غ ط ق ظ — memory aid: خُصَّ ضَغْطٍ قِظْ. These letters are always pronounced heavy (full mouth). Other letters are generally thin (مُرَقَّقَةٌ)."},{"q":"What is the حكم of مَدُّ العِوَضِ?","opts":["Madd when stopping on tanwin fath (ـً)","Natural madd at end of verse","Madd before hamza","Madd in the Fawatih"],"c":0,"exp":"مَدُّ العِوَضِ: when stopping (وقف) on a word ending with tanwin fath (ـً), the tanwin is replaced by an alif and prolonged 2 counts. E.g., stopping on رَحِيمًا → رَحِيمَا."},{"q":"What is the Warsh recitation (رواية ورش)?","opts":["The only accepted recitation","One of the 10 mutawatir recitations — popular in North/West Africa, differs from Hafs in certain prolongations and vowels","The modern Egyptian recitation","A rejected variant"],"c":1,"exp":"رِوَايَةُ وَرْشٍ عَنْ نَافِعٍ: one of the 10 mutawatir (unbroken chain) Quranic recitations. Dominant in Morocco, Algeria, Libya, West Africa. Notable differences from Hafs: مَدُّ البَدَلِ (4-5 counts), imala, tahqiq al-hamza."},{"q":"What is the meaning of التَّحْقِيقُ in recitation?","opts":["Fast recitation","Slow, deliberate recitation giving full right to each letter and rule","Medium speed recitation","Melodic recitation"],"c":1,"exp":"التَّحْقِيقُ: the slowest, most precise style of recitation. Each letter is given full articulation, each rule applied carefully. Recommended for learning and teaching Tajweed."},{"q":"In Surah Al-Alaq (96:1), the word خَلَقَ — identify its root and form.","opts":["Root: خ-ل-ق; Form I past tense verb","Root: ل-ق-خ; noun","Root: خ-ل-ق; adjective","Root: ق-خ-ل; Form IV"],"c":0,"exp":"خَلَقَ: root = خ-ل-ق (to create). Form I past tense verb, 3rd person masculine singular = \"He created.\" First revealed Quranic word after اقْرَأْ."},{"q":"What is the مَدُّ الفَرْقِ (Distinguishing Madd)?","opts":["Natural madd","Madd to distinguish between hamza al-istifham and al-ta'rif (لام الجلالة ا+لـ)","Madd at end of verse","Madd before sukun"],"c":1,"exp":"مَدُّ الفَرْقِ: prolonging 6 counts to distinguish between ا (hamzat al-istifham = interrogative) and لـ (definite article). E.g., آللَّهُ (did Allah?) vs اللَّهُ (Allah). Prevents confusion."}]},{"id":"q4","cefr":"Q4","name":"Quran Scholar","nameAr":"حافظ / قارئ","track":"quran","passPct":65,"timeMin":60,"questions":[{"passage":{"t":"إِنَّا نَحْنُ نَزَّلْنَا الذِّكْرَ وَإِنَّا لَهُ لَحَافِظُونَ","tr":"Indeed, it is We who sent down the Quran and indeed, We will be its guardian. (Al-Hijr 15:9)"},"q":"Identify all Tajweed rules in: إِنَّا نَحْنُ نَزَّلْنَا","opts":["Only shaddah on إِنَّا","Shaddah on إِنَّا + Idgham of نَ into ن (إدغام بغنة) + shaddah on نَزَّلْ","Only Madd on نَزَّلْ","Ikhfa on نَ"],"c":1,"exp":"إِنَّا: Shaddah on ن = ghunna 2 counts. نَحْنُ نَزَّلْنَا: Noon Sakin (نْ in نَحْنُ) + نَزَّلْنَا → Idgham with ghunna (Noon merges into Noon). نَزَّلْنَا: shaddah on ز = doubled."},{"q":"What is the صِفَاتُ الحُرُوفِ (attributes of letters)?","opts":["The written forms of letters","Qualities inherent to letters beyond their articulation point — e.g., Jahr/Hams, Shidda/Rakhawa","The vowel system","The harakat"],"c":1,"exp":"الصِّفَاتُ: inherent qualities of each letter beyond its مَخْرَج. E.g., الجَهْرُ (voiced) vs الهَمْسُ (whispered), الشِّدَّةُ (strong/complete closure) vs الرَّخَاوَةُ (gentle/open). Essential for advanced Tajweed."},{"q":"What is the اللَّحْنُ الجَلِيُّ (Obvious Error) in recitation?","opts":["Slight mispronunciation","Major recitation error that changes meaning — e.g., changing vowels on words (إعراب errors)","Wrong stopping place","Forgetting a verse"],"c":1,"exp":"اللَّحْنُ الجَلِيُّ: clear, obvious error that changes meaning or distorts words. E.g., reading أَنْعَمْتَ with a kasra on ت (=أَنْعَمْتِ) would change meaning. It is HARAM to commit this error."},{"q":"What is the رِوَايَةُ حَفْصٍ عَنْ عَاصِمٍ?","opts":["A rejected chain","The most widely used Quranic recitation globally — transmitted through Hafs from Asim of Kufa","An African recitation","A Persian recitation variant"],"c":1,"exp":"رِوَايَةُ حَفْصٍ عَنْ عَاصِمٍ: dominant recitation in most of the Muslim world (Middle East, South Asia, Turkey). Hafs (d. 796 CE) transmitted from his teacher Asim of Kufa (d. 745 CE), who transmitted through an unbroken chain to the Prophet ﷺ."},{"q":"In the science of Quran recitation, what are the القِرَاءَاتُ العَشْرُ?","opts":["10 rejected recitations","10 mutawatir recitations — all authentically transmitted from the Prophet ﷺ through unbroken chains","10 different translations","10 scholars who edited the Quran"],"c":1,"exp":"القِرَاءَاتُ العَشْرُ: the 10 canonical Quranic recitations — all متواتر (mass-transmitted). They were codified by Ibn al-Jazari (d. 1429 CE). Each has two riwayat. They represent linguistic variations present in the Prophet's time."},{"q":"What is the ابْتِدَاءُ (starting/beginning) rule in Tajweed?","opts":["You must start from the beginning of a Surah","Rules governing where you may begin reciting after pausing — must start at a place that gives complete meaning","You must recite basmala first","You must start from an even-numbered verse"],"c":1,"exp":"الابْتِدَاءُ: rules for beginning/resuming recitation. You may not begin at a place that would distort meaning (الابتداء القبيح). You should begin where the meaning is complete or at least acceptable."},{"q":"What is أَسْبَابُ النُّزُولِ (Asbab al-Nuzul)?","opts":["The order in which Surahs were revealed","The occasions of revelation — historical context surrounding specific Quranic verses","The names of the Quran","The scribes of the Quran"],"c":1,"exp":"أَسْبَابُ النُّزُولِ: the specific circumstances, events, or questions that prompted the revelation of particular verses. Understanding them is essential for proper interpretation (تفسير)."},{"q":"What is the إعجاز عددي (numerical miracle) claim about the Quran?","opts":["Proven scientific fact","A field of study claiming numerical patterns in the Quran (e.g., word counts); scholars debate its status as \"miraculous\"","Rejected entirely by all scholars","Part of official Tajweed science"],"c":1,"exp":"الإِعْجَازُ العَدَدِيُّ: claimed numerical patterns in the Quran (word frequencies, etc.). While some scholars find them remarkable, traditional Islamic scholarship grounds Quranic miracle in its literary/linguistic inimitability (الإعجاز البياني), not numerical counting."},{"q":"What is التَّفْسِيرُ بِالمَأْثُورِ vs التَّفْسِيرُ بِالرَّأْيِ?","opts":["Ancient vs modern interpretation","Interpretation by transmitted narrations (Quran, Sunnah, companions) vs interpretation by reasoned opinion","Arabic interpretation vs foreign","Short vs long interpretation"],"c":1,"exp":"التَّفْسِيرُ بِالمَأْثُورِ: explains Quran through other Quran verses, Prophetic hadith, companion reports. التَّفْسِيرُ بِالرَّأْيِ: scholarly opinion based on Arabic language knowledge and Islamic principles. The best tafsir combines both."},{"q":"What is سُورَةُ الكَهْفِ known for in Islamic tradition?","opts":["Being the hardest to memorize","Being recommended to recite on Fridays — protection from Dajjal, containing 4 major stories","Being the longest Surah","Being revealed entirely in Mecca"],"c":1,"exp":"سُورَةُ الكَهْفِ: recommended for Friday recitation (hadith in Sahih Muslim). Contains 4 stories: People of the Cave, the Two Gardens, Musa and Khidr, and Dhul-Qarnayn. Hadith say it provides light/protection for a week."},{"q":"What is the حِزْبُ and جُزْءٌ division of the Quran?","opts":["Thematic division by topic","The Quran is divided into 30 equal parts (أجزاء/juz) for monthly recitation; each juz = 2 hizbs; each hizb = 4 rub (quarters)","Division by revelation date","Division by Meccan/Medinan Surahs"],"c":1,"exp":"The Quran is divided into 30 أَجْزَاءٌ (equal parts) for recitation across 30 days of Ramadan. Each جُزْءٌ = 2 أَحْزَابٌ = 8 أَرْبَاعٌ. This division was not part of the original text but added for ease of recitation."},{"q":"Identify all صِفَاتُ الحُرُوفِ of the letter ن (Noon):","opts":["Jahr, Shidda, Isti'la, Itbaq","Jahr, Tawasut (between Shidda and Rakhawa), Istifal, Infitah, Izlaq, and specifically: Ghunna","Hams, Rakhawa, Isti'la","Jahr, Shidda, Istifal"],"c":1,"exp":"Noon's attributes: الجَهْرُ (voiced), التَّوَسُّطُ (between strong and open), الاسْتِفَالُ (low tongue), الانْفِتَاحُ (open), الإِذْلَاقُ (tip of tongue), and uniquely: الغُنَّةُ (nasal resonance 2 counts). The ghunna is its most important characteristic in Tajweed rules."}]}];

function progClass(){return S.track==='arabic'?'a':'q';}

function app(){return document.getElementById('app');}
function render(html){app().innerHTML=html;}

// === TIMER ===
function startTimer(secs){
  S.secsLeft=secs;
  clearInterval(S.timerInterval);
  S.timerInterval=setInterval(function(){
    S.secsLeft--;
    var el=document.getElementById('timer');
    if(el){
      var m=Math.floor(S.secsLeft/60),s=S.secsLeft%60;
      el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
      if(S.secsLeft<=60)el.classList.add('warn');
    }
    if(S.secsLeft<=0){clearInterval(S.timerInterval);submitExam();}
  },1000);
}
function stopTimer(){clearInterval(S.timerInterval);}

function startTrack(t){
  S.track=t;
  S.currentLevelIdx=0;
  S.answers=[];
  var completed=S.completedLevels[t];
  // If resuming, start from where left off
  if(completed.length>0)S.currentLevelIdx=completed.length;
  showNameScreen();
}

function showNameScreen(){
  var isArabic=S.track==='arabic';
  var tc=trackClass();
  render('<div class="hdr '+tc+'"><div class="ar">'+(isArabic?'اللُّغَةُ العَرَبِيَّةُ':'تِلَاوَةُ القُرْآنِ')+'</div>'+
  '<h1>'+(isArabic?'Arabic Language Assessment':'Quran &amp; Tajweed Assessment')+'</h1></div>'+
  '<div class="cnt">'+
  '<div class="nf-wrap"><label>Enter your name to begin:</label>'+
  '<input type="text" id="nameInp" placeholder="Your full name..." onkeydown="if(event.key===\x27Enter\x27)confirmName()" style="margin-bottom:14px"/></div>'+
  '<div style="text-align:center">'+
  '<button class="btn '+btnClass()+'" onclick="confirmName()">Start Assessment</button>'+
  '<button class="btn btn-sec" style="margin-left:10px" onclick="showHome()">← Back</button>'+
  '</div></div>');
  setTimeout(function(){var e=document.getElementById('nameInp');if(e)e.focus();},100);
}

function confirmName(){
  var e=document.getElementById('nameInp');
  var n=e?e.value.trim():'';
  if(!n){e.style.borderColor='#e74c3c';return;}
  S.studentName=n;
  showLevelInfo();
}

function showLevelInfo(){
  var lvl=getCurrentLevel();
  var tc=trackClass();
  var isA=S.track==='arabic';
  var levels=getLevels();
  var stepsHtml='<div class="pt-bar">';
  for(var i=0;i<levels.length;i++){
    var cls='pt-step';
    var completed=S.completedLevels[S.track];
    if(completed.indexOf(levels[i].id)>=0)cls+=' done'+(isA?'':' q');
    else if(i===S.currentLevelIdx)cls+=' curr';
    else cls+=' lk';
    stepsHtml+='<div class="'+cls+'">'+levels[i].cefr+'<br><span style="font-size:.9em">'+levels[i].name.split(' ')[0]+'</span></div>';
  }
  stepsHtml+='</div>';
  render('<div class="hdr '+tc+'"><div class="ar">'+lvl.nameAr+'</div>'+
  '<h1>Level '+lvl.cefr+': '+lvl.name+'</h1>'+
  '<div class="sub">'+lvl.desc+'</div></div>'+
  '<div class="cnt">'+
  '<p style="font-size:.88em;color:#777;margin-bottom:10px">Your progress across all levels:</p>'+
  stepsHtml+
  '<div style="background:#f8f9fa;border:1px solid #e0e0e0;border-left:4px solid '+(isA?'#2980b9':'#27ae60')+';border-radius:10px;padding:14px 16px;margin-bottom:14px">'+
  '<h4 style="font-size:.92em;font-weight:700;margin-bottom:6px;color:#333">Level '+lvl.cefr+' — '+lvl.name+'</h4>'+
  '<p style="font-size:.83em;color:#555;line-height:1.5">Skills: '+(lvl.skills||lvl.desc||'')+'</p>'+
  '<p style="font-size:.82em;color:#777;margin-top:7px">'+lvl.questions.length+' questions &nbsp;|&nbsp; '+lvl.timeMin+' minutes &nbsp;|&nbsp; Pass: '+lvl.passPct+'%</p>'+
  '</div>'+
  '<p style="font-size:.85em;color:#666;margin-bottom:16px">Hello, <strong>'+S.studentName+'</strong>! You are about to take the '+lvl.name+' level exam. Answer all questions. After submitting, if you score ≥'+lvl.passPct+'%, you will automatically advance to the next level.</p>'+
  '<div style="display:flex;gap:10px;flex-wrap:wrap">'+
  '<button class="btn '+btnClass()+'" onclick="beginExam()">Begin Exam →</button>'+
  '<button class="btn btn-sec" onclick="showHome()">← Change Track</button>'+
  '</div></div>');
}

function beginExam(){
  var lvl=getCurrentLevel();
  S.answers=new Array(lvl.questions.length).fill(-1);
  S.answered=false;
  S.currentQIdx=0;
  startTimer(lvl.timeMin*60);
  showQuestion();
}

function showQuestion(){
  var lvl=getCurrentLevel();
  var q=lvl.questions[S.currentQIdx];
  var isA=S.track==='arabic';
  var tc=trackClass();
  var pct=Math.round((S.currentQIdx/lvl.questions.length)*100);
  
  var headerHtml='<div class="hdr '+tc+'"><h1>'+lvl.cefr+': '+lvl.name+'</h1><div class="sub">'+S.studentName+'</div></div>';
  
  var metaHtml='<div class="exam-meta">'+
  '<span class="em-level'+(isA?'':' q')+'">Question '+(S.currentQIdx+1)+' of '+lvl.questions.length+'</span>'+
  '<span class="timer" id="timer">--:--</span>'+
  '</div>';
  
  var progHtml='<div class="prog-wrap"><div class="prog-lbl"><span>Progress</span><span>'+pct+'%</span></div>'+
  '<div class="prog"><div class="prog-fill '+progClass()+'" style="width:'+pct+'%"></div></div></div>';
  
  var passageHtml='';
  if(q.passage){
    passageHtml='<div class="passage"><h4>'+q.passage.t+'</h4>'+
    '<p class="pt">'+q.passage.ar+'</p>'+
    (q.passage.tr?'<p class="ptr">'+q.passage.tr+'</p>':'')+
    '</div>';
  }
  
  var answered=S.answers[S.currentQIdx];
  var isAnswered=answered>=0;
  
  var optsHtml='<div class="opts" id="opts">';
  q.opts.forEach(function(opt,i){
    var cls='opt';
    if(isAnswered){
      cls+=' locked';
      if(i===q.c)cls+=' showok';
      if(i===answered&&answered!==q.c)cls+=' wrong';
      if(i===answered&&answered===q.c)cls+=' ok';
    }
    var isArabic=q.oa&&!opt.includes('<');
    var optContent=isArabic?'<span class="aro">'+opt+'</span>':opt;
    optsHtml+='<div class="'+cls+'"'+(isAnswered?'':' onclick="selectAnswer('+i+')"')+'>'+optContent+'</div>';
  });
  optsHtml+='</div>';
  
  var explainHtml='<div class="explain'+(isA?'':' qe')+(isAnswered?' show':'')+'id="exp">'+
  '<strong>💡 </strong>'+q.exp+'</div>';
  
  var navHtml='<div class="nxt">';
  if(isAnswered){
    if(S.currentQIdx<lvl.questions.length-1){
      navHtml+='<button class="btn '+btnClass()+' btn-sm" onclick="nextQuestion()">Next →</button>';
    } else {
      navHtml+='<button class="btn '+btnClass()+' btn-sm" onclick="submitExam()">Submit Exam</button>';
    }
  }
  navHtml+='</div>';
  
  var qHtml='<div class="qbox"><div class="qnum">Question '+(S.currentQIdx+1)+' / '+lvl.questions.length+'</div>'+
  '<div class="qtext">'+q.q+'</div>'+
  passageHtml+
  optsHtml+
  explainHtml+
  navHtml+
  '</div>';
  
  render(headerHtml+'<div class="cnt">'+metaHtml+progHtml+qHtml+'</div>');
  
  // Restore timer display
  var timerEl=document.getElementById('timer');
  if(timerEl){
    var m=Math.floor(S.secsLeft/60),s=S.secsLeft%60;
    timerEl.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    if(S.secsLeft<=60)timerEl.classList.add('warn');
  }
}

function selectAnswer(i){
  if(S.answers[S.currentQIdx]>=0)return;
  S.answers[S.currentQIdx]=i;
  showQuestion();
}

function nextQuestion(){
  S.currentQIdx++;
  showQuestion();
}

function submitExam(){
  stopTimer();
  var lvl=getCurrentLevel();
  var correct=0;
  S.answers.forEach(function(a,i){if(a===lvl.questions[i].c)correct++;});
  var pct=Math.round((correct/lvl.questions.length)*100);
  var pass=pct>=lvl.passPct;
  var isA=S.track==='arabic';
  var tc=trackClass();
  var levels=getLevels();
  
  if(pass){
    S.completedLevels[S.track].push(lvl.id);
  }
  
  var icon=pass?'🎉':'📝';
  var passMsg=pass?'Congratulations! You passed Level '+lvl.cefr+'.':'You did not reach the passing score for Level '+lvl.cefr+'.';
  
  var hasNext=(S.currentLevelIdx<levels.length-1)&&pass;
  var certHtml='';
  
  if(pass){
    certHtml='<div class="cert">'+
    '<h3>🏆 Certificate of Proficiency</h3>'+
    '<div class="clvl">'+lvl.cefr+' — '+lvl.name+'</div>'+
    '<div class="cdesc">Awarded to: '+S.studentName+'<br>Track: '+(isA?'Arabic Language':'Quran &amp; Tajweed')+'</div>'+
    '</div>';
  }
  
  var statsHtml='<div class="rmsg">'+
  '<strong>Results:</strong> '+correct+' / '+lvl.questions.length+' correct<br>'+
  'Passing score: '+lvl.passPct+'%<br>'+
  (pass?'✅ <strong>PASSED</strong>':'❌ Did not pass')+
  '</div>';
  
  var btnHtml='<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">';
  if(hasNext){
    btnHtml+='<button class="btn '+btnClass()+'" onclick="advanceLevel()">Advance to '+levels[S.currentLevelIdx+1].cefr+' →</button>';
  }
  if(!pass){
    btnHtml+='<button class="btn '+btnClass()+'" onclick="retryLevel()">Retry This Level</button>';
  }
  if(S.completedLevels[S.track].length>0&&!hasNext){
    btnHtml+='<button class="btn btn-sec" onclick="showFinalCert()">View Final Certificate</button>';
  }
  btnHtml+='<button class="btn btn-sec" onclick="showHome()">🏠 Home</button></div>';
  
  render('<div class="hdr '+tc+'"><h1>Exam Results</h1><div class="sub">'+lvl.cefr+' — '+lvl.name+'</div></div>'+
  '<div class="cnt result">'+
  '<div class="ric">'+icon+'</div>'+
  '<h2>'+passMsg+'</h2>'+
  '<div class="score '+(pass?passColor():'fail')+'">'+pct+'%</div>'+
  statsHtml+certHtml+btnHtml+
  '</div>');
}

function advanceLevel(){
  S.currentLevelIdx++;
  showLevelInfo();
}

function retryLevel(){
  S.answers=[];
  S.currentQIdx=0;
  showLevelInfo();
}

function showFinalCert(){
  var isA=S.track==='arabic';
  var tc=trackClass();
  var levels=getLevels();
  var completed=S.completedLevels[S.track];
  var highest=null;
  levels.forEach(function(l){if(completed.indexOf(l.id)>=0)highest=l;});
  if(!highest){showHome();return;}
  
  render('<div class="hdr '+tc+'"><div class="ar">'+(isA?'شَهَادَةُ الكَفَاءَةِ':'شَهَادَةُ التِّلَاوَةِ')+'</div>'+
  '<h1>Certificate of Proficiency</h1></div>'+
  '<div class="cnt">'+
  '<div class="cert" style="text-align:center;padding:30px">'+
  '<h3 style="font-size:1.2em;margin-bottom:12px">🏆 Official Level Certificate</h3>'+
  '<p style="font-size:1em;margin-bottom:8px">This certifies that</p>'+
  '<div style="font-size:1.6em;font-weight:800;color:#1a3a5c;margin:10px 0">'+S.studentName+'</div>'+
  '<p style="margin:8px 0">has demonstrated proficiency at</p>'+
  '<div class="clvl">'+highest.cefr+' — '+highest.name+'</div>'+
  '<div class="cdesc">Track: '+(isA?'Arabic Language':'Quran &amp; Tajweed')+'<br>'+highest.desc+'</div>'+
  '</div>'+
  '<div style="text-align:center;margin-top:16px">'+
  '<button class="btn btn-sec" onclick="showHome()">🏠 Home</button>'+
  '</div></div>');
}

showHome();
</script></body></html>
